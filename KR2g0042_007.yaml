body:
  text: 欽定四庫全書欽定宗室王公功績表傳卷七傳五親王和碩敬謹親王尼堪傳尼堪太祖髙皇帝孫原封廣略貝勒褚英第三子初征多羅特棟䕫諸部有功天聰九年五月大兵征明山西隨貝勒多鐸率偏師入寧錦界牽制明西援兵崇徳元年封固山貝子十二月上征朝鮮李倧遁尼堪隨豫親王多鐸追至南漢山城圍之朝鮮將來援為我軍所殱又擊敗其副將援兵二年正月李倧降師還四月預議政四年二月上征明隨武英郡王阿濟格等率四旗兵環守塔山連山七年九月代公博和託等駐守錦州順治元年四月隨睿親王多爾衮入山海闗敗流賊李自成五月隨武英郡王追擊流賊于望都十月晉封多羅貝勒十二月隨豫親王率師自孟津至陜州大破賊衆二年正月至潼闗賊將劉方亮犯我營尼堪同䕶軍統領圖賴夾擊之獲馬三百餘賊又以騎兵横衝我師同貝子尚善擊敗之三月趨歸德定河南諭嘉王貝勒等勤勞日久賜尼堪弓一五月隨豫親王克明南京追縛福王朱由崧於蕪湖又攻克江隂十月凱旋賜金二百兩銀萬五千兩鞍一馬五三年三月隨肅親王豪格西征尼堪抵西安由棧道進發賊渠賀珍自鷄頭闗迎拒敗之抵漢中疾躪其營賊潰走西鄉追擊于楚湖至漢隂賊二隻虎奔四川孫守法奔岳科寨十一月入蜀張獻忠伏誅與貝子滿達海分兵𠞰遵義䕫州茂州榮昌隆昌富順内江資陽擒斬偽王及官弁等二千三百有竒俘獲無筭川㓂平互見肅武親王傳五年正月師旋八月同英親王阿濟格𠞰平天津土㓂九月晉封多羅郡王加號敬謹六年正月命為定西大將軍討大同叛鎮姜瓖三月奏都統阿賴等屢挫賊衆敗偽巡撫姜輝兵偽叅將羅英壇率所部降是月睿親王多爾衮赴大同招撫瓖承制晉尼堪為親王四月圍大同八月偽總兵楊振威等斬瓖及其兄琳弟有光降七年二月命理六部事八月以徇隱尚書阿哈尼堪不親往迎朝鮮王弟事降郡王八年正月晉封和碩敬謹親王二月同諸王奏削故睿親王封爵三月以英親王私藏兵器事隱不奏降郡王尋命諸王分管六部王掌禮部五月復封親王九年六月掌宗人府事時獻忠餘孽孫可望李定國等皆受明桂王朱由榔封爵分犯湖南貴州七月命為定逺大將軍征之瀕行賜御服佩刀鞍馬上親送至南苑八月定國䧟桂林勅王毋往貴州取湖南寶慶後入廣西𠞰賊十一月抵湘潭由榔將馬進忠遁我師進擊于衡山縣敗其兵千八百是夜兼程趨衡州詰旦大兵方列陣定國兵四萬餘猝至王遣首隊進擊大破之逐北二十餘里獲象四馬八百有竒方進擊時林中賊伏發城内賊出應之師欲退王曰我兵凡臨陣無退者我為宗室不斬除逆㓂何面目歸乎遂奮勇直入賊環圍之王率諸將士縱横衝擊矢盡㧞刀力戰没于陣年四十有三十年十月喪還輟朝三日命親王以下郊迎諡曰莊十六年十月追論王分取睿親王所遺財物掌禮部時不㕘劾尚書譚泰罪削爵詔王以宗室陣亡仍留王爵初次襲尼思哈敬謹莊親王尼堪第二子順治十年十二月襲封和碩敬謹親王十七年十一月薨年十歳謚曰悼二次襲蘭布敬謹莊親王尼堪第一子順治十三年正月封三等輔國將軍十八年六月降襲多羅貝勒康熙六年二月諭宗人府曰尼堪以親王陣亡殊屬可憫世祖章皇帝復嘗矜念仍留所襲之爵又無不准承襲之㫖蘭布著封為郡王仍與原號七年八月蘭布以父陣亡功請復得㫖蘭布著襲封和碩親王八年五月議蘭布娶輔臣鰲拜孫女為妻詰鰲拜罪狀狡稱不知降鎮國公十三年六月隨貝勒尚善討逆藩呉三桂於湖南十七年十月卒於軍年三十有七十九年十一月追論在岳州時退縮罪削爵三次襲賴士原襲親王蘭布第四子康熙十八年四月降襲輔國公三十五年正月上親征噶爾丹賴士統兵赴歸化城駐守十一月師還五十三年四月議賴士不安静守分探聽消息散布流言削爵五十四年五月赴阿爾台軍前効力五十九年七月隨征西將軍祁里徳至額爾齊斯河擊殺賊衆議叙得頭等功牌一雍正八年二月復封輔國公十年閏五月卒年七十有一四次襲富増原襲親王蘭布孫輔國公務友第六子康熙四十八年十二月封三等鎮國將軍五十三年五月襲封輔國公雍正四年二月諭宗人府曰輔國公富增人甚不及前革退賴士公爵時因無可承襲之人始令伊承襲今賴士在軍前行走數年其子伊爾登又甚勤謹竭力行走著將富増公爵革退與伊爾登承襲五次襲伊爾登輔國公賴士第三子雍正三年五月管武備院事九月任鑲藍旗漢軍副都統四年二月遷右翼前鋒統領是月襲封輔國公六年八月擢正黄旗䝉古都統八年三月攝鑲紅旗䕶軍統領十一月復署右翼前鋒統領乾隆十四年四月卒年六十有六謚曰簡恪六次襲富春簡恪輔國公伊爾登第七子乾隆十四年十月襲封奉恩輔國公三十五年四月授吉林將軍四十二年六月調杭州將軍十一月以前任吉林時不能禁止採參議革將軍得㫖富春著革去公爵另襲仍革職留杭州將軍之任四十一年十一月革任七次襲賔寧原襲奉恩輔國公富春第二子乾隆二十六年十二月授四等侍衛二十七年正月封二等奉國將軍十一月遷三等侍衛三十九年十二月遷二等侍衛四十年十一月遷頭等侍衛四十二年十一月襲封奉恩輔國公四十三年三月上念敬謹親王尼堪功勛頗顯且以力戰捐軀晉封賔寧為鎮國公世襲罔替四十七年八月任正紅旗蒙古副都統十月授宗人府左宗人四十八年五月任鑲藍旗䕶軍統領和碩頴親王薩哈璘傳薩哈璘太祖髙皇帝孫禮烈親王代善第三子初授台吉天命十年十一月察哈爾林丹汗圍科爾沁薩哈璘以精騎五千援之林丹汗遁十一年四月征喀爾喀巴林部十月征扎嚕特部俱有功是年封貝勒天聰元年五月上征明同貝勒徳格𩔖等率䕶軍精騎為前隊上由大凌河至錦州城明兵遁薩哈璘邀殱之復同三貝勒莾古爾泰等領偏師衛塔山糧運敗明兵二萬大軍薄寧逺城擊明總兵滿桂斬級無筭薩哈璘以力戰被創三年十月上征明次波羅河屯大貝勒代善莾古爾泰密請班師上不懌薩哈璘偕貝勒岳託等力勸決進取遂由洪山口克遵化進逼明北京十二月薩哈璘略通州焚其船克張家灣圍永平克香河縣復殱沙河驛䝉古兵之出奔山海闗者五百人四年正月克永平同貝勒濟爾哈朗駐守永平人李春旺者訛言將屠城以惑衆梟之招諭所屬之遷安灤州建昌䑓頭營鞍山保皆降事具鄭獻親王傳三月遣軍敗明副將張宏謨兵四月明兵自樂亭撫寧攻灤州薩哈璘率兵援之敗遁二貝勒阿敏來代乃攜所俘還五年三月命諸貝勒直言時政薩哈璘奏曰圖治在乎用人人主灼知邪正則臣下争尚名節竭力圖功惟皇上慎簡貝勒大臣及審事官任以政務遇大征伐上親在行間諸臣自悉遵方略若遣發宜選賢能者為帥給符節畀事權仍限官品某以下干軍令者許軍法從事七月初設六部命掌禮部事是月上征明與貝勒杜度豪格留守六年五月同濟爾哈朗等率右翼兵略歸化城黄河諸路俘䝉古千餘復指授歸順䝉古諸貝勒牧地申約法十月師還七年六月詔問征明及察哈爾朝鮮三者何先奏言當寛朝鮮拒察哈爾而專征明察哈爾雖不加兵彼如蟲食穴中勢必自盡至於明我少緩一年彼守禦益固臣意視今嵗秋成圖進取乗彼禾稼方熟因糧於彼為再進計量留兵防察哈爾上先與諸貝勒以騎徃來襲擊俘獲蹈躪之再命貝勒率精兵自一片石入山海闗則彼寧錦諸州為無用或仍從寧錦入斷北京四路度地形奪糧足之地據守勿歸乘機伺便二三年中大勲克集矣八月同貝勒阿巴泰阿濟格略明山海闗師還上以不乗勝入内地責之八年二月同貝勒多爾衮往迎明降將尚可喜招撫廣鹿長山二島户口三千八百有竒六月上征明薩哈璘自喀喇鄂博攻克得勝保殱明兵叅將李全自縊八月略代州偵崞縣城頽夜襲㧞之王東板鎮二保居民棄城遁復敗代州騎兵百歩兵三百追薄城乃率兵㑹御營於大同籍俘獲數以聞九年二月同多爾衮岳託豪格等統兵收察哈爾林丹汗子額哲途遇察哈爾汗之妻及台吉索諾木率屬來降進抵托里圖盡取額哲全部師還岳託駐軍歸化城薩哈璘復同多爾衮豪格略明山西府縣仍由歸化城旋事具睿忠親王傳先是諸貝勒大臣以逺人歸附國勢日隆合詞請上尊號上郤之十二月諸貝勒以收察哈爾全部復請上仍不允薩哈璘乃令内院大臣希福等奏曰臣等屢請未蒙俯鑒夙夜悚惶罔知所措伏思皇上不受尊號咎在諸貝勒不能殫竭忠信展布嘉猷為久大計今諸貝勒誓改行竭忠輔開太平之基皇上宜受尊號上稱善曰薩哈璘為朕深謀善承皇考開創之業開陳及此實獲我心其應誓與否爾身任禮部當自主之翼日薩哈璘集諸貝勒於朝各書誓詞以奏上以内外諸貝勒誠難固讓而朝鮮乃通好之國宜使告知薩哈璘復奏諸貝勒當遣人與使臣同往告以内外之誠并示以各國來附兵力強盛之實上嘉納之崇徳元年正月薩哈璘有疾上遣希福等傳諭曰朕欲爾病速痊念之甚切爾則不可強圖亟愈即思見朕也羣子弟中啓我所不及助我所遺忘整理治道惟爾是賴爾但當勤於調治以冀病痊薩哈璘對曰䝉皇上温㫖眷顧竊冀仰荷恩育或可得生即不幸先填溝壑亦復何憾但當國家大勲垂就不能盡力捐軀輾轉床蓐為可恨耳希福等以其言奏上惻然曰國家豈有專事甲兵以為政治者儻疆土日増克成大業無此明哲人何以整理乎是月上臨視薩哈璘疾見其羸瘠淚下薩哈璘悲痛流涕五月薨年三十有三薩哈璘明達聰敏通曉滿漢䝉古文義掌部事贊謨猷上深嘉之病革上復親臨及薨不勝震悼入哭者四自辰至午乃還宫仍於庭中設幄坐不御飲食輟朝三日祭時上親奠哭追封和碩頴親王讀冊畢復痛哭三奠六月上御翔鳯樓偶假寐夢人請曰頴親王乞賜牛一如是者再寤以問希福等皆奏曰此皇上悼念所致上曰不然當别有故於是希福等檢㑹典凡親王薨初祭例賜一牛頴親王初祭未用牛上命致祭如禮康熙十年六月追謚曰毅乾隆十九年九月入祀盛京賢王祠初次襲阿達禮追封穎毅親王薩哈璘第一子崇徳元年六月襲封多羅郡王三年二月從征喀爾喀至博碩堆偵扎薩克圖汗逺遁而還五年五月同鄭親王濟爾哈朗等駐義州迎來歸蒙古多羅特部于杏山西五里䑓敗明追兵賜御廐良馬一六年三月同鄭親王圍錦州降城中䝉古台吉諾木齊呉巴什等四月敗明援兵于錦州南山西岡六月敗明松山援兵九月圍松山明兵犯我鑲黄旗正紅旗正黄旗營擊敗之斬級千四百餘七年二月克松山城俘明總督洪承疇巡撫邱民仰等事俱詳鄭獻親王傳七月叙功賜鞍馬一蟒縀九十尋命管禮部事預議政先是上御篤恭殿王以下及衆官皆立侍九月王請更定儀制上御殿及賜宴親王以下衆官等皆跪迎上升陛方起駕興亦如之十月貝勒阿巴泰征明薊州同豫郡王多鐸屯寧逺牽制援兵八年八月世祖章皇帝嗣位以阿達禮與貝子碩託謀立睿親王伏誅爵除和碩端重親王博洛傳博洛太祖髙皇帝孫饒餘敏郡王阿巴泰第三子天聰九年五月大軍由明宣府大同邊境征朔州代州應州别遣貝勒多鐸從廣寧入寧逺錦州界牽制明闗外兵使不得援山西博洛隨征有功崇徳元年封固山貝子隨父阿巴泰征明延慶州凱旋預宴二年四月預議政三年七月任理藩院承政十月從上征明寧逺分軍趨中後所明總兵祖大壽猝襲我後衝潰土黙特䝉古兵䕶軍統領哈寧阿等與相持博洛突前奮擊敵乃郤五年五月同鄭親王濟爾哈朗駐營義州迎來歸之蒙古多羅特部于杏山西五里䑓敗明追兵賜良馬一尋與諸王更番圍錦州六年八月明總督洪承疇來援敗之松山追至塔山獲其筆架山積粟事具英親王傳又同貝勒羅洛渾等設伏桑阿爾齋保擊敗王樸呉三桂七年春松山錦州相繼下博洛與兄輔國公博和託暨貝子尼堪等更番駐防錦州順治元年四月隨睿親王多爾衮入山海闗破流賊李自成十月晉封多羅貝勒隨豫親王多鐸征河南破李自成於潼闗下西安南定江寧豫親王分兵半以博洛領之招撫常州蘇州同鎮國將軍拜音圖等趨杭州明兵分拒皆敗夜渡錢塘江逃我軍追至江岸駐營敵見之以為潮且至營必没而潮連日不至敵驚為神明潞王朱常淓遂率杭州官屬開門納欵淮王朱常清亦自紹興渡江來歸十月凱旋賜金二百兩銀萬五千兩鞍馬一三年二月命為征南大將軍往平浙閩五月至杭州時明魯王朱以海稱監國于紹興舊將方國安等營錢塘江東岸綿亘二百里我軍無舟不得渡忽江沙暴漲水淺可渉䕶軍統領圖賴等䇿馬徑渡敵驚遁博洛遣貝子屯齊等繼進國安棄舟遁以海走台州斬殪無算擒敵將武景科等撫定紹興六月圍金華七月克之斬明蜀王朱盛濃等遂克衢州浙江悉平明唐王朱聿鍵猶據福建我軍分常山江山兩路並進博洛偕圖賴與前鋒統領努山䕶軍統領都爾徳破敵仙霞闗克浦城建寧延平聿鍵先由延平走汀州博洛遣䕶軍統領阿濟格尼堪等克其城擒聿鍵及曲陽王朱盛渡西河王朱盛洤松滋王朱演漢西城王朱通簡及其官屬敵將姜正希引兵二萬來援夜襲城擊郤之斬級萬餘鎮國將軍漢岱等敗敵將師福于分水闗克崇安縣副都統卓布泰等克福州先後二十餘㨗斬其巡撫楊廷清李暄楊文忠降偽國公鄭芝龍等二百九十餘人馬歩兵十一萬有竒撫定興化漳州泉州等府十一月朔㨗聞得㫖嘉奬是月博洛駐福州令總兵佟養甲進征廣東時聿鍵弟聿􅟽據廣州偽稱紹武年號養甲既克潮州惠州遂薄廣州克其城斬聿􅟽及其宗屬十餘人撫定廣州四年二月博洛承制以佟養甲為兩廣總督自率貝子博和託都統圖賴等凱旋優賚所獲金幣人口叙功晉封多羅郡王加號端重五年十一月同英親王阿濟格往大同偵防喀爾喀至則總兵姜瓖已據城叛遂圍之六年正月叛黨劉遷䧟代州王偕郡王碩塞赴援克其郛賊遁三月旋師大同瓖潛期助馬得勝兩路賊五千由北山逼我營自驅騎千餘出犯王與䕶軍統領鰲拜徹爾布等分禦之擊斬過半北山賊竄瓖亦閉城不敢復出是月睿親王赴大同招撫瓖承㫖晉博洛為親王四月命為定西大將軍移師討汾州叛賊五月奏清源交城文水徐溝祁縣賊平六月奏賊犯平陽遣副都統譚布擊敗之賊渡河遁七月賊萬餘犯絳州遣副都統洛碩擊走之斬級二千餘又分遣諸將𠞰賊孝義縣克其城屢敗賊于壽陽平遥遼州榆社時英親王與敬謹親王尼堪圍大同親王滿達海與郡王瓦克達𠞰賊朔州寧武有㫖令博洛酌撤閒駐兵率還京王疏言太原平陽汾州三府屬州縣雖漸収復然未復者尚多恐撤兵後賊乘虗襲據應仍留守禦上是其言令俟滿達海自朔州移師至汾州併力𠞰賊八月大同降將楊振威斬瓖首獻英親王軍王與滿達海合兵攻汾州九月克其城斬偽巡撫姜建勲偽布政使劉炳業復嵐縣永寧州遣軍分𠞰餘賊于岳陽縣絳州孟城驛老君廟殱之乃班師七年二月命理六部事八月以徇隱尚書阿哈尼堪不親往迎朝鮮王弟事降郡王八年正月晉封和碩端重親王二月同諸王奏削故睿親王封爵三月以英親王私藏軍器事隱不奏降郡王尋命諸王分管六部王掌户部五月復封親王八月上察知尚書譚泰狂悖逞私持六部權下諸王勘問王與貝子錫翰等証其罪狀伏誅九年三月薨年四十謚曰定十四年正月王第四子塔爾納封多羅郡王三月卒年十有五謚曰敏思十六年十月追論王分取睿親王所遺財物掌戸部時不㕘劾譚泰罪削博洛及塔爾納爵謚初次襲齊克新原封端重定親王博洛第八子順治十二年四月襲封和碩端重親王十六年十月追論博洛罪降齊克新多羅貝勒十八年正月薨年十有二謚曰懐思爵除欽定宗室王公功績表傳卷七
