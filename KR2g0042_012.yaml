body:
  text: 欽定四庫全書欽定宗室王公功績表傳卷十二傳十原封貝勒以罪黜宗室和碩貝勒莽古爾泰傳莽古爾泰太祖高皇帝第五子嵗壬子九月從上征烏拉克城六莽古爾泰等請渡水擊上止之曰我且削其外城無僕無以為主無民無以為君遂燬所得六城移駐富勒哈河越日於烏拉河建木城留兵千守天命元年授和碩貝勒以齒序莽古爾泰為三貝勒四年三月明總兵杜松等率師六萬出撫順關上親總師迎擊莽古爾泰從至界藩設伏薩爾滸谷口明兵過將半尾擊之我師據界藩之吉林崖明兵營薩爾滸山以二萬衆來攻吉林莽古爾泰同大貝勒代善等以兵千衛吉林復合力攻薩爾滸山破之又破明兵于尚間崖時明總兵劉綎出寬甸略棟鄂上命同代善等禦之至瓦爾哈什窩集擊敗明兵二萬陳斬綎事詳禮烈親王傳八月從上征葉赫圍其城其貝勒布揚古及弟布爾杭古降葉赫平五年八月上征明由懿路蒲河進明兵出瀋陽城者各引退諭莽古爾泰領本部追之莽古爾泰遂率健鋭百人追殺總兵李秉誠副將趙率教兵越瀋陽城東至渾河始返六年七月鎮江城降將陳良策叛投明總兵毛文龍同代善遷金州民于復州十年正月明葺城守旅順口攻克之殱其衆十一月率師援科爾沁解其圍十一年四月上征喀爾喀巴林部命代善諸貝勒略西拉木倫諸貝勒以馬乏不能進莽古爾泰獨領兵夜渡擊之俘獲無算天聰元年五月攻明右屯衛又以偏師衛塔山糧運三年十月從上征明貝勒阿巴泰阿濟格先從龍井關入斬明漢兒莊副將易愛等莽古爾泰偕貝勒多爾衮多鐸至其守將遂以城降並招撫潘家口守備金有光中軍范民良蔣進喬翌日上統師克洪山口趨遵化莽古爾泰自漢兒莊合營敗明山海關總兵趙率教兵擒其副將臧調元旋奉命赴通州視渡口是月大軍進薄京城明諸道兵入援屯廣渠門外莽古爾泰分遣護軍前行令阿巴泰阿濟格等攻之追殺至壕莽古爾泰與貝勒多鐸留後值明潰卒來犯擊殱之十二月從上視薊州破明山海關援兵四年二月克永平遵化還與明兵遇敗之五年三月命諸貝勒直言時政莽古爾泰奏曰讞獄據供詞以定是非未敢明知枉斷惟恐事久怠生臣與諸貝勒大臣倍加策勵八月從上圍明大凌河城正藍旗兵圍其南莽古爾泰軍其中為策應九月敗明監軍道張春總兵吳襄等援兵事詳禮烈親王傳十月議莽古爾泰于御前露刃大不敬罰銀萬兩撤五佐領歸公六年五月從上征察哈爾林丹汗遁移師征明歸化城略大同宣府七月師還十二月薨年四十六上臨哭丙夜始還翌日設幄議祭奠事是夜乃還宫九年十二月以所屬冷僧機追首莽古爾泰朋謀不軌事削貝勒黜宗室爵除多羅貝勒德格類傳德格類太祖高皇帝第十子初授台吉天命六年二月大軍略明奉集保將旋有小卒指明兵所在德格類同台吉嶽託碩託擊敗明兵二百追逼明總兵李秉誠營其衆二千潰遁三月同台吉寨桑古閲三岔河橋至海州城中官民張樂輿迎德格類等令軍毋擾民奪財物士皆登城宿勿入民室次日安撫居民而還八年四月同台吉阿巴泰征喀爾喀扎嚕特部十一年十月復隨大貝勒代善征扎嚕特部是年封多羅貝勒天聰三年九月同貝勒濟爾哈朗等略明錦州焚其積聚俘獲無算五年六月命諸貝勒直言時政德格類奏曰國家要在慎選正直任以國事屏讒邪逺姦佞則賢不肖皆知取法臣等與諸貝勒皆以公正自持效忠竭力至讞獄或刑罰不中請即罷斥另選良臣任法司則政簡刑清國家何憂不太平七月初設六部命理戶部事八月從上圍明大凌河城正藍旗兵圍其南德格類軍其中為策應九月敗明監軍道張春總兵吳襄等援兵事詳禮烈親王傳十月明總兵祖大壽降同貝勒阿巴泰夜襲錦州擊斬甚衆事詳饒餘敏郡王傳六年五月同貝勒濟爾哈朗等俘察哈爾部衆於歸化城及黃河諸路九月同貝勒嶽託等拓疆自耀州展至蓋州迤南七年六月攻旅順口克之八年五月從大軍征明六月招撫蒙古來歸戶衆七月克獨石口進攻赤城未拔入保安州會大軍于應州師還九年十月薨年四十上臨哭丙夜乃還設幄而居撤饌三日諸貝勒大臣勸慰再三始還宫十一月莽古爾泰既為冷僧機所告以大逆削爵除籍德格類其母弟曽與謀追削貝勒黜宗室爵除多羅貝勒拜音圖傳拜音圖顯祖宣皇帝孫追封篤義貝勒巴雅喇第三子天聰八年四月太宗文皇帝加恩宗室授拜音圖三等子爵與功臣同六月隨貝勒阿濟格迎察哈爾來降之土巴濟農九年十二月授鑲黃旗都統崇德元年五月隨武英郡王阿濟格征明略保定府攻安肅縣克之九月師還十月同諸王大臣以所獲陳獻篤恭殿前部臣差等以聞上曰朕聞拜音圖不忘君上俘獲之時即簡選收藏擕歸進獻具見敬忱甚為可嘉十二月從征朝鮮以騎入其城收其輜重三年十月隨睿親王多爾衮征明同都統圖爾格敗敵于董家口毁邊牆入克青山關下城六年八月議拜音圖弟鞏阿岱隨大軍圍錦州時臨陳退縮罪下王大臣會鞫拜音圖拂袖出坐徇庇論死得旨革職罷都統任並罰鍰尋率兵助睿親王軍于錦州復同貝勒多鐸圍守松山七年六月復都統任順治二年正月隨豫親王多鐸敗賊將劉方亮于潼關是月封一等鎮國將軍三月賜繡服一襲四月南征克揚州以舟師破其兵于江南岸六月同貝子博洛攻下杭州十月敘功賜金八十兩銀四千兩鞍馬一三年五月授三等公尋隨豫親王擊敗喀爾喀部兵晉封鎮國公五年十一月晉固山貝子隨英親王阿濟格戍大同六年九月攻叛鎮薑瓖餘黨於沁州賊遁拔其城復圍偽道胡國鼎于潞安殱之十月晉封多羅貝勒九年三月以阿附睿親王削爵幽禁黜宗室爵除多羅貝勒碩託傳碩託太祖高皇帝孫禮烈親王代善第二子初授台吉天命六年二月從上征明奉集保敗明兵二百十年十一月同貝勒莽古爾泰等援科爾沁解其圍十一年四月隨父大貝勒代善征喀爾喀巴林部十月征扎嚕特部有功授貝勒天聰元年正月隨二貝勒阿敏等征朝鮮定盟而還五月從上征明大凌河圍錦州二年五月明守者棄錦州遁同貝勒阿巴泰等隳其城四年正月大兵克明永平灤州遷安命同阿敏駐守五月明兵復圍灤州阿敏殺降者棄永平歸六月議碩託不力阻偕歸罪削爵五年八月從上征明錦州明兵攻貝勒阿濟格營碩託同擊敗之傷股上親勞以金巵酌賜九月明兵趨大凌河碩託擊敗明監軍道張春兵手復被創七年正月以力戰受傷奬賜綵縀十布百八年七月隨代善征明自喀喇鄂博攻得勝保克之又擊敗朔州騎兵八月同貝勒薩哈璘略代州拔崞縣分克原平驛尋封固山貝子崇德元年十二月從上征朝鮮敗其援兵二萬餘於南漢山城二年四月同武英郡王阿濟格攻明皮島克之三年八月同鄭親王濟爾哈朗征明寧逺四年正月以僭上越分降輔國公二月同武英郡王征明五月論錦州寧逺功賜駝馬各一五年六月隨睿親王多爾衮圍錦州嗣以我軍離城逺駐又遣辨私歸諭責之曰爾曽獲罪朕屢寬宥不思竭力效忠報朕屢次宥罪之恩反若事不關己今後再罹于罪任法司治之必不爾宥也廷議削爵詔從寬罰鍰尋復封固山貝子八年八月以同郡王阿達禮謀立睿親王伏誅黜宗室爵除多羅貝勒延信傳延信太宗文皇帝曽孫肅武親王豪格孫父猛峩封多羅溫郡王傳子佛永輝無嗣傳弟延綬坐行止不端降貝勒延綬子揆慧降襲輔國公坐昏庸削爵延信猛峩第三子康熙二十六年正月封三等奉國將軍三十七年十二月授二等侍衛四十年十月預議政授正藍旗滿洲都統四十五年十月以病解都統任五十二年四月復任都統五十七年十月隨貝子允禵征策妄阿喇布坦延信稱凖噶爾與青海部世婚我軍衆寡青海知之凖噶爾亦知之今年既未進兵我軍可無出口駐劄允禵疏聞詔大軍駐西寧五十九年正月授平逆將軍由青海往平西藏八月擊敗策凌敦多卜於布克河齊諾郭勒綽瑪喇遂定西藏事聞得旨嘉奬六十年六月諭宗人府平逆將軍延信統領滿洲蒙古緑旗兵過自古未到之煙瘴惡水無人居住之絶域殱滅醜類平定藏地克展勇略深屬可嘉著封為輔國公六十一年十二月攝撫逺大將軍事尋授西安將軍雍正元年二月兄子揆慧既削爵議以延信襲延信故公爵遂晉封固山貝子八月敘功晉封多羅貝勒五年九月回京十二月上以延信與阿其那阿靈阿拉錫普竒蘇努等結黨在西寧軍前又隂結允禵徇隱年羮堯後令伊進藏防守托病遷延西安將軍任內不實心辦理軍務亦未陳奏要事訓練不親往濫保官兵詢以應否進藏輒云路有煙瘴畏懼出征進藏時並侵帑十萬兩在御前傲慢無禮種種罪惡盡行敗露命革貝勒交王大臣逐欵嚴審定擬具奏尋經王大臣審訊延信罪凡二十欵奏言黨援之罪七一延信向與阿其那阿靈阿拉錫普竒等結黨羽與二阿哥為敵一徇隱年羮堯不臣之心一在西寧時隂與允禵交結一令伊進藏時託病遷延鑽營年羮堯代伊解釋一延信原係阿其那阿靈阿蘇努等黨奉旨交問伊反將無干之漢人路振揚舉出一稱阿其那朴實阿靈阿為人傑與阿爾松阿結為姻親一揑造逆言告知年羮堯希脫黨謀又大不敬之罪四一當御前昻然伸足一諭旨切責坐聽不跪聆一時屆萬壽聖節不俟慶祝即起程回任一在西寧時不遵諭旨將地方要務陳奏又欺妄之罪一假揑病狀扶杖行走及令署大將軍棄杖前往負恩之罪一在將軍任內不親加訓練要結人心之罪一妄行保題官兵九十餘人貪婪之罪一進藏時侵帑十萬兩入已擾亂政事之罪二一混行痛責士卒一詢以應否進藏輒云路有煙瘴希圖惑衆失悮兵機之罪三一因青海用兵擅調逺處兵丁幾致可危一聞賊冦臨邊擁兵不發逮新城子失陷後始發兵一拏到逆賊阿拉布坦溫布屬下蒙古七人並不審究竟行釋放罪凡二十欵供狀明白請按律斬決得旨延信從寬免死著監禁黜宗室爵除欽定宗室王公功績表傳卷十二
