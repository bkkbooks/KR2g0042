body:
  text: 傳六郡王多羅饒餘郡王阿巴泰傳阿巴泰太祖高皇帝第七子初授台吉嵗辛亥七月同費英東安費揚古率兵千征東海窩集部之烏爾固辰穆稜二路俘千餘人還天命八年四月同台吉德格類齊桑古嶽託征扎嚕特部渡遼河由額爾格勒行百餘里攻其部長昻安所居昻安攜妻子從二十餘人遁我總兵官逹音布先驅追及戰沒阿巴泰督諸將繼進斬昻安及其子俘其衆以還上行郊勞禮隨征將士分賜所俘十年十一月同三貝勒莽古爾泰貝勒濟爾哈朗等援科爾沁時察哈爾林丹汗圍科爾沁之克勒珠爾根城已數日我軍至農安塔林丹汗夜遁軍還十一年九月太宗文皇帝即位封阿巴泰貝勒阿巴泰語額駙揚古利逹爾漢曰戰則我擐甲胄行獵則我佩弓矢出何不得為和碩貝勒揚古利等以奏上命勸其勿怨望天聰元年五月上親征明錦州同貝勒杜度居守十二月察哈爾昻坤杜稜來歸設宴阿巴泰語納穆泰曰我與小貝勒列坐䝉古貝勒明安巴克俱坐我上實恥之納穆泰入奏上宣示諸貝勒於是大貝勒代善率諸貝勒訓責之曰德格類濟爾哈朗杜度嶽託碩託早隨五大臣議政爾不預阿濟格多爾衮多鐸皆先帝分給全旗之子諸貝勒又先爾入八分列爾今為貝勒心猶不足欲與和碩貝勒抗將紊紀綱耶阿巴泰引罪願罰於是罰甲胄雕鞍馬各四素鞍馬八二年五月同貝勒嶽託碩託征明錦州敵棄城退守寧逺自十三山站以東毁堠二十一斬守者三十人獲人畜毁錦州杏山高橋三城師還上出五里迎勞三年十月從上征明由喀喇沁之波羅河屯行七日同貝勒阿濟格率左翼軍克龍井關敗明援兵進克漢兒莊事詳英親王傳時右翼軍克大安口上親統師克洪山口並趨遵化十一月敗明援兵自山海關至者下遵化城由薊州三河縣趨通州明大同總兵滿桂宣府總兵侯世祿屯順義縣阿巴泰同嶽託擊走之獲馬千餘駝百餘順義知縣降大軍駐京城北土城關之東北明寧逺巡撫袁崇煥錦州總兵祖大夀以兵二萬來援屯廣渠門外阿巴泰同貝勒莽古爾泰阿濟格多爾衮多鐸豪格攻之聞敵右伏甚衆因約軍入隘趨右由正路入者與避敵同豪格趨右敗伏兵轉戰至城壕阿巴泰與豪格離由正路衝潰敵兵亦抵壕既收軍諸貝勒大臣議阿巴泰違約罪應削爵奪所屬人員給豪格上曰阿巴泰非怯懦者特以顧其二子致離豪格耳朕奈何以子故加罪於兄因宥之十二月同阿濟格等焚通州克張家灣從上至薊州敗敵援兵事具英親王傳四年正月捕斬叛將劉興祚於山海關事具鄭獻親王傳二月上旋蹕以阿巴泰同濟爾哈朗貝勒薩哈璘鎮永平四月明兵攻我軍駐守灤州者擊走之事具頴毅親王傳五年三月命諸貝勒直言時政阿巴泰奏曰國人怨惟患不知未有見善而不以為善見惡而不以為惡者臣無他能謹識上諭自今凡事從公斷而已七月初設六部命掌工部事八月從上圍明大凌河城正黃旗兵圍北之西鑲黃旗兵圍北之東阿巴泰軍其中䇿應十月明總兵祖大夀以城降上議取錦州䇿命阿巴泰同貝勒德格類多爾衮嶽託率兵四千作漢裝偕大夀及降兵三百五十人乘夜襲錦州二更行炮聲不絶錦州城中聞之以為大凌河圍者得脫分路應援我軍擊斬甚衆㑹大霧皆失隊伍乃收軍還七年三月監築蘭磐城五月召宴賜御用蟒衣一紫貂皮八馬一六月詔問征明及朝鮮察哈爾三者何先奏言明之情形皇上既悉知之其地利臣等亦熟識之襲其不備關門可得親統大軍駐關外擇貝勒大臣分路入關獲其人可用者用之消息易得錦州無足顧慮天時既至可令祖大夀入山海關與我兵㑹合攻取八月同阿濟格等征明略山海關而還訓誡之八年五月從上征明宣府八月同阿濟格克靈邱縣及王家莊獻捷大同城南山岡御營九年七月諭阿巴泰曰爾嘗自謂手疼似覺不耐勞苦不知人身血脈勞則無滯惟圖家居佚樂身不涉郊原手不持弓矢忽爾行動疾疼易生若日以騎射為事奚復患此凡有統帥士卒之責者非躬親教演士卒孰肯專心武事騎射之藝精於勤而荒於嬉不可不時加練習爾當努力奮勵毋偷安旦夕斯克敵制勝能報先帝養育之恩為國盡忠矣崇德元年四月晉封多羅饒餘貝勒六月同武英郡王阿濟格等征明大捷九月凱還事詳英親王傳十二月上親征朝鮮令駐防噶海城二年二月遣兵入明義州境捉生得二人是月朝鮮降上班師阿巴泰攜駐噶海兵還瀋陽三年二月上親征喀爾喀以阿巴泰與禮親王代善等留守並監築都爾弼城治盛京至遼河大路九月同睿親王多爾衮征明四年四月凱旋賜馬二銀五千兩事俱詳睿忠親王傳九月同武英郡王等赴明錦州寧逺偵敵五年六月同睿親王等赴明義州督兵屯田有功七月同貝勒杜度率兵設伏寧遠路殱明運糧兵獲米千石九月敗明杏山松山兵時大軍更番圍錦州受代而還十二月往圍錦州六年三月以聽從睿親王離錦州城三十里駐營及遣兵還家事論削爵奪所屬户口詔從寬罰銀二千兩六月復攻圍錦州敗明總督洪承疇援兵十三萬於松山獲馬五百七十上親征殱敵數萬九月駕旋留軍合圍松山杏山高橋命阿巴泰仍與諸王更番圍錦州七年三月錦州降同鄭親王濟爾哈朗進克杏山回駐錦州七月受代還叙功賜蟒縀七十是年十月授奉命大將軍同內大臣圖爾格等征明上親送郊外十一月由黃崖口入敗明總兵白騰蛟白廣恩於薊州破河間景州趨兖州擒明魯王朱以海及樂陵陽信東原安邱滋陽諸王分兵徇萊州登州青州莒州沂州南至海州凡攻克撫降城八十八還略滄州天津三河密雲八年六月由牆子嶺凱還上遣鄭親王睿親王等郊迎三十里賜銀萬兩順治元年四月叙功晉封多羅饒餘郡王二年正月統兵鎮山東𠞰平滿家洞土賊時明福王朱由嵩兵屯徐州東北遣都統準塔等往𠞰捷還三年三月薨年五十有八康熙元年二月以子嶽樂晉和碩親王贈如其爵十年六月追諡曰敏乾隆十九年九月入祀盛京賢王祠初次襲嶽樂饒餘敏郡王阿巴泰第四子初封鎮國公順治三年正月隨肅親王豪格征四川誅流賊張獻忠五年八月隨英親王阿濟格𠞰平天津土賊十一月復隨英親王駐防大同六年九月晉封多羅貝勒八年二月襲封多羅郡王改號曰安九年二月掌工部事十月預議政十年七月以喀爾喀部土謝圖汗車臣汗等違㫖不還所掠巴林戶口又來索歸順同部蒙古命為宣威大將軍駐歸化城相機進𠞰尋因喀爾喀悔罪入貢撤還十二年八月掌宗人府事十四年十一月諭奬性行端良蒞事敬慎晉封和碩安親王康熙十三年十月命為定逺平冦大將軍赴江西𠞰逆藩吳三桂耿精忠賊黨進鎮廣東十二月抵南昌詔移師征湖南王奏江西形勢為廣東咽喉江南湖廣要衝今三十餘城皆賊盤據且吳逆造木城於醴陵置僞總兵十餘人兵七萬猓猓三千堅守萍鄉諸隘若撤撫州饒州都昌防兵往湖南則諸處復為賊有否則兵勢單弱不能長驅且廣東諸路恐亦多阻臣欲先平江西賊無郤顧憂然後分防險要移師湖南得㫖令速行整理江西要地旋奏遣副都統穆成額等擊走吳逆僞總兵張泰殺賊五千餘復安福縣又奏副都統雅賚等招撫康山餘賊復都昌縣十四年二月奏護軍統領桑格等陳斬僞總兵朱一典謝以泰等復上高新昌二縣三月奏將軍希爾根前鋒統領舒恕敗賊撫州之唐埠及七里岡四月奏副都統珠喇禪等敗賊五桂寨徐汊等處并招撫冷口南湖西湖强山銅鼓營諸僞官復餘干東鄉二縣王親攻建昌耿逆僞將軍邵連登迎戰長興鄉擊走之復建昌府城分兵破賊於石頭街鸞石嶺白水山口遂復萬年安仁二縣閏五月諭留兵守建昌速回南昌居中調度是月奏都統霍特敗賊新城縣副都統珠喇禪敗賊武寧縣將軍額楚敗賊弋陽縣復廣信府六月奏將軍希爾根敗賊餘干縣復饒州又敗賊碣碑鋪及景德鎮復浮梁樂平二縣前鋒統領舒恕總兵許真敗賊宜黃躡之踰崇仁及樂安三縣並復七月奏泰和龍泉永新廬陵永寧及湖廣茶陵並就撫九月奏遊擊周志新等破吳逆僞總兵桂芳等復靖安縣十一月疏言吳逆聞臣進取長沙必固守要害非緑旗兵無以搜險非紅衣炮不能破壘乞令提督趙國祚都督陳平各率所屬隨臣進討並敕發新造西洋炮二十又奏希爾根額楚𠞰滅浮梁餘賊招降僞將張輔聖等復貴溪縣十二月奏耿逆僞總兵張存遣來告領兵八千屯順昌俟大兵進閩為內應詔以簡親王喇布已自江寧移駐南昌閩事付之料理王即進征長沙十五年二月王至萍鄉分兵四路破賊寨十二吳逆僞將軍夏國相遁收復萍鄉縣遂進薄長沙七月奏賊船集長沙城下我兵無船難破賊長沙附近林木多請先敕撥戰艦七十濟用并令督撫委員伐材造船詔並如所請入月諭曰朕聞王恢復萍鄉大創逆賊直抵長沙甚為嘉悅王其善撫百姓俾困苦得紓至脅從叛變之人原皆朕之臣子當加意招徠十六年正月遣副都統阿進泰等敗僞總兵解先聲及馬棚賊於瀏陽縣十二月遣兵敗賊平江縣復其城十七年閏三月奏遣兵追𠞰馬棚賊邱義尚於七家洞擒斬無算招降僞總兵揭玉慶朱永升等僞將軍林興珠率僞官楊廷言等自湘潭來降九月詔以三桂既伏冥誅賊勢漸潰宜廣示招徠速行攻𠞰王請自赴嶽州布置舟師調諸路大炮攻賊陸營上命大將軍貝勒察尼急圖嶽州王仍圍攻長沙十八年正月嶽州僞將軍陳珀僞總兵王度冲降於察尼軍餘賊潰竄長沙賊亦棄城遁王入城撫定遣前鋒參領沙納哈等復湘潭縣賊退據衡山縣王遣兵㑹簡親王敗賊衆衡州寶慶相繼復六月疏言臣所統護軍驍騎兵每佐領下十五人蒙古兵一百餘人喇布既進取新寧臣當率每佐領兵十一緑旗兵一萬與喇布相期進𠞰武岡東口賊留每佐領兵各一緑旗兵一千二百及荆州水師二千守衡州留每佐領兵各一緑旗兵一千守寶慶撥每佐領兵各二協同緑旗兵守嶽州詔如所議行是月遣都統釋迦保敗賊寶慶之巖溪斬級數百獲船四十餘僞總兵王熙忠僞副將陳起鳳僞知府金世正等降七月王統師抵紫陽河見賊營對岸令提督趙國祚副將尼滿偕降將林興珠渡河直前護軍統領瓦岱等繞出賊後夾擊大潰追斬二百餘級僞知縣周冠陳殿揚等降進攻武岡賊帥吳國貴胡國柱以賊二萬餘據隘口我軍奮攻炮斃國貴賊駭竄貝子彰泰追至木瓜橋殺賊無算遂復武岡州及楓木嶺八月奏捷得㫖嘉奬十一月命以敕印付貝子彰泰撤每佐領兵八率還京十九年正月上遣官迎宣諭曰王連年以來遠蒞巖疆親經百戰櫛風沐雨厯暑逾寒競揚貔虎之雄克清梟獍之孽湖湘諸處已見蕩平滇黔餘氛俱成坐困更體朕軫念窮荒之心廣示招徠深加撫恤王師所至遐邇來歸捷奏屢宣中外稱慶朕既嘉碩畫益篤親親爰命班師副朕懷想頃者聞王已抵武昌奏凱可期特遣使臣慰勞兼賜駱駝良馬以示優眷王其按程而來朕將計日以待三月凱旋上行郊勞禮於盧溝橋南二十里王俘僞明太子朱慈燦以來先是順治元年冬有赴故明外戚周奎家自稱太子者奎白諸朝令舊宫人及東宫官屬辨視非真法司鞫實太監楊玉取劉姓子詐冒狀並伏誅康熙十二年冬京師聞三桂反有自稱三太子朱慈璊者僞署廣德元年糾黨京城內外舉火作亂擒其黨於鼓樓西街及燈市口詰以朱慈璊云即楊起隆已遁矣十八年秋王駐營楓木嶺土人首擒僞軍師戴必顯無為教姚文明因獲朱慈燦於新化縣僧寺追訊前在京城逆謀慈燦訴已係崇禎帝長子十二嵗遭闖難出奔南京後未再至北京福王由嵩曽置諸獄釋為民即往河南隨朽木和尚為僧流落江西湖廣二十餘年因病還俗往來永州寶慶欲聲討吳三桂悖逆反覆不忠不孝不義諸罪商之戴必顯姚文明招兵散劄一年因三桂死中止王疏陳讞詞請㫖因言前此屢有冒明太子事朱慈燦雖云欲討吳逆招兵散劄但當大軍復寶慶時不即自首應與戴必顯姚文明並論斬其曽受僞劄人已示許自首續繳僞劄銷燬免罪慈燦既自稱真係明嗣當械至京辨識得㫖朱慈燦等著王帶來俟到日再議至是王移送法司令與前繫獄之朱慈璊逆黨對質俱不識詰其造印散劄與戴必顯姚文明謀亂屬實皆擬凌遲如律詔並改為處斬是年秋復有以朱慈璊之名在陜西煽誘者擒之漢中三河口大將軍圖海械送至京敇法司勘面有刺痕實非明嗣并非楊起隆依大逆律磔於市二十年十二月命王仍掌宗人府事二十七年七月以噶爾丹擾喀爾喀同簡親王雅布各率兵五百赴蘇尼特汛界駐防十月撤還二十八年二月薨年六十有五諡曰和三十九年十二月禮烈親王代善之曾孫原封貝勒諾尼訴嶽樂康熙四年掌宗人府事偏聽諾尼姑母讒言枉坐諾尼不孝死罪革爵繫獄䝉鑒原釋放嶽樂誣陷無辜理應反坐詔宗人府㑹同領侍衛內大臣察議復諾尼貝勒追降嶽樂為郡王削其諡二次襲瑪爾渾安郡王嶽樂第十五子康熙十六年正月封世子二十九年二月襲封多羅安郡王三十五年正月大軍將征噶爾丹命率兵往歸化城偵防四十年十月掌宗人府事四十五年充玉牒館總裁四十八年十一月薨年四十有七諡曰慤三次襲華玘安慤郡王瑪爾渾第二子康熙四十九年二月襲封多羅安郡王五十八年九月薨年三十有五諡曰節雍正元年十二月諭廷臣曰嚮時安郡王嶽樂諂附輔政大臣又自恃長輩每觸忤皇考䝉聖德寬仁始終容宥而伊諸子全不知感不務竭誠效力弟兄之間互相傾軋競事營求妄冀得爵讒害骨肉此衆所共知者瑪爾渾係應襲王爵之人似屬安分其子華玘尚無劣蹟而其嗣夭折封爵懸虛是以皇考審擇其人躊躇有待乃安郡王嶽樂之子伍爾占孫色亨圖等遽生怨望形於辭色夫國家恩施豈可倚恃而强邀今廉親王允祀借此逞其讒說以離間宗室舊人致朕從容施恩之本念俱不可行將襲封安郡王之本章發回不准承襲舊所屬佐領撤出另撥乾隆四十三年三月上追念饒餘敏郡王阿巴泰安郡王嶽樂纍著功績賜奉恩輔國公爵世襲罔替四次襲竒昆安節郡王華玘孫追封奉恩輔國公錫貴第二子乾隆四十三年三月襲封奉恩輔國公四月授散秩大臣四十七年七月卒年四十有四子年未及嵗現未議襲多羅克勤郡王嶽託傳嶽託太祖高皇帝孫禮烈親王代善第一子初授台吉天命六年二月大兵略明奉集保將旋有小卒指明兵所在嶽託同台吉德格類等擊敗之三月上征拔瀋陽大軍方追明總兵李秉誠於白塔鋪嶽託後至逐北四十里途斬三千餘人初喀爾喀扎嚕特貝勒昂安執我使者送葉赫被殺八年四月同台吉阿巴泰等討之事詳饒餘敏郡王傳十一年十月復隨父大貝勒代善征扎嚕特部有功是年封貝勒天聰元年正月同二貝勒阿敏貝勒濟爾哈朗等征朝鮮攻義州定州漢山三城克之渡嘉山江克安州至平壤其守者棄城遁遂渡大同江次中和遣諭朝鮮王李倧降阿敏欲直趨其都嶽託知不可止密與濟爾哈朗議駐師平山城復遣副將劉興祚諭李倧倧報願嵗貢方物嶽託謀曰吾等事已成矣蒙古與明皆敵國或有邊事當思備宜盟而班師既盟以告阿敏以己未與盟仍縱掠嶽託曰盟既成縱掠非義也勸之不可復令李倧弟覺與盟乃班師五月從上征明同三貝勒莽古爾泰等率偏師衛塔山糧運又從圍寧遠並有功八月敗明兵於牛莊斬守備一千總二百總二兵二百二年五月同貝勒阿巴泰碩託征明錦州有功事詳饒餘敏郡王傳三年八月略明錦州寧遠焚其積聚十月上親征明嶽託同濟爾哈朗由大安口入旦見明兵營山上嶽託率兵半駐以待濟爾哈朗以其半擊之復見明兵自遵化來援者顧謂濟爾哈朗曰我當擊此是日五戰皆捷十一月同阿巴泰敗大同總兵滿桂宣府總兵侯世祿於順義薄北京復從父代善擊敗明援兵十二月同貝勒薩哈璘等圍永平府克香河縣四年正月同貝勒豪格還守瀋陽五年三月命諸貝勒直言時政嶽託奏曰刑罰舛謬實在臣等祈皇上擢用直諌士近忠良絶讒佞行黜陟之典明加甄别則諸臣咸知激勸矣七月初設六部命掌兵部事八月上征明大凌河城自白土場趨廣寧嶽託同貝勒阿濟格等率兵二萬别由義州進㑹大軍都統葉臣率鑲紅旗兵圍城西南嶽託軍為䇿應十月明總兵祖大夀請降以子可法質可法見諸貝勒欲下拜嶽託曰戰則為仇敵和則為弟兄何以拜為命以國禮見因問爾等死守空城何意曰畏屠戮耳嶽託曰遼東以久抗不降故誅之殺永平人乃貝勒阿敏所為已論繫之矣我皇上即位以來敦行禮義治化一新養民受士仁心仁政爾等豈不聞之可法曰上於貧者衣食之富者秋毫無擾寬仁愛民之德實皆聞之遂辭歸越三日大夀以城降夜襲敗錦州兵事具饒餘敏郡王傳六年正月奏言前克遼東廣寧漢人拒命者誅之後復屠永平灤州漢人縱極力撫諭人懷疑懼今天與我以大凌河漢人正使天下知我善養人也臣愚以為善撫此衆歸順者必多當先豫以家室出公帑給其需儻蒙天眷奄有其地仍給還家産彼必悅服衆官宜令諸貝勒給莊一區每牛録取漢男婦二名牛一頭編為屯人給二屯其出人口耕牛之家牛録以官值償至明兵棄鄉土窮年戍守一苦也畏我誅戮又一苦也今慕義歸降之漢兵令滿漢賢能官善為撫恤毋致一人失所則人心歸附大業可成上嘉納之五月同濟爾哈朗等略察哈爾部於歸化城俘獲以千計九月同貝勒德格類拓疆自耀州至蓋州以南七年六月詔問征明及朝鮮察哈爾三者何先奏言時不可失山海關通州北京三路乘時圖其一則丕基定矣是月同德格類等率右翼楞額禮葉臣左翼伊爾登昂阿喇漢軍都統石廷柱元帥孔有德總兵耿仲明攻明旅順口俘獲無算八月奏言前蒙聖諭留一都統守旅順口今留葉臣伊爾登帥兩翼每旗留官三員兵二千五百名漢軍以逰擊佟圖賴主之統備禦二員兵百名駐守臣等自木場驛啓行俟抵我界貯炮車於蓋州留俘振旅是月師還上宴勞於郊以金巵酌酒賜之八年二月奏定馬匹倒斃擇牛録殷實之家酌免丁徭責令償補又奏減牛録下厮養卒得㫖惟哨長許留餘悉罷三月上大閲嶽託率滿洲䝉古等十一旗行營兵赴瀋陽城北郊列陳二十里許上駐蒲馬岡嶽託指示紀律軍容嚴肅上嘉奬之五月上征察哈爾諭留守盛京諸貝勒及將領等畢嶽託復曉於衆曰自隄岸以東巨流河以西原置十四哨爾等酌量布置晝則令軍士習射夜勿解衣張弓開甲囊以備不虞嶽託隨行有疾六月上臨視命還盛京九年二月同貝勒多爾衮薩哈璘豪格收降察哈爾林丹汗子額哲六月師還諸貝勒略明山西嶽託有疾以兵千留駐歸化城㑹土默特部人告博碩克圖汗子俄木布遣人偕阿嚕喀爾喀及明使者至將謀我嶽託伏兵邀之俄木布乳母之夫毛罕知之趣還伏猝起誅毛罕擒明使者隨命土默特捕斬阿嚕喀爾喀之謀匿馬駝者部分土默特壯丁三千有竒為十隊隊以官二員主之授條約並頒於鄂爾多斯尋諸貝勒㑹師於歸化城嶽託偕還崇德元年四月晉封和碩成親王八月以徇庇莽古爾泰碩託且有離間鄭親王濟爾哈朗及肅親王豪格事論死特㫖寬之降多羅貝勒罷兵部任十一月復命攝部事十二月從上征朝鮮國王李倧奔南漢山城同豫親王多鐸進圍之敗其援於城下二年八月命兩翼較射嶽託奏不能執弓上曰爾徐引射之不射如他王貝勒等何諭再三始引弓弓墮地者五遂擲之諸王等論嶽託驕慢當死上復寬之降固山貝子罷部任罰鍰三年正月復封多羅貝勒管旗務二月上征喀爾喀至博碩堆偵知扎薩克圖汗遁而還八月命為揚威大將軍貝勒杜度副之統右翼兵與左翼奉命大將軍睿親王多爾衮分道伐明九月至牆子嶺明兵入保外為三寨我師攻克之獲敵卒知保堅且有重兵不易拔嶺東西有間道可越於是分兵攻其前以牽敵師潜從間道踰嶺入克臺十有一尋以疾薨於軍年四十有一四年三月睿親王奏捷上覽奏無嶽託名驚問知病卒慟哭久之命勿使禮親王知四月喪還駕至沙嶺設幄遙奠還御崇政殿命王以下及諸大臣往奠復命乃回宫輟朝三日詔封為多羅克勤郡王賜駝二馬五銀萬兩葬盛京城南五里萬栁塘康熙二十七年十一月命立碑以紀其功乾隆八年駕幸盛京親詣王園寢賜酹四十三年正月上追念王忠勛命配享太廟其現襲之平郡王復封號曰克勤八月入祀盛京賢王祠是年駕幸盛京復詣王園寢賜酹四十八年如之初次襲羅洛渾克勤郡王嶽託第二子崇德四年九月襲封多羅貝勒管旗務五年五月同鄭親王濟爾哈朗等迎蒙古多羅特部蘇班岱等降衆敗明兵事詳鄭獻親王傳九月同鄭親王圍錦州六年三月復圍之設伏敗明援兵於南山西岡六月睿郡王多爾衮肅郡王豪格來代合擊明山海關援兵追及松山城而還八月從上征克松山擒明總督洪承疇巡撫邱民仰等七年七月叙功賜蟒縀七十八年正月以怨懟非議又敏惠恭和元妃薨時絲竹不輟論罪削爵五月復封多羅貝勒仍管旗事上命濟爾哈朗多爾衮召羅洛渾諭曰爾父屢獲罪愆因皇考太祖皇妣太后撫養為子朕視之如弟殁後猶追封克勤郡王并加恩於爾命為多羅貝勒管旗務爾不思率由善道以輔國政嗜酒作慝致干國法朕又追念爾父特行寬宥復爾多羅貝勒仍令管旗事爾當敬慎修身勤思善行若仍嗜酒妄亂不苐爾祿位難保即置爾於法亦所不赦至本旗所屬諸臣俱宜戒酒仍勸勉貝勒效力贖罪羅洛渾率諸臣叩首謝罪順治元年十月以從定京師破流賊有功晉封多羅衍禧郡王三年正月同肅親王豪格征四川八月薨於軍年二十有四五年正月喪還命貝子屯齊等迎之輟朝二日康熙十年六月追諡曰介二次襲羅科鐸衍禧介郡王羅洛渾第一子順治五年閏四月襲封多羅衍禧郡王八年二月改封號曰平十五年正月隨信郡王多尼征明桂王朱由榔於雲南破其晉王李定國鞏昌王白文選兵十六年六月賜蟒衣弓刀鞍馬旌其勞康熙二十一年七月薨年四十有三諡曰比三次襲訥爾圖平比郡王羅科鐸第四子康熙十八年正月封長子二十二年正月襲封多羅平郡王二十六年四月以毆斃無罪人羅米及折楊之桂菩薩保手足削爵四次襲訥爾福平比郡王羅科鐸第六子康熙二十四年正月封固山貝子二十六年五月襲封多羅平郡王四十年七月薨年三十有一諡曰悼五次襲訥爾蘇平悼郡王訥爾福第一子康熙四十年十二月襲封多羅平郡王五十七年十一月隨撫逺大將軍允禵收西藏尋駐博羅和碩五十九年正月移駐古木六十年十月攝大將軍事六十一年十一月復攝印如故雍正元年正月回京攝上駟院事四年七月以前在西寧軍前貪婪受賄削爵乾隆五年九月卒命仍以郡王禮葬六次襲福彭原襲平郡王訥爾蘇第一子雍正四年七月襲封多羅平郡王十年正月任鑲藍旗滿洲都統四月奏凡外省來京襲職旗員到日隨奏不令久候多費以仰副體恤至意從之閏五月授宗人府右宗正十一年二月充玉牒館總裁四月命軍機處行走七月命為定邉大將軍討逆賊噶爾丹策凌十一月師駐烏里雅蘇台十二月奏言軍中駝馬最要今喀爾喀扎薩克貝勒班第等感恩獻駝馬力請停賞值伏念逺臣當軍興際不肯私所有况宗室王貝勒貝子公等皆有馬場滋生馬匹豈不內愧於心臣家有馬五百匹願送軍前備用並將臣奏宣示諸王貝勒貝子等臣料諸宗臣等必以臣言為當彌切踴躍急公之義得㫖允行十二年六月奏言烏里雅蘇台扎克拜逹里克推河並應撤京城滿洲漢軍右衛寧夏察哈爾土默特兵三千六百所有內扎薩克及烏蘭察布兵三百七十調赴推河駐防現在烏里雅蘇台餘兵九千不敷調遣請以洪郭爾鄂隆所調滿洲兵六百再增撥四百速赴軍營從之是月王率將軍傅爾丹赴科布多總統北路軍營令內大臣薩木哈掌威逺將軍印辦理烏里雅蘇台軍務八月詔量撤北路兵王率副都統王常等領兵還十三年閏四月命總統大兵駐鄂爾坤七月於額爾德尼昭迤北築城尋以公慶復代還京乾隆元年二月上以北路所存糧米如何令䝉古兵支領並屯穫􅓱麥出陳易新之處詔令查議奏言䝉古兵向不給糧臣前以坐卡兵逺臨賊境取羊未便曾折給一月米糧兹蒙皇上軫念䝉古一視同仁加恩賞米臣議將存留之喀爾喀兵及坐卡臺站䝉古兵攙米支給今王大臣等又議將𣲖駐鄂爾坤之蒙古兵給糧在此時存米充裕不難概給倘日久米少議停轉生怨望且準噶爾鬼蜮多端將來或仍須䝉古兵移駐又豈能一例支給北地寒冷蓋藏得宜米可經三四年不壞臣愚於駐防䝉古兵酌量賞給餘請仍給羊價為便再鄂爾坤種地兵已撤􅓱麥無從易新青稞大小麥較尤不耐蒸遏應請恩賞蒙古米糧先給此項麥石又奏言喀爾喀所牧馬除留軍營備用外各遊牧處現有馬二萬九千餘內扎薩克各遊牧處馬四萬餘伏思鄂爾坤駐兵以歸化城為聲援其間距三千餘里鞭長莫及中途須接换有馬往來緩急始足恃請度適中地近臺站水草佳處設馬厰于土默特察哈爾兵內擇有眷屬者移駐牧放令歸化城都統協理再請撥騸馬萬兒馬二千令臺站總管撥入官馬厰牧放備用有事無難輕騎疾馳馬力足而人心可恃雖道逺無慮矣詔並下王大臣議行三月任正白旗滿洲都統十月調正黃旗滿洲都統三年七月預議政十三年十一月薨年四十有一諡曰敏七次襲慶寧平敏郡王福彭第一子乾隆十四年三月襲封多羅平郡王十五年九月薨年十有九諡曰禧無嗣八次襲慶恆原襲平郡王訥爾蘇孫貝子品級福秀第一子出為福彭後乾隆十五年十二月襲封多羅平郡王十九年八月任鑲紅旗漢軍都統二十六年十二月授宗人府右宗正尋總理鑲紅旗覺羅學二十七年閏五月坐旗員冒借官銀降固山貝子餘任悉罷四十年閏十月復封多羅平郡王四十三年正月命復克勤郡王始封之號仍為克勤郡王四十四年二月薨年四十有七諡曰良九次襲雅朗阿原襲平郡王訥爾圖孫閒散宗室訥清額第十子乾隆十六年十月授三等侍衛二十六年七月任鑲紅旗䝉古副都統九月授烏里雅蘇台參贊大臣二十七年八月調正紅旗滿洲副都統尋授科布多參贊大臣三十一年十二月任成都副都統三十四年三月授荆州將軍三十五年十月以袒護所屬驍騎校楚德降三級調用十一月以副都統品級往庫爾喀喇烏蘇辦事三十七年五月復以狥隱臺站屬員不法削副都統品級在伊犁印務筆帖式行走八月奉㫖著在庫爾喀喇烏蘇章京處辦事十月以副都統品級赴塔爾巴哈台十一月奉㫖雅朗阿辦事得制仍留庫爾喀喇烏蘇辦事三十八年十二月任三姓副都統三十九年十二月調盛京副都統四十年十月調黑龍江副都統四十一年十二月遷綏逺城將軍四十四年四月襲封多羅克勤郡王四十五年九月總理鑲藍旗覺羅學尋授宗人府右宗正四十七年二月任正白旗漢軍都統四十八年四月調鑲紅旗滿洲都統七月調正黃旗滿洲都統多羅謙郡王瓦克逹傳瓦克逹太祖高皇帝孫禮烈親王代善第四子天聰元年五月上親征明寧遠明總兵滿桂拒戰大敗之追至寧遠城下瓦克逹以力戰被創崇德五年七月隨睿親王多爾衮圍明錦州見敵兵出樵者以十餘人越前鋒統領布顔軍擊斬之六年八月明總督洪承疇集兵十三萬援錦州次松山大軍進擊之敵騎來奪我紅衣炮瓦克逹同輔國公滿逹海力戰卻之㑹天雨敵復來戰又敗之復進擊承疇三營步兵前鋒什長費雅思哈失馬瓦克逹與之纍騎而出參領哈寧阿墜馬創甚敵圍之數重瓦克逹直入其陳挈以歸順治元年四月隨睿親王入山海關敗流賊李自成追𠞰至望都十月隨英親王阿濟格由邊外趨綏德二年五月自成遁湖廣躡追至安陸府賊衆千餘方乘船遁瓦克逹同護軍統領鰲拜率師涉水登岸射殪賊衆無算獲其船以濟大軍三年正月叙功封三等鎮國將軍先是崇德八年八月因兄碩託兄薩哈璘之子阿逹禮謀立睿親王伏誅瓦克逹坐黜宗室至是復入宗室五月隨豫親王多鐸𠞰蘇尼特部騰機思騰機特等大敗之圖拉河進至布爾哈圖山瓦克逹與貝子博和託合軍斬千餘級擒八百餘人獲駝馬牛羊無算又擊敗喀爾喀土謝圖汗等兵十月師旋四年三月封鎮國公五年十一月晉封多羅郡王十二月以喀爾喀部擾我邊界命隨英親王阿濟格駐防大同姜瓖叛據大同附近郡邑應之王隨英親王圍渾源州六年三月睿親王統師拔渾源州令還京七月命同親王滿逹海𠞰賊朔州寧武八月以巨炮攻克朔州城僞總兵姜之芬僞兵道孫乾高奎遁王與輔國公薩弼擊敗其還戰兵移師攻寧武關僞總兵劉偉僞兵道趙夢龍焚城西遁王追之時大同僞總兵楊振威通欵英親王軍斬瓖首以降偉夢龍等亦率僞將五十餘人兵五千四百餘降於軍平靜樂縣及寧化所八角保諸寨十月詔滿逹海還京以王代為征西大將軍𠞰撫山西餘賊七年二月疏報大兵分𠞰潞安平陽澤州叛黨僞總兵申亥郭中傑魏閔各率餘黨歸順廢官李建泰叛據太平縣圍之二十餘日窮蹙出降詔誅建泰及其兄弟子姪籍家産入官三月奏復平陽府屬三十六州縣四月班師八年二月加封號曰謙三月命諸王分管部務王掌工部十月預議政九年正月以醫人何大福出入部署辱罵職官招搖嚇詐伏誅王坐徇縱罰鍰解部任四月罷議政八月薨年四十有七康熙十年六月追諡曰襄初王𠞰山西賊時常駐平陽後平陽民追思其戢軍安民建祠以祀榜曰多羅謙郡王廟初次襲哈爾薩謙襄郡王瓦克逹第三子順治十年閏六月議政王等以瓦克逹曽獲罪郡王爵不應承襲上憐其子留雍哈爾薩命食奉國將軍品級俸康熙六年四月哈爾薩等訴其父軍功輔政大臣鰲拜尚書馬爾賽為哈爾薩姻戚議封哈爾薩鎮國公留雍鎮國將軍八年七月留雍以已不得與弟一例晉爵訴不平議政王奏留雍等俱夤緣得封應革哈爾薩鎮國公并原有之奉國將軍品級留雍應革鎮國將軍仍食奉國將軍品級俸得㫖哈爾薩奉國將軍品級俸乃世祖章皇帝恩給仍如舊二十一年五月哈爾薩復訴父爵係軍功所得例得襲宗人府以奏命襲封鎮國公并封其子海青為輔國公二十二年八月授宗人府左宗人二十四年九月遷右宗正二十五年十月諭責哈爾薩鑽營不安分罷右宗正任削鎮國公及海青輔國公爵二次襲留雍謙襄郡王瓦克逹第二子康熙二十五年十月襲封鎮國公三十七年四月詔宗人府㑹同領侍衛內大臣察劾行走懶惰者削留雍爵停襲乾隆四十三年三月上追念謙襄郡王瓦克逹勞績賜一等鎮國將軍爵世襲罔替三次襲洞福原襲鎮國公留雍曽孫初留雍第三子原封三等輔國將軍台渾生忠端為閒散宗室洞福忠端第二子也乾隆四十三年三月襲封一等鎮國將軍四十九年十月授護軍參領多羅順承郡王勒克德渾傳勒克德渾太祖高皇帝曾孫追封頴毅親王薩哈璘第二子兄阿逹禮以謀立睿親王多爾衮伏誅勒克德渾亦坐黜宗室順治元年十一月上念勒克德渾年幼未與謀命復入宗室封多羅貝勒二年七月命為平南大將軍代豫親王多鐸駐江寧分兵𠞰撫兩浙時明魯王朱以海據浙東稱監國其大學士馬士英等率兵渡錢塘江立營擊郤之九月遣左翼副都統珠瑪喇敗士英於餘杭右翼副都統和託敗其總兵方國安於富陽兩翼合營杭州城三十里外敵來突復大敗之士英國安復渡江來窺為副都統濟席哈等所敗溺死無算時明唐王之總督何騰蛟合流賊一隻虎等竊據湖廣州郡十一月命同鎮國將軍鞏阿岱都統葉臣征之三年正月大兵自江寧抵武昌偵知叛賊總兵馬進忠王進才應騰蛟於長沙遣護軍統領博爾輝等進擊賊千餘掠臨湘殱之抵嶽州叛將遁降其副將黑運昌至石首聞賊渡江犯荆州遣尚書覺羅郎球等以偏師赴南岸伺賊渡擊之大兵乘夜疾馳詰旦抵城下分兩翼躪賊營大破之斬獲甚衆薄暮郎球等亦盡奪賊船歸翌日遣奉國將軍巴布泰等分追賊於安逺南漳喜峯山關王嶺襄陽府擊斬殆盡次彞陵流賊李自成弟孜僞磁侯田見秀僞義侯張耐僞武陽伯李佑僞太平伯吳汝義及僞將三十九人馬步賊五千有竒詣軍前降獲馬騾牛萬二千餘捷聞得㫖優奬七月班師十月賜金百兩銀二千兩五年九月晉封多羅順承郡王尋同鄭親王濟爾哈朗拔湘潭擒騰蛟事詳鄭獻親王傳移師征廣西賊渠趙廉犯全州率前鋒統領席特庫等敗之獲馬四十餘曹槓子據永安關破其營斬關入九月曹槓子復率黨萬餘冦道州又擊敗之七年正月師還賜金五十兩銀五千兩五月預議政八年三月掌刑部事九年三月薨年二十有四康熙十年六月追諡曰恭惠初次襲勒爾錦順承恭惠郡王勒克德渾第四子順治九年八月襲封多羅順承郡王康熙十一年八月掌宗人府事十二年十二月逆藩吳三桂反命為寧南靖冦大將軍由湖廣進征十三年三月駐荆州時沅州常德相繼失陷賊兵自蜀道直抵巴東襄陽勢甚急遣都統鄂內馳防是月僞將劉之復率舟師犯彞陵夾江立五營遣護軍統領額司泰等水陸並擊賊大敗遁歸宜都四月僞將陶繼智復自宜都來犯敗之七月敗僞將軍吳應麒等十四年五月賊犯均州遣都統伊里布等屢敗之斬獲無算六月僞將軍楊來嘉列陳山頂自山溝下斷我歸路我師分擊之陳斬三千餘級是月疏言逆賊逼彞陵兵衆舟多又於虎渡口運糧及火器請益戰艦以斷運道從之七月奏僞將軍張以誠王㑹等連來嘉犯南漳遣伊里布期總督蔡育榮分擊之八月疏言賊立壘掘塹騎兵不能衝突須簡緑旗步兵造輕箭簾車炮車駕以連進填其壕用炮轟擊繼以滿兵則逆賊可滅上如所請十月復興山縣十二月疏請益禁旅上以遷延時日責之十五年三月統兵自荆州渡江遣前鋒參領卦爾察敗賊文村又敗之石首尋以擊賊太平街失利退荆州具疏請罪上復切責之九月奏副都統塞格𠞰賊鄖西復其縣十七年十一月奏先後投誠僞官及房縣來歸之僞總兵何以敬等雖授劄示鼓舞而止食兵糧生計難給上以何以敬等慕化來歸悉豫半俸十八年正月疏言新增兵萬二千請設隨征前後左右四營總兵官分轄從之是月渡江分路𠞰松滋枝江宜都及澧州以次復守百里洲僞將軍洪福率舟師降二月進取常德賊先期焚廬舍舟艦遁僞按察使陳寶鑰等迎降又招撫僞巡撫李益陽知縣張文明總兵黃志功副將楊逹武等又遣遊擊許嘉謨兵至青石渡賊首潘龍等迎敵我兵左右夾擊追至平峪鋪斬及落崖死者無算復衡山縣進攻歸州敗賊廖進忠于馬黃山賊向巴東遁追至西壤大敗之復歸州巴東十九年二月命進取重慶尋奏留將軍噶爾漢之兵於荆州防禦七月王率兵赴重慶中途返具疏自劾請解大將軍任往沅州效力上責令率所屬官兵還京十一月議以老師糜餉坐失事機削爵二次襲勒爾貝原襲順承郡王勒爾錦第三子康熙十九年十二月襲封多羅順承郡王二十一年二月薨年五嵗三次襲揚竒原襲順承郡王勒爾錦第四子康熙二十一年七月襲封多羅順承郡王二十六年四月薨年七嵗四次襲充保原襲順承郡王勒爾錦第七子康熙二十六年五月襲封多羅順承郡王三十七年九月薨年十四嵗五次襲布穆巴原襲順承郡王勒爾錦第五子康熙三十八年正月襲封多羅順承郡王五十四年五月以御賜鞍馬給優人為護軍校賴圖庫妻所訐削爵六次襲諾羅布順承恭惠郡王勒克德渾第三子康熙三十七年正月授頭等侍衛三十八年二月擢鑲黃旗漢軍副都統十二月調鑲藍旗滿洲副都統四十年九月遷正黃旗䝉古都統預議政十一月攝右翼前鋒統領四十二年四月授杭州將軍五十四年五月襲封多羅順承郡王五十六年二月薨年六十有八諡曰忠七次襲錫保順承忠郡王諾羅布第四子康熙五十六年十月襲封多羅順承郡王雍正三年三月掌宗人府事並命在內廷行走四年五月諭曰順承郡王錫保才品優長乃國家實心效力之賢王今在內廷行走差遣甚多王之費用亦多著給與親王俸護衛官員俱照親王之數用九月授鑲藍旗滿洲都統五年九月調正黃旗漢軍都統先是錫保徇庇貝勒延信罪狀不奏又將不能騎馬之章京派拏延信以致遲誤十一月議削爵得㫖寬免其特恩賞給之親王俸及護衛官員俱撤回旋降任左宗正七年三月大軍征噶爾丹䇿凌王署振武將軍印赴阿爾台軍營八年十一月奏八旗駐防官兵軍營效力兩年巡牧均已習練請仍留俟大兵凱旋不必如例三年更代詔如所請行初王奏喀爾喀遊牧處安頓妥協其三路副將軍各思效力已將禦賊守城之䇿商酌預備九年七月上以錫保防範有方傳諭慎籌喀爾喀等處戰守機宜八月諭宗人府曰錫保自派往軍營以來辦理軍務克殫誠心勤勞宣力甚屬可嘉王之祖多羅頴郡王亦係國家懋著勞績之賢王著將錫保晉封順承親王九月命嚴守察罕庾爾十月疏言準噶爾賊大䇿凌敦多卜小䇿凌敦多卜多爾濟丹巴等自華額爾齊斯至索勒畢烏拉克沁留兵四千應援率兵二萬六千犯科布多等處見我軍强盛不敢輕進遂抵克嚕倫令賊將海倫鄂勒錐等掠喀爾喀游牧大䇿凌敦多卜兵向蘇克阿勒逹呼屯劄小䇿凌敦多卜子曼濟掠鄂爾海西喇烏蘇臣令王丹津多爾濟等合兵邀擊至鄂登楚勒遣台吉巴海夜入大䇿凌敦多卜營擒其衆賊將衮楚扎卜喀喇巴圖魯復率兵三千來禦我兵誘斬賊將喀喇巴圖魯衮楚克扎卜傷遁擒殺數百大策凌敦多卜等移營台什哩山曼濟兵亦敗歸俱由哈布塔克拜逹克遁疏入詔嘉奬之十一月授靖遠大將軍先是上以軍前大臣甚少命錫保於軍營營總官中擇可勝副都統護軍統領之任者密封陳奏十年二月疏言新調吉林佐領委署前鋒翼領阿思哈黑龍江協領委署前鋒翼領布爾沙均屬效力請賞給副都統職銜詔允之七月偵知賊赴額德爾河源遣王丹津多爾濟等率兵於奔博圖山嶺堵截八月師至額爾德尼昭遇賊兵鏖擊十餘次賊且戰且却日暮抵大山梁一面逼水戰益酣殺賊萬餘尸滿山谷餘賊負傷奔獲械畜無算十一年四月奏言察罕廋爾當阿爾台諸路要道建城駐兵厯有年所嗣以薪芻不足移駐阿勒逹爾托羅海去年又移駐烏里雅蘇台此外尚有額德爾齊德爾特爾啓塔密爾地各寬濶然並在杭愛山陽與內地近至特斯等處僻在迤北若賊由南路來犯邀擊堵禦呼應不靈並不便駐大兵今已於烏里雅蘇台山嶺分建炮臺左近令滿洲蒙古兵駐劄且特斯台什哩各駐萬人賊不敢逼應請即於烏里雅蘇台內外植木中實土為城設倉庫明春以察罕廋爾所貯銀米軍裝火藥等物陸續解運上從之七月議賊越克爾森齊老時不速發援失機罷大將軍任削爵八次襲熙良原封順承親王錫保第一子雍正三年十月封輔國公尋授散秩大臣五年七月晉封鎮國公十年正月封世子三月署鑲紅旗漢軍都統十一年七月以父罪革世子十二月襲封多羅順承郡王乾隆元年二月管鑲藍旗覺羅學九年四月薨年四十諡曰恪九次襲泰斐英阿順承恪郡王熙良第一子乾隆九年九月襲封多羅順承郡王十三年十二月授宗人府右宗正十五年九月管鑲紅旗覺羅學十九年四月任左翼前鋒統領十月遷正黃旗漢軍都統二十一年六月轉左宗正七月薨年二十有九諡曰恭十次襲恆昌順承恭郡王泰斐英阿第七子乾隆二十一年十月襲封多羅順承郡王四十三年二月薨年二十有六諡曰慎十一次襲倫柱順承慎郡王恆昌第一子乾隆五十一年二月襲封多羅順承郡王欽定宗室王公功績表傳卷八
