body:
  text: 欽定四庫全書欽定宗室王公功績表傳卷五傳三親王和碩豫親王多鐸傳多鐸太祖髙皇帝第十五子初封貝勒天聰二年二月從上征多羅特部有功賜號額爾克楚呼爾三年十月從上征明由龍井闗入同貝勒莽古爾泰多爾衮以偏師圍漢兒莊城降之遂㑹大軍克遵化進薄京城明寧逺巡撫袁崇煥錦州總兵祖大夀以兵二萬來援屯廣渠門外諸貝勒敗之追至壕多鐸以幼後潰卒来犯郤之十二月旋師薊州遇明援兵自山海闗来距城二里許列陣多鐸同諸貝勒擊殱之五年三月命諸貝勒直言時政多鐸奏曰臣未預理刑其中公私不得知但觀法司諸臣實心任事秉公執法者少當令明習法律遵守成規八月從上圍明大淩河城正白旗兵圍東北多鐸軍為策應旋同大貝勒代善等克近城臺保九月明援兵七千出錦州拒我前鋒軍於小淩河岸上以兵二百馳擊敵潰遁多鐸追迫錦州墜馬馬逸入敵陣乃乗軍校扎福塔之馬而還越十日明援兵四萬距大淩河十五里列營多鐸從上擊敗之十一月同貝勒濟爾哈朗往塔山東沿海截隘俘百餘人六年五月從上征察哈爾林丹汗遁同濟爾哈朗多爾衮等俘其衆千餘於歸化城西南黄河岸七年六月詔問征明及朝鮮察哈爾三者何先奏言我兵非怯鬭止攻山海闗外城豈可必得夫攻闗外城與攻北京城名雖不同勞苦則一宜直入闗庶可壓士心成久逺計且相機審時古語有之若緩旦夕敵漸知備固城池修根本何隙之可乗我何愛於明祗念士卒勞苦姑與和若時可取原不待再計至察哈爾且勿加兵朝鮮已和勿遽絶惟先圗其大者如䝉天佑得之餘隨所求皆至矣八年五月從上征明入龍門口敗明兵克保安州事詳英親王𫝊復畧朔州至五臺山還從上擊敗明兵於大同城南九年五月上先遣諸貝勒征明山西度明必調寧逺錦州兵徃援命多鐸以軍入寧錦界牽制之遂由廣寧進以都統阿山石廷柱率兵四百前驅大夀令副將劉應選吳三桂劉成功趙國志合錦州松山兵三千五百營大淩河西多鐸甫過十三山站阿山等遣人以敵數報多鐸盡率所部馳擊塵蔽天明兵驚潰我軍兩路追擊一至錦州一至松山斬應選及軍官八人兵五百擒逰擊曹得功等獲馬二百餘甲胄無算翼日攻克一臺回駐廣寧邊境旬餘乃還駕出懐逺門五里迎勞諭嘉其初專閫外能出竒取勝賜良馬五甲五崇徳元年四月晉封和碩豫親王六月命掌禮部事八月同睿親王多爾衮征明錦州降胡有陞等由義州還十二月上征朝鮮由沙河保領兵千繼前鋒軍至朝鮮國都其國王李倧遁南漢山城進圍之其臣在外者以兵二萬餘援城中兵亦出屢擊之㨗迎上駐城西獻所獲馬械命分賚有差二年正月朝鮮全羅忠清兩道援兵列營南漢山命多鐸往視朝鮮兵拒山下敗之追奔上山值雪隂晦乃還旦復進朝鮮兵已拔營遁收其馬千餘三年九月上至演武場送睿親王征明王以目疾甫愈不至命俟睿親王班師議罪仍從上征明錦州由䝉古托衮博倫界分道同貝子博洛率䕶軍及土黙特兵入明境俘斬哨卒十餘攻克桑阿爾齋舊所居之大興保斬守備及壯丁二百俘其户口道擒大夀諜二人詔往助鄭親王濟爾哈朗軍將過中後所大夀以兵来襲傷我兵九人掠馬三十王且戰且退斬三十人夜達鄭親王營翼日合兵薄中後所城上統師至敵不敢出四年五月議前不送出師及中後所失士馬罪降多羅貝勒八月命掌兵部事十月同肅親王豪格征明寧逺敗敵城北山岡斬總兵金國鳯及其二子五年三月命同鄭親王分統左右翼兵往義州葺城屯田逾月畢工墾田東西四十里復同迎䝉古多羅特部蘇班岱等降衆敗明兵賜御厩良馬一事詳鄭獻親王傳十一月圍錦州夜伏兵桑阿爾齋保旦敵至敗之追至塔山斬級八十餘獲馬二十六年三月復同鄭親王圍錦州收其守郛䝉古將諾木齊等屢敗明兵杏山松山間事俱詳鄭獻親王傳八月明總督洪承疇以八總兵十三萬衆来援錦州上親統大軍臨之自盛京馳六日環松山而營明兵震怖宵遁上命多鐸設伏明總兵吳三桂王樸從杏山奔寧逺我前鋒兵自杏山西逐之至髙橋伏起殺敵無算九月上旋蹕留多鐸與諸王更畨圍松山城中兵夜出犯鑲黄旗營敗之斬級千餘十二月又犯正黄旗正紅旗營沿壕射郤之殪四百餘人七年二月明松山副將夏承徳遣通欵以其子舒出質約内應夜半梯而登生擒承疇及巡撫邱民仰總兵王廷臣曹變蛟祖大樂等七月叙功晉封多羅豫郡王十月貝勒阿巴泰由黄崖口征明薊州命多鐸屯寜逺邉境以牽制明兵至則遣人入略俘百餘人敵出戰敗之多獲牲械八年四月因聖躬違和有事祈禱疏言兵不得已而用今日之勢宜暫息兵至國中興作俟規模既定然後舉行但當以農務為急農務克勤則庶民衣食豐足衣食豐足則舉國慶豫聖躬長享安和矣此後舉行未晚也順治元年四月隨睿親王入山海闗破流賊李自成十月晉封和碩豫親王時明福王朱由崧自立於南京設江北四鎮扼淮徐為割據計上命多鐸為定國大將軍統師南征值河南奏流賊肆掠懐慶詔先𠞰賊河南十二月至孟津遣䕶軍統領圗賴先渡河走賊守將黄士欣等沿河十五寨保望風歸附睢州明總兵許定國玉寨首領李際遇降至陜州賊將張有曾壁靈寶縣城外拔之進距潼闗二十里賊據山列營前鋒統領努山鄂碩等攻破之圗賴復率騎掩殺甚衆偽汝侯劉宗敏遁二年正月賊將劉方亮犯我營郤之自成親率步騎迎戰大軍進擊殱其步卒賊騎奔夜屢来犯皆敗還賊鑿重壕立堅壁大軍發巨礟進攻更疊戰方酣賊騎三百横衝我師貝勒尼堪貝子尚善等躍馬夾擊賊敗衂都統恩格圗等躡之斬獲甚衆諸軍連破賊營屍滿壕塹委軍械甲胄彌山野自成精銳略盡遁還西安偽呉山伯馬世堯率所部七千餘衆降大軍入闗獲世堯所遣致書自成者三人並世堯斬以徇越二日師至西安自成已先五日燬室廬挈子女輜重出藍田口竄商州南走湖廣二月奏捷諭嘉壯猷偉略調度有方命以陜西事付英親王阿濟格即由河南趨淮揚討南京之稱號自立者是月旋師河南流賊偽平南伯劉忠迎降三月分徇南陽開封親統師趨歸徳州縣望風納欵所至撫兵民設官屬疏請速鑄給印信以防詐偽從之詔奬方收闗陜旋定中原𠞰冦安民勲庸茂著賜寶飾佩刀鋄金鞓帶四月趨泗州明守將焚橋遁遂夜渡淮直趨揚州距城二十里立營令鎮國將軍漢岱等前趨獲船三百餘翼日薄城招諭明大學士史可法翰林學士衞允文等降不從攻七日克其城擒斬之五月師至揚子江北岸明鎮海伯鄭鴻逵等以水師分守𤓰州儀真我軍左右對敵列營相持三日造船二百餘留左翼兵駐江北岸遣鎮國將軍拜音圗等直渡江副都統李率泰引大軍以次渡福王聞揚州失守遁太平大軍至南京明忻城伯趙之龍魏國公徐州爵大學士王鐸禮部尚書錢謙益等迎降收文武官數百貟馬步兵二十三萬有竒王入駐城中安撫居民令投誠軍悉歸伍遣貝勒尼堪貝子屯齊等追福王於太平復走蕪湖欲渡江圗賴等邀之江口明靖國公黄得功迎戰敗中流矢死總兵田雄馬得功縛福王及其妃歸我軍諭嘉王與諸臣同心協力克奏膚功遣侍衞赴軍勞之初福王走太平其大學士馬士英挾福王母南走杭州議奉潞王朱常淓拒守六月貝勒博洛等趨杭州士英迎戰敗渡錢塘江逃常淓率衆降淮王朱常清亦自紹興来降浙東西悉歸順王承制改南京為江南省疏授江寧巡撫安慶巡撫以下官三百七十三人有偽稱杜陽王煽亂廬江和州間者遣總兵呉勝兆等𠞰平之尋奉詔俟貝勒勒克徳渾至江寧俘福王等還京十月凱旋上行郊勞禮於南苑晉封和碩徳豫親王賜黑狐帽紫貂朝服金五千兩銀五萬兩馬十鞍二三年五月蘇尼特部騰機思騰機特等叛奔喀爾喀詔集外藩諸蒙古兵於克嚕倫河以多鐸為揚威大將軍同承澤郡王碩塞統師追𠞰七月師至盈阿爾察克山聞騰機思在衮噶嚕台星夜疾進三日敗賊於諤特克山斬台吉茂海渡圗拉河追至布爾哈圗山斬騰機特子二騰機思孫三及喀爾喀台吉十三人盡獲其家口輜重師次扎濟布喇克喀爾喀土謝圖汗兩子以兵二萬碩雷汗子以兵三萬兩路迎戰我師奮擊大捷追奔三十餘里先後斬級數千俘千餘人獲駞千九百馬二萬一千一百牛萬六千九百羊十三萬五千三百有竒十月凱旋上出安定門迎勞宴之所獲牲畜悉頒賚將士加賜王鞍馬一四年七月晉封輔政叔徳豫親王賜金千兩銀萬兩鞍馬二增冊文稱定鼎中原以來所建功勲卓越等倫云六年三月薨年三十有六立碑紀功九年三月鄭親王濟爾哈朗等議多爾衮既削封爵多鐸係其母弟應追降郡王從之康熙十年六月追諡曰通乾隆四十三年正月諭廷臣曰豫親王多鐸從睿親王入闗肅清京輦即率師西平流冦南定江浙實為開國諸王戰功之最乃以睿親王之誣獄株連降其親王之爵其後又改封信郡王雖至今承襲罔替但以王之勛績超邁等倫自應世胙原封以彰殊眷豈可以風影微𤯝輒加貶易命追復親王及封號並配饗太廟八月入祀盛京賢王祠初次襲多尼豫通親王多鐸第二子崇徳七年七月封多羅郡王順治六年十月襲封和碩親王七年五月預議政八年二月加號曰信九年三月追降多鐸為郡王多尼亦降多羅信郡王罷議政十月復議政十五年正月上命多尼為安逺靖冦大將軍偕平郡王羅科鐸貝勒尚善杜蘭等征明桂王朱由榔與四川廣西兩路軍㑹期進取九月由湖南入貴州㑹平越十一月由貴陽趨安莊衞由榔之晉王李定國焚磨盤江鐵索橋遁十二月大軍以浮橋濟遂自交水至松嶺衞擊走其鞏昌王白文選十六年正月薄雲南省城定國文選挾由榔奔永昌王入城駐守令貝勒尚善等由鎮南州克永昌府及騰越州六月以王跋涉險阻經厯寒暑𫝊諭慰勞賜御衣一蟒袍一及鞍馬弓矢等物十七年五月凱旋上遣内大臣迎勞六月追論在雲南時誤坐前鋒統領瑚哩布等磨盤山敗績罪罰鍰十八年正月薨年二十有六諡曰宣和二次襲鄂扎信宣和郡王多尼第二子順治十八年六月襲封多羅信郡王康熙十四年三月察哈爾布爾尼叛上命鄂扎為撫逺大將軍往討以大學士圗海副之瀕行諭曰大兵出山海闗當宣布累朝待布爾尼厚恩及朕不忍加誅之意彼若悔罪来歸則己否則以敕書付縱還䝉古持往諭之即布爾尼等臨陣来降亦當保全恩養四月軍次岐爾哈台偵賊屯達禄王留輜重與圗海及副都統烏丹等輕騎前布爾尼設伏列陣待王分布滿洲䝉古兵山澗間賊伏發撓我土黙特兵破之布爾尼列火器以拒大軍奮擊賊大敗復收潰卒戰幾殱之獲馬械無算布爾尼偕弟羅布藏以三十騎遁至扎嚕特境貴勒蘇台為科爾沁赴調之部長沙津射殪察哈爾平王招撫餘黨千三百餘户閏五月師旋上迎勞於南苑諭褒以逺行征討建立大功賜金百兩銀五千兩二十四年十二月掌宗人府事二十九年七月噶爾丹深入烏珠穆沁上命恭親王常寧為安北大將軍鄂扎副之三十五年二月上親征噶爾丹以王統領正白旗營三十八年十二月以惰解宗人府任四十一年十月薨年四十有八三次襲洞鄂豫通親王多鐸第七子順治十八年正月封多羅貝勒康熙十三年四川叛應逆藩吳三桂上命洞鄂為定西大將軍同貝子温齊輔國公綽克托討之師由陜西進將抵略陽陜西提督王輔臣叛於寧羌州洞鄂以道阻退次漢中留將軍錫卜臣等駐守自引兵出棧道由鳯縣至鳯翔復留副都統赫業等駐守身率餘兵回西安十四年正月上諭廷臣曰蘭州近邊要地應速遣兵駐守今保寧大兵已囘西安達禮善巴圗魯兵亦將至西安其撥西安現在兵每佐領下四五名赴蘭州𠞰禦逸賊洞鄂疏言蘭州固宜遣防但保寧還卒鎧甲未備達禮善巴圗魯兵兼程来恐難驟遣若以西安兵往恐輔臣由陳倉諸路斷我棧道自秦州平凉来逼深為可虞又疏言興安兵變殺總兵王懐忠臣等出示安撫仍止前往興安之副都統穆舒渾兵上敕撫慰興安又諭洞鄂曰陜西重地棧道闗係尤急沔州秦州乃通漢中要路其若何據守保固與總督等㑹議務期萬全時鳯縣賊毁偏橋守隘阻運輔臣所部王好文等復斷棧道二月諭責洞鄂等退縮遲延致狡冦阻截仍嚴飭往定平凉秦州諸路於是將軍阿宻達署副都統鄂克濟哈等率所調與京兵西安兵往平涼洞鄂與温齊綽克托等率囘自保寧及達禮善巴圗魯兵往秦州是月賊陷蘭州敕兩路兵速進洞鄂至隴州經仙逸闗偽總兵髙鼎蔡元拒闗山河岸洞鄂與署前鋒統領穆占西安將軍佛尼勒等分布前後隊先遣都統赫業為竒兵應援合力衝擊賊敗遁獲馬械無算進復闗山闗追擊五十里三月大軍次渭河奪其橋圍秦州四月四川平涼諸賊萬餘来援屯南山城内突出賊八千餘分擊敗之克東西兩闗屢敗賊陣斬偽總兵何隆李國棟招撫偽文武官二百二十餘兵八千四百餘安輯民人九萬有竒復秦州佛尼勒等追𠞰至閻闗賊迎戰敗之復禮縣追賊至西和殺千餘人陣斬偽官三十清水伏羌俱平捷聞詔嘉奬六月復遣安西將軍穆占復鞏昌偽總兵趙士昇以蘭州降七月上諭洞鄂曰國家仰荷天眷秦州鞏昌蘭州等處漸次恢復朕甚嘉悦此係保寧還斾之兵間闗跋涉戮力効命所致須不時存念恤其勞苦非𦂳要必節其勞無大過則寛其罰爾等將兵在外事情經練頗多必能同寅協恭折衷而行但相隔遼逺意慮所及不得不為告誡秦地實為形勝要區今將軍提督總兵及投誠兵衆雲屯一處將軍張勇勞績甚多恐貝勒等藐忽視之生彼憤懣時厪朕懐貝勒等既効勤勞底定秦省務期克奏全功以慰朕望八月招撫歸川十二保偽㕘將普國祥及兵千餘與將軍畢力克圗阿宻達㑹平凉賊出戰擊斬偽總兵郝天祥斃賊無算九月遣副都統鄂泰阿爾琥敗賊於寳雞縣羊添池山焚其營十二月疏言大兵攻平涼克取第一闗廂距城三里許對南山屯營欲進薄城因溝深地險難下壘故未能即下諭宜斷賊餉道以困之十五年二月諭兵部曰大將軍貝勒洞鄂等屯兵平涼日久賊冦尚未𠞰滅城池尚未恢復夫秦省不能即定川賊尚在窺伺者皆由王輔臣未𠞰滅平涼未克取故也其以都統大學士圗海為撫逺大將軍亟赴陜西𠞰滅逆孽其貝勒洞鄂以下悉聴大將軍節制是月疏言聞逆賊將斷闗山擬遣兵往守但現在兵少難分至鞏昌雖有副都統翁愛率兵前赴而賊逼可虞命將軍錫卜臣等調兵守闗山張勇等堵𠞰出犯秦鞏之賊十六年二月上以洞鄂統兵出征殊負委託削貝勒爵三十一年九月任正藍旗滿洲都統四十二年三月襲封多羅信郡王四十五年七月薨年六十禮部請䘏諭廷臣曰洞鄂補授都統襲封王爵以来並無感恩効力之處且原係軍政問罪之人不准賜䘏其王爵亦當論嫡長所生應以前信郡王鄂扎之子徳昭襲四次襲徳昭信郡王鄂扎第五子康熙四十五年七月襲封多羅信郡王雍正二年十一月授宗人府左宗正四年八月命管正白旗事務五年十一月轉右宗正乾隆二十七年二月薨年六十有三諡曰慤五次襲如松豫通親王多鐸六世孫初王第三子多爾博出為睿忠親王後睿忠親王被罪未及襲還本宗封多羅貝勒多爾博生蘇爾發襲固山貝子生塞勤塞勤生功宜布皆襲輔國公如松功宜布第三子也乾隆十一年六月襲父爵輔國公二十七年七月任乾清門散秩大臣二十一年四月管健鋭營事六月署鑲黄旗滿洲副都統二十二年正月署領侍衞内大臣尋授宗人府右宗人二月授兵部侍郎四月授鑲紅旗滿洲副都統二十三年二月調正黄旗滿洲副都統九月遷正黄旗漢軍都統二十四年六月轉左宗人九月署兵部尚書十二月授領侍衞内大臣二十五年十月授綏逺城將軍二十六年十一月調西安將軍二十七年閏五月襲封多羅信郡王八月授正藍旗蒙古都統九月署領侍衞内大臣二十八年七月授右宗正十月管理宗人府銀庫事三十年十一月以縱輿夫開博場應革爵得㫖寛免在閒散王上行走如松請嵗繳王俸五千兩贖罪宗人府議不足蔽辜應革爵命照如松請仍免革爵三十五年十一月薨年三十有四諡曰恪六次襲修齡信慤郡王徳昭第十五子乾隆二十七年六月襲如松所遺之輔國公三十年十二月授散秩大臣三十四年十月授宗人府右宗人十二任正白旗滿洲副都統三十五年正月調鑲紅旗滿洲副都統五月轉左宗人閏五月調正紅旗漢軍副都統三十六年四月襲封多羅信郡王四月授左宗正三十七年三月總理鑲白旗覺羅學四十三年正月命復豫通親王始封爵號晉襲和碩豫親王四月任正白旗䝉古都統四十八年十月授盟長十一月掌宗人府事四十九年閏三月調鑲藍旗滿洲都統五十一年三月薨年三十有八謚曰良七次襲裕豐豫良親王修齡第一子乾隆五十一年十月襲封和碩豫親王和碩肅親王豪格𫝊豪格太宗文皇帝苐一子初從征䝉古棟䕫察哈爾鄂爾多斯諸部有功封貝勒天命十一年十月同大貝勒代善等征克扎嚕特部天聰元年五月上征明豪格同貝勒徳格𩔖等敗明兵于錦州復率偏師衛塔山糧運遇明兵二萬我前軍八十人撃郤之二年五月同貝勒濟爾哈朗征䝉古固特塔布囊誅之收其衆三年十月上征明命同三貝勒莽古爾泰等赴通州視渡口捕哨卒大軍由通州薄京城豪格迎撃明寜錦援兵于廣渠門外敵重兵右伏莽古爾泰令諸貝勒撃其右避敵者罪豪格獨如命衝殺至壕敵大潰十二月同貝勒岳託薩哈璘圍永平府别攻香河縣克之四年正月同岳託守潘陽五年三月命諸貝勒直言時政豪格奏曰臣願竭忠為國遇征伐不辭勞瘁以圖報稱七月上統師攻明大凌河城豪格與貝勒杜度等居守六年五月從上征察哈爾林丹汗遁移師略歸化城諸路六月晉封和碩貝勒七年六月詔問征明與朝鮮察哈爾三者何先奏言我征明如徒得錦州餘壁不下恐曠日老我師今宜悉我衆及邊外新舊蒙古從舊道入頒示屯寨告以我願和而明不肯彼民身被創痍將自怨其主我勇氣自倍矣再用更畨法俟馬肥益以漢兵巨礮一從寜逺一從舊路入夾攻山海闗得之則已不得屯兵彼地遣人招諭流賊来歸不然駐師通州偵流賊情形彼方分兵禦我俟其懈襲之至朝鮮且暫行撫慰察哈爾如近我境則相機而行逺則且緩圖也八月與貝勒阿巴泰等略明山海闗俘獲户口牲畜四千有竒八年七月上親統大軍征明由宣府趨朔州豪格偕額駙揚古利毁邊墻大兵遂由尚方保分道進八月同貝勒多爾衮略朔州及五臺山還從上視大同城撃敗明援兵九年二月命同多爾衮岳託薩哈璘統兵收察哈爾林丹汗子額哲受其降師還抵歸化城岳託以疾留豪格同諸貝勒略明山西州縣敗明兵遂㑹岳託于歸化城班師事詳睿忠親王𫝊崇徳元年四月晉封和碩肅親王六月命掌戸部事尋坐黨岳託且漏上言有怨心降貝勒解部任罰鍰八月同睿親王多爾衮攻明錦州降胡有陞等十一月命仍攝戸部十二月從上征朝鮮同睿親王統滿洲䝉古及外藩䝉古各左翼兵别從寛甸入二年正月入長山口昌州民不能禦奔山立寨攻克之敗安州黄州兵五百于寜邊城下擒其總兵寜邊帥復率兵来援遣䝉古都統蘇納等敗擒之師次宣屯村村民言黄州帥聞其王被圍率兵萬五千往援行三日矣我軍疾馳一晝夜追及于陶山敗之九月以都統鄂莫克圖欲脅取䝉古台吉博洛女以媚豪格豪格不治鄂莫克圖罪議罷部任罰鍰三年九月征明自董家口毁邊墻入敗明兵于豐潤縣遂下山東降高唐州略地至曹州明兵毁橋拒我師列陣誘敵潜渡遶其後敗之還下東光縣又遣騎二千敗郭太監兵於滹沱河破獻縣四年四月凱旋賜馬二銀萬兩八月命仍攝户部九月復原封十月同貝勒多鐸征明寜逺敗之北山罔五年六月同睿親王等屯田義州刈其禾稼屢敗明兵克其臺郤其總督洪承疇之衆十二月命同睿親王圍錦州嗣以我軍離城逺駐又遣弁兵私回議罪與睿親王並降郡王六年六月同睿郡王多爾衮代鄭親王濟爾哈朗等圍錦州屢㨗撃敗承疇之卒十三萬九月還盛京事俱詳睿忠親王𫝊十一月命同輔國公滿達海圍松山七年二月明松山副將夏承徳内應擒承疇及巡撫總兵等斬兵備道副将遊撃等官百餘兵三千六十有竒事具豫通親王𫝊三月駐杏山斬明兵出薪者三十餘人又遣前鋒努山撃敗明兵欲入寜逺者五百餘人四月同鄭親王攻塔山克之七月敘功復原封賜鞍馬一蟒縀百順治元年四月以語侵睿親王為都統和洛輝等所訐削爵十月上大封諸王念豪格從定中原有功仍復原封是冬命征山東土㓂至則定濟寜破滿家洞等賊巢堙二百五十一洞土㓂平三年正月命為靖逺大將軍同衍禧郡王羅洛渾貝勒尼堪等西征三月抵西安遣尚書星訥等勦賊於邠州宋大傑賀洪器齊勲張國棟降復遣都統都𩔖𠞰賊于慶陽斬石二五月賊渠劉文炳康千總郭天星等迎拒撃之斬康千總時賊渠賀珍二隻虎孫守法據漢中興安武大定高如礪蔣登雷石國璽王可成周克徳據徽縣階州大軍自西安進分兵奮撃降登雷國璽可成克徳餘潰遁復所䧟州縣陕西平十一月入蜀至南部偵賊張獻忠據西充縣令䕶軍統領鰲拜先發大軍夜繼進詰旦抵西充獻忠悉衆来拒大破之斬獻忠于陣分兵克賊營百三十餘斬數萬級㨗聞得㫖嘉奬四年八月奏分定諸郡縣蜀冦悉平五年二月凱旋上御太和殿宴勞三月睿親王以豪格狥隐隨征䕶軍㕘領希爾根冐功事又欲擢用罪人揚善之弟吉賽議罪削爵繋之卒于獄八年正月上親征念其枉復封和碩肅親王立碑表之十三年九月追諡武再立碑以紀其功乾隆四十三年正月上追念肅親王忠勛命配享太廟其現襲之顯親王復封號曰肅八月入祀盛京賢王祠初次襲富綬肅武親王豪格第四子順治八年二月襲封和碩親王改號曰顯尋預議政康熙八年十二月薨年二十有七諡曰懿二次襲丹臻顯懿親王富綬第四子康熙九年六月襲封和碩顯親王三十五年二月從上征噶爾丹同副都統禪穆布等統領正藍旗營四十一年五月薨年三十有八諡曰宻三次襲衍潢顯宻親王丹臻第六子康熙四十一年八月襲封和碩顯親王乾隆元年二月總理鑲白旗覺羅學三十六年十二月薨年八十有二諡曰謹四次襲藴著顯懿親王富綬孫輔國將軍拜察禮第三子康熙四十七年十二月封三等奉國將軍乾隆七年六月授内閣侍讀學士十年二月遷通政使十一月遷盛京户部侍郎十二年五月調兵部侍郎尋任鑲黄旗滿洲副都統九月授漕運總督十四年四月以受商人程志仁等餽遺又稱奉㫖嚴查鹽政吉慶私産狡詐乖張擬絞監候嗣恩釋二十年十一月授鑲白旗漢軍副都統二十一年八月調右衛副都統二十三年八月授凉州將軍二十七年正月調綏逺城將軍二十八年三月攝歸化城都統事三十年十二月授工部尚書三十一年正月預議政尋充經筵講官二月管㑹同四譯館三十二年三月因工部派辦溝渠工程不公降二級調用三十七年四月襲封和碩顯親王五月授鑲藍旗滿洲都統三十八年閏三月總理鑲藍旗覺羅學四十三年正月命復肅武親王始封之號仍為肅親王四月薨年八十諡曰勤五次襲永錫顯宻親王丹臻孫奉國將軍成信第五子乾隆三十三年十一月授三等侍衛四十三年閏六月襲封和碩肅親王四十九年六月總理正黄旗覺羅學和碩承澤親王碩塞傳碩塞太宗文皇帝第五子順治元年十月封多羅承澤郡王時流賊李自成奔潼闗河南仍為賊守十二月隨豫親王多鐸出征有功事具豫通親王𫝊二年二月還師河南尋隨豫親王征明福王朱由崧於南京四月賜團龍紗衣一襲五月克南京福王就俘凱旋賜金二千兩銀二萬兩三年五月蘇尼特部叛奔喀爾喀隨豫親王往𠞰亦有功七月敗喀爾喀土謝圗汗碩雷汗兵五年八月同英親王阿濟格等𠞰天津土冦十一月喀爾喀行獵近邊同英親王戍大同㑹總兵姜瓖叛王堅守汛地賊至麾兵掩殺之六年正月援代州走賊黨劉遷賊又於助馬得勝路立兩營以拒王親督戰敗之三月睿親王多爾衮赴大同招撫瓖承制晉碩塞為親王七年八月以和碩親王之下多羅郡王之上無止稱親王例仍改為多羅郡王八年閏二月晉封和碩承澤親王三月掌兵部事十月預議政十一年十一月掌宗人府事十二月薨年二十有七康熙十年六月追諡曰裕初次襲博果鐸承澤裕親王碩塞第一子順治十二年六月襲封和碩親王改號曰莊雍正元年正月薨年七十有四諡曰靖無嗣二次襲允禄聖祖仁皇帝第十六子康熙六十一年十一月任内務府總管雍正元年二月命為博果鐸後襲封和碩莊親王二年十一月掌宗人府事七年二月任正紅旗漢軍都統七月調鑲白旗滿洲都統十年八月調正黄旗滿洲都統今上御極命總理事務兼掌工部食親王雙俸王承聖祖仁皇帝指授精於天文算法預修數理精藴至是充增修七政時憲書總裁又修律吕正義後編御製序稱其貫徹樂義乾隆二年十二月以總理事務得優叙賜一等奉恩鎮國公並允王請以承澤裕親王曾孫寧赫襲三年二月任理藩院尚書尋充玉牒館總裁四年十月議王與𢎞晢往来黨私應削爵得㫖寛免裁親王雙俸罷理藩院尚書任十二月復以王私抵官物應削爵詔仍免之罰親王俸五年六年十二月㫖免罰俸七年六月總理樂部事二十九年六月王七十誕辰賜詩有近尊行裏無雙老闔藩衛中有數賢之句三十二年二月薨年七十有三諡曰恪三次襲永瑺莊恪親王允禄孫奉恩輔國公𢎞普第一子乾隆八年七月襲父爵奉恩輔國公二十一年四月管健鋭營事二十二年正月署鑾儀衛事七月任鑲黄旗滿洲副都統二十六年二月調鑲黄旗漢軍副都統三十二年六月襲封和碩莊親王尋任鑲紅旗蒙古都統十月總理樂部事三十四年十月總理正藍旗覺羅學三十八年九月署領侍衞内大臣十月授盟長十一月掌宗人府事三十九年九月總理左右翼宗學四十一年十一月充玉牒館總裁四十二年六月調正紅旗滿洲都統五十三年二月薨年五十有二謚曰慎四次襲綿課荘慎親王永瑺弟奉國将軍永珂第一子乾隆五十三年五月襲封和碩荘親王欽定宗室王公功績表傳卷五
