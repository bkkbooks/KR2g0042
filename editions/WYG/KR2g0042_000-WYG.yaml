body:
  text: 欽定四庫全書欽定宗室王公功績表傳卷首諭㫖乾隆二十九年九月二十六日上諭宗室中封授王公顯爵者或有伊等先世建立豐功是以寵列勲階世襲罔替或有分屬天潢本支誼當出就外府錫之崇秩俾備屏藩而其中惟著有軍功之王公等當國家開基定鼎時宣猷効績載在宗盟若不為之追闡成勞昭示来許將傳世滋久不惟伊等功績莫彰無以使奕世子孫觀感奮發競知鼓勵甚至支派逺近漸亦難於稽攷即如顯親王康親王簡親王信郡王順承郡王平郡王及軍功所封公等其酬庸世及中外固所共知然受封本末事具實録國史簡牒尊藏秘府未便輕事披檢重以紀載體例不越因事繫年難免後先參互於一王一公之事蹟未經裒彚成編其令大學士㑹同宗人府於實録國史内如顯親王以下各王公等凡立功之端委𫝊派之親疎一一悉心采訂分繕成帙進呈以偹觀覽乾隆四十三年正月初十日上諭睦親彰善王政宜先繼絶昭屈聖經所重朕自臨御以来間日恭閲列祖列宗實録一冊因偹知祖宗創業艱難及爾時懿親藎臣勤勞佐命厎定中原偉伐殊功實為從古所未有而當時策勛錫爵榮號崇封所以酬答者本從優厚迨其後或有及身縁事旋被降削者或有子孫承襲更易封號者迄今平情凖理若不為之溯述闡揚追復舊恩於心實有未惬因念睿親王多爾衮當開國時首先統衆入闗掃蕩賊氛肅清宫禁分遣諸王追殱流冦撫定疆陲一切創制規模皆所經畫尋即奉迎世祖車駕入都定國開基以成一統之業厥功最著顧以攝政有年威福不無専擅諸王大臣未免畏而忌之遂致歿後為蘇克薩哈等所搆授欵於其屬人首告誣以謀逆經諸王定罪除封其時我世祖章皇帝實尚在冲齡未嘗親政也夫睿王果􅎯異志則方兵權在握何事不可為且吳三桂之所迎勝國舊臣之所奉止知有攝政王耳其勢更無難號召即我滿洲大臣心存忠篤者自必不肯順從然彼誠圖為不軌無難潜鋤異已以逞逆謀乃不於彼時因利乘便直至身後以斂服僣用明黄龍衮指為覬覦之證有是理乎况英親王阿濟格其同母兄也於追捕流賊回京時謊報李自成身死且不候㫖班師睿王即遣員斥責其非並免王公等徃迎之禮又因阿濟格出征時脅令巡撫李鑑釋免逮問道員及擅至鄂爾多斯土黙特取馬㑹議其罪降為郡王平日辦理政務秉公持正若此是果有叛志無叛志乎又實録載睿王集諸王貝勒貝子公大臣等遣人𫝊語曰今觀諸王貝勒大臣等但知諂媚於予未見有尊崇皇上者予豈能容此昔太宗升遐嗣君未立英王豫王跪請予即尊位予曰爾等若如此言予當自刎誓死不從遂奉皇上纉承大統似此危疑之時以予為君尚不可今乃不敬皇上而媚予予何能容自今以後有盡忠皇上者予用之愛之其不盡忠不敬事皇上者雖媚予予不爾宥也且云太宗恩育予躬所以特異於諸子弟者盖深信諸子之成立惟予能成立之每覽實録至此未嘗不為之堕淚則王之立心行事實能篤忠藎感厚恩深明君臣大義尤為史冊所罕覯使王彼時如宋太宗之處心積慮則豈肯復以死固辭而不為邪説揺惑耶乃令王之身後久抱不白之寃於泉壤心甚憫焉假令當日之逆跡稍有左驗削除之罪果出於我世祖聖裁朕亦寧敢復翻成案乃實由宵小奸謀搆成寃獄而王之政績載在實録者皆有大功而無叛逆之跡又豈可不為之昭雪乎昨於乾隆三十八年因其塋域久荒特勅量為繕葺並准其近支以時祭掃然以王之生平盡心王室尚不足以慰彼成勞朕以為應加恩復還睿親王封號追諡曰忠補入玉牒並令補繼襲封照親王園寢制度修其塋墓仍令太常寺春秋致祭其原𫝊尚有未經詳叙者並交國史館恭照實録所載敬謹輯録増補宗室王公功績𫝊用昭彰闡宗勲至意又如豫親王多鐸從睿親王入闗肅清京輦即率師西平流冦南定江浙實為開國諸王戰功之最乃以睿親王之誣獄株連降其親王之爵其後又改封信郡王雖至今承襲罔替但以王之勛績超邁等倫自應世胙原封以彰殊眷豈可以風影㣲𤯝輒加貶易乎朕以為應復其原封又諸王中披堅執鋭拓土開疆共成一統之業者如禮親王代善後改封康親王鄭親王濟爾哈朗後改封簡親王肅親王豪格後改封顯親王克勤郡王岳託後改封平郡王當時俱茂著壯猷克昭駿烈載在宗盟今其子孫所襲均非始封之名外人不知妄疑宗藩當國家締造時有大勲勞而後裔均不得長延帶礪以為闕典即其本支承家襲慶以去祖漸逺幾忘其先世錫封之由弗克顧名奮效所係於宗室子孫者甚重况功臣世封内如揚古利之英誠公費英東之信勇公額亦都之果毅公俱以本號相𫝊其子孫承襲者各能溯勲閥以宣偉績不失故家喬木之遺今以親賢世胄竟改其初封嘉號何以垂詒奕禩示酬庸追本之義乎朕以為應復其原號著交軍機大臣㑹同宗人府悉心妥議具奏其餘宗室諸王貝勒等如有顯著功績其封爵後經降奪者除本人身罹重愆自不當復邀優典若係承襲之子孫獲咎議處者僅當斥其本身而不當追貶其祖宗世爵方為平允亦著一併㑹查議奏再配享太廟諸王僅有通達武功慧哲宣獻四郡王其太祖太宗世祖時戮力行間櫛風沐雨之親藩如向所舉數人皆未之及盖由當時議禮諸王各懐私意遂爾沒其勲伐不得同侑馨香豈足以彰公道所有睿親王禮親王鄭親王豫親王肅親王克勤郡王俱著補置牌位配享太廟用以妥功宗而昭渥典至通逹郡王係顯祖之子武功慧哲宣獻三郡王係景祖之子當時雖身與配享第以宗支而論已在覺羅之列是以宗室王公表傳内未經列傳但思宗室傳既限於支派國史傳又以屬在宗潢令此四王無所附麗亦覺欠缺著并交國史館查明四王事實補為立傳列於國史諸大臣傳之前即或當時紀載簡少其功績無由稽核無妨不拘詳略各立一傳以徵信實並将此通諭知之乾隆四十三年三月初二日上諭朕因我朝開國時宗室懿親勤勞佐命其殊勲茂績實為史冊罕有如睿親王多爾衮受誣黜爵豫親王多鐸縁事降封朕為核其生平事績昭雪加恩復還原封世襲又禮親王代善鄭親王濟爾哈朗肅親王豪格克勤郡王岳託等並令稱其原號用昭惇叙酬庸渥典其餘諸王貝勒内或有顯著功績而封爵後經降奪者除本人身罹重愆不當復邀優典外若係承襲之子孫獲咎議處竟將初封褫革未為平允因令軍機大臣㑹同宗人府查明具奏今據開列清單進呈朕詳加閲核如饒餘親王阿巴泰及子安親王岳樂俱屢著功績其子孫内止有奉恩將軍一人不足以酬勞閥著加恩賞封輔國公一人又敬謹親王尼堪功勛頗顯且以力戰捐軀其子孫内現在止有一輔國公亦著加恩晉封鎮國公至謙郡王瓦克逹巽親王滿逹海鎮國公屯齊從前亦均著有功績現無承襲之人並著加恩瓦克逹子孫賞給一等鎮國將軍滿逹海子孫賞給一等輔國将軍屯齊子孫賞給一等奉國將軍此次加賞之公爵世職俱著世襲罔替所有應襲之子孫俱著宗人府照例揀選數人帶領引見乾隆四十六年十一月二十六日上諭宗室王公表傳簡親王喇布順承郡王勒爾錦貝勒洞鄂事蹟俱不詳晰又簡親王傳内稱其生有神力語尤不經查此書係何年編纂此外尚有似此語句及叙次草率者並著交國史館恭查實録紅本另行改纂以昭徵信御製文己未嵗我太祖大破明師於薩爾滸山之戰書事盖聞國之將興必有禎祥然禎祥之賜由乎天而致天之賜則由乎人予小子於己未嵗我太祖大破明師於薩爾滸之戰益信此理之不爽也爾時草創開基篳路藍縷地之里未盈數千兵之衆弗滿數萬惟是父子君臣同心合力師直為壯荷天之龍用能破明二十萬之衆每觀實録未嘗不流涕動心思我祖之勤勞而念當時諸臣之宣力也謹依實録叙述其事如左己未二月明帝命楊鎬杜松劉綎等統兵二十萬號四十萬来攻左翼中路以杜松王宣趙夢麟張銓督兵六萬由渾河出撫順闗右翼中路以李如栢賀世賢閻鳴泰督兵六萬由清河出鴉鶻闗左翼北路以馬林麻岩潘宗顔督兵四萬由開原合葉赫兵出三岔口右翼南路以劉綎康應乾督兵四萬合朝鮮兵出寛甸口期並趨我興京三月朔我西路偵卒遥見火光馳告甫至而南路偵卒又以明兵逼境告我太祖曰明兵之来信矣南路駐防之兵有五百即以此拒之明使先見南路有兵者誘我兵而南也其由撫順闗西来者必大兵急宜拒戰破此則他路兵不足患矣即於辰刻率大貝勒代善後封禮親王及衆貝勒大臣統城中兵出而令大貝勒前行時偵卒又以明兵出清河路来告大貝勒曰清河之界道途逼仄﨑嶇兵未能驟至我兵惟先往撫順以逆敵兵遂過扎喀闗與逹爾漢侍衛扈爾漢後授三等子世職集兵以待上之至時四貝勒即我皇帝宗文太以祀事後至謂大貝勒曰界藩山上我築城夫役在焉山雖險倘明之将帥不惜士卒奮力攻之䧟夫役奈何我兵宜急進以安夫役之心大貝勒等善是言下令軍士盡擐甲日過午至太蘭岡大貝勒及扈爾漢欲駐兵隠僻地以待敵四貝勒艴然曰正宜耀兵列陣明示敵人壯我夫役士卒之膽俾并力以戰何故令兵立隠僻地耶巴圖魯額亦都後為一等大臣追封𢎞毅公曰貝勒之言是也我兵當堂堂正正以向敵人遂督兵赴界藩對明兵營列陣而待初衆貝勒兵未至我國防衛築城夫役之兵僅四百人伏薩爾滸谷口伺明總兵杜松王宣趙夢麟之兵過谷口將半尾擊之追至界藩渡口與築城夫役合據界藩山之吉林崖杜松結營薩爾滸山而自引兵圍吉林崖仰攻我兵我兵四百人率衆夫役下擊之一戰而斬明兵百人時我國衆貝勒甫至見明兵攻吉林崖者約二萬人又一軍列薩爾滸山巔遥為聲勢四大貝勒與衆将議曰吉林崖巔有防衛夫役之兵四百人急増千人助之俾登山馳下衝擊而以右翼四旗兵夾攻之其薩爾滸山之兵則以左翼四旗兵當之遂遣兵千人往吉林崖上至問四大貝勒破敵策四大貝勒具以前議告上曰日暮矣且從汝等令分右翼四旗之二與左四旗兵合先破薩爾滸山所駐兵此兵破則界藩之衆自䘮膽矣再令右二旗兵遥望界藩明軍俟我兵由吉林崖馳下衝擊時并力以戰是時我國近都城之兵乗善馬者先至乗駑馬者後至其數十里外者尚未至於是合六旗兵進攻薩爾滸山明兵駐營列陣發鎗礟我兵仰而射之奮力衝擊不移時破其營壘死者相枕藉而所遣助吉林崖之兵自山馳下衝擊右二旗兵渡河直前夾擊明兵之在界藩山者短刄相接我兵縱横馳突無不一當百遂大破其衆明總兵杜松王宣趙夢麟等皆歿於陣横屍亘山野血流成渠其旗幟器械及士卒死者蔽渾河而下如流澌焉追奔逐北二十餘里至舒欽山時已昏軍士沿途搜勦者無數是夜明總兵馬林兵營於尚間崖濬濠嚴斥堠鳴金鼓自衛我兵見之乗夜馳告於大貝勒翼旦大貝勒以三百餘騎馳往馬林兵方㧞營行見大貝勒兵至回兵結方營環營濬濠三匝列火器俾習火器者列濠外繼列騎兵以俟又潘宗顔一軍距西三里外營斐芬山大貝勒見之使人馳告於上時我國逺路之兵亦陸續至與大貝勒兵合明左翼中路後營逰擊龔念遂李希泌統歩騎萬人駕大車持堅楯營於斡琿鄂謨地環營濬濠外列火器上見之與四貝勒率兵不滿千人分其半下馬歩戰明兵發火器拒敵四貝勒引騎兵奮勇衝入我歩兵遂斬其車破其楯明兵又大敗龔念遂李希泌皆陣歿焉㑹大貝勒使人至知明兵已營尚間崖上不待四貝勒兵急引侍從四五人往日中至其地見明兵四萬人布陣成列上趣令我軍先據山巔向下搏擊衆兵方欲登山而馬林營内之兵與壕外兵合上曰是将與我戰也我兵且勿登山宜下馬歩戰令大貝勒往諭時左二旗兵下馬者方四五十人明兵已自西突至大貝勒代善言於上曰兵已進矣即怒馬迎戰直入其陣二貝勒阿敏三貝勒莽古爾泰與衆台吉等各鼓勇奮進兩軍搏戰遂敗明兵斬首捕鹵過當方戰時我六旗兵見之不及布列行陣人自為戰前後不相待縦馬飛馳直逼明營明兵發鳥鎗巨礟我兵衝突縦擊飛矢利刄所向無前明兵不能支又大敗遁走我兵乗勝追擊明副將麻岩及大小將士皆陣歿總兵馬林僅以身免滅跡掃塵案角隴種尚間崖下河水為之盡赤上復集軍士馳往斐芬山攻開原道潘宗顔兵令我兵之半下馬仰山而攻宗顔兵約萬人以楯遮蔽連發火器我兵突入摧其楯遂破之宗顔全軍盡歿時葉赫貝勒錦台什布揚古欲助明與潘宗顔合其兵甫至開原中固城聞明兵敗大驚而遁是時我軍既擊破明二路兵上乃收全軍至固勒班地方駐營而明總兵劉綎李如栢等由南路進者已近逼興京偵卒馳告上遂命扈爾漢先率兵千人往禦翼旦上復命二貝勒阿敏率兵二千繼之上率衆貝勒大臣還軍至界藩行凱旋禮刲八牛祭纛告天大貝勒代善請曰吾先歸從二十騎㣲行探信祀畢上徐来上許諾三貝勒莽古爾泰亦相繼行四貝勒馳至上前請與俱往上曰汝兄㣲行往探汝随吾後行四貝勒曰兄獨往吾㽞此未安也遂亦行日暮大貝勒回至興京入宫則皇后内庭等見大貝勒至亟問禦敵策大貝勒曰撫順開原二路敵兵已破誅戮且盡南来兵已遣將往禦我待父皇命當即往破之於是大貝勒復出城迎上於大屯之野上自界藩啟行至興京平明大貝勒三貝勒四貝勒統軍士禦劉綎而㽞兵四千於都城待李如栢賀世賢等之兵初劉綎兵出寛甸進揀鄂路我居民避匿深山茂林中劉綎悉焚其柵寨殺其孱弱佐領託保額爾訥額赫率駐防五百人迎敵劉綎兵圍之數重額爾訥額赫死之并傷我卒五十人託保引餘兵與扈爾漢軍合扈爾漢伏兵山隘以待已刻大貝勒及三貝勒四貝勒引兵甫出瓦爾喀什窩集時劉綎所率精鋭二萬先遣萬人前掠將趨登阿布逹哩岡布陣大貝勒欲引兵先登馳下擊之四貝勒曰兄統大兵㽞此相機為援吾先督兵登岡自上下擊之大貝勒曰善我引左翼兵出其西汝引右翼兵登山俾將士下擊汝立後督視勿違吾言輒輕身入也四貝勒遂率右翼兵往先引精騎三十人超出衆軍前自山馳下奮擊之兵刄交接戰甚酣後軍随至衝突而入大貝勒又率左翼兵自山之西至夾攻之明兵大潰四貝勒乗勝追擊與劉綎後隊兩營兵遇綎倉卒不及陣四貝勒縦兵奮擊殱其兩營兵萬人劉綎戰死是日明海盖道康應乾歩兵合朝鮮兵營於富察之野其兵執筤筅長鎗被籐甲皮甲朝鮮兵被紙甲其胄以栁條為之火器層疊列待四貝勒既破劉綎兵方駐軍衆貝勒皆至遂復督兵攻應乾明兵及朝鮮兵敵競發火器忽大風驟作走石揚沙煙塵反撲敵營昏㝠晝晦我軍乗之飛矢雨發又大破之其兵二萬人殱焉應乾遁去先是二貝勒阿敏扈爾漢前行遇明逰擊喬一琦兵擊敗之一琦將收殘卒奔朝鮮都元帥姜功烈營時功烈據固拉庫崖衆貝勒復整兵逐一琦遂攻朝鮮營功烈知明兵敗大驚遂按兵偃旗幟遣通事執旗来告曰此来非吾願也昔倭侵我國據我城郭奪我疆土急難之時頼明助我獲退倭兵今以報徳之故奉調至此爾撫我我當歸附且我兵之在明行間者已被爾殺此營中皆髙麗兵也明兵逃匿扵我者止逰擊一人及所從軍士而已當執之以獻四大貝勒定議乃曰爾等降先令主將来否則必戰功烈復遣使来告曰吾若今夕即往恐軍亂逃竄其令副元帥先往宿貝勒營以示信詰朝吾率衆降遂盡執明兵擲於山下付我明逰擊喬一琦自縊死於是朝鮮副元帥先詣衆貝勒降翼日姜功烈率兵五千下山降衆貝勒宴勞之送功烈及所部將士先詣都城上御殿朝鮮都元帥姜功烈及副元帥等匍匐謁見上優以賔禮數賜宴厚遇之士卒悉㽞豢飬四大貝勒既殱南路明兵四萬人我軍駐三日籍其俘獲人馬輜重鎧仗而還是役也明以傾國之兵雲集遼瀋又招合朝鮮葉赫分路来侵五日之間悉被我軍誅滅其宿將猛士暴骸骨於外士卒死者不啻十餘萬我軍邀天佑助以少擊衆無不摧堅挫鋭迅奏膚功策勲按籍我士卒僅損二百人自古克敵制勝未有若斯之神者也時明經畧楊鎬駐瀋陽聞三路兵敗大驚急檄總兵李如栢副將賀世賢等回兵如栢等自呼蘭路遁歸我哨兵二十人見之據山上鳴螺繫帽弓弰揮之作招集大兵狀已而呼噪下擊殺四十人獲馬五十匹明兵奪路而逃相蹂踐死者復千餘人庚寅大軍還至都城上顧衆貝勒大臣曰明以二十萬衆號四十七萬分四路並力来戰今我不踰時破之遂獲全勝各國聞之若謂我分兵拒敵則稱我兵衆若謂我往来勦殺則服我兵强𫝊聞四方孰不懾我軍威者哉嗚呼由是一戰而明之國勢益削我之武烈益揚遂乃克遼東取瀋陽王基開帝業定夫豈易乎允因我太祖求是於天復讐乎祖同兄弟子姪之衆率股肱心膂之臣親冒矢石授方略一時聖嗣賢臣抒勞効悃用成鴻勲我大清億萬年丕丕基實肇乎此予小子披讀實録未嘗不起敬起慕起悲起愧未能及其時以承訓抒力於行間馬上也夫我祖如此勤勞所得之天下子若孫覩此戰蹟而不思所以永天命綿帝圖兢兢業業治國安民凛惟休惟恤之戒存監夏監殷之心則亦非予子孫而已爾此予覩薩爾滸之戰所由書事也此予因實録尊藏人弗易見而特書其事以示我大清億萬年子孫臣庶期共勉以無忘祖宗開創之艱難也御製詩酹克勤郡王園寢癸亥開國承家日于藩夾輔資一時扶王業四海定丕基懿徳書金匱佳城奠玉巵銀潢天共逺百世篤宗支追復睿親王封號并復其宗嗣襲封予諡配享詩以誌事有序戊戍稽宗盟之軼事展親兼以褒功覈方策之遺聞申枉因而繼絶睿親王者屬本懿藩分居執政勤勞王室棐忱洵同姓之良綏定燕京偉績更諸王之冠頋以任隆見嫉亦或氣盛招尤履霜之釁潛積於多年戴盆之寃頓興於既逝指斂衣為左證理知所必不然肆羅織以深文獄甚於莫須有徒以衆怨之搆成貝錦而執作爰書尚非親政之年矯綸綍而竟從重典繄予恭披實録鑒王實有大勲當危疑推戴之時拒羣議而匡扶沖主迨戡亂肅清之際迎聖駕而肇建丕基且誡比列之謟諛朂以尊君親上復斥同懐之愆戻加以義正詞嚴厯厯具存班班可考緬其誠藎皎如白日青天嘉乃壯猷允矣信今𫝊後使果有不軌之志未嘗無可乗之機乃貞心既矢於寢興豈逆迹轉萌於泉壤無端而㬥其罪狀每惻於中如是而坐以叛名宜昭其屈念疇昔非由親決弗嫌成案之翻為國家特叙成勞惟協公評之當用是復其王爵仍教世襲茅封並為録彼宗支咸使列於玉牒葺園寢而春秋祀享配太室而殿廡筵班補列𫝊以連篇準易名之一字推祖宗之恩意辨誣足勝金縢勉子姓以欽承守緒奚煩鐵劵爰成四韻并引長言流言恐懼似周公公則生前王已終睿親王之寃獄與周公之被流言相似然公之受謗在生前故恐懼可以有待王則遭誣於身後故是非無以自明然予恭閲實録為之昭雪較諸感風雷而發金縢者似尤光明正大耳無倖位心真是睿有開基業孰齊忠諡増一字非私恵論定千秋付衆同配食襲封推祖澤睦親惇叙朂宗功命仍稱禮鄭豫肅諸親王及克勤郡王原封爵號並子配享詩以誌事有序戊戍溯維城於王室同扶有永之鴻圖考列爵於宗盟各著非常之偉閥事在本朝為極盛蹟皆前古所罕聞每以繹尋實録之文因有追叙成勞之典粤稽禮邸實惟讓王四路分殱薩爾滸助揚神武連營並克山海闗奮厲師貞翊聖明而特表藎誠誅逆惡而不徇私義至鄭王屬居近派䝉太祖育自宫中初定平壤之盟旋鼓寧逺之勇遵化歸化頻建豐庸松山杏山疊施勝算剪彊藩而成一統識裕先㡬膺攝政而疏千言監陳前憲若夫論功之最惟豫尤超幼統偏師荷嘉名之肇錫獨抒長策舉大勢以全規洎入燕京遂専閫節破潼闗而追流冦狂魄尋僵平江介以定中原㳺魂自滅又如肅武親王之百戰稱雄而秦地恢城蜀江殪賊勲尤崇也他若克勤郡王之屢征奏㨗而降納朝鮮計圖明塞略更優焉是為同姓之股肱名皆炳著並照當年之耳目人所豔稱乃日久而舊號俱更雖世及而遺風㡬冺爰命復原封之字俾同竹帛以常新並教列配享之廂咸侑馨香而弗替餘凡𩔖似悉予詳求念櫛風沐雨之勞使徵獻者知宗功之不朽比礪山帶河之永期襲次者懐祖烈以毋忘用紀長歌並疏小引貝勒讓帝如汝陽為最長太祖大事禮親王於諸子中而功徳隆茂衆望皆屬戡太宗禮親王因作議書言紹承大統必得聖君始能亂致治以成一統自顧徳薄願共推戴四貝勒嗣位入朝遍示諸貝勒大臣衆皆喜之太宗辭讓再三王意益懇乃從薩爾滸戰我武揚薩爾滸之戰禮親王同作薩爾太宗随事太祖立功詳見向所滸山書推戴沖主出丹誠叶不私子孫徳尤彰親王之世祖嗣位時禮子碩託孫阿逹禮曽謀立睿親王禮親王發其謀並誅之宫中育飬子姪行其名曰濟爾哈朗叶太鄭親王為育於祖親姪幼宫中號和碩貝勒戰功多矣難數詳同攝政亦抒謀臧逺取雲貴見早彊鄭親王病劇深恩未世祖臨問泣對曰臣受三朝能仰答不勝感痛惟願以取雲貴滅桂王統一四海為念王之先世祖為之大慟逆藩日後之謀果不出見也幼領偏師建績昻褒蒙聖嘉賜美名叶宗豫親王幼統偏師輒有功楚呼爾太嘉之賜號額爾克直入潼闗賊奔商旋師平定江南疆功莫大焉策允良王之戰功甚多難以縷舉至其破潼闗逐闖賊及平定江南尤其功之最著者也整兵入蜀肅親王陣斬巨冦張獻忠叶悉平内地讋諸羌肅親王射殪張獻忠並削除羣賊平定陜西禮親王子智獨長克勤郡王為禮親王長子有謀勇濟以悃愫復勇往叶盟定朝鮮勣克襄克勤郡王常同大貝勒阿敏及鄭親王征朝鮮克四城諭朝鮮王李倧降時阿敏懐異志欲直趨朝鮮王京倧挈孥奔遣其臣進昌君求和衆議許之阿敏不允克勤郡王宻與鄭親王定議駐師平山城遣使往諭倧報命願嵗貢方物遂許其降既盟告阿敏阿敏以未與盟仍縱兵大掠勸之不聼復令倧弟李覺與阿敏盟乃班師恨未得與定北京叶郡克勤王於崇徳三年以疾薨於軍及與入太祖聞而慟哭加以恩禮故未闗定燕京也是皆巨擘輝天潢與復舊號並配享叶其未及者付考章並教一一稽宗盟叶封其餘宗室諸王貝勒等有功績顯著其爵後經降奪者並命宗人府查奏雪寃彰善示後蘉祖宗恩澤予衍慶本支百世奕禩昌酹克勤郡王園寢戊戌每陳開國策均合聖人心王戰功頗多且於天聰時陳奏善撫降人及請於山海闗通州燕京三處急圖其一以定丕基並請駐兵金州瞭哨諸事太宗皆嘉納之不少赳桓衆獨嘉幹略沉佳城留故里致奠重躬臨彰善俾觀感伊予此意深王之後襲封者改為平郡王余春以開國勲藩爵延於世自應仍其初封之號俾襲爵者顧名追念無忘其先人體國勲勞常懐效勉於訓示宗親有益曽命軍機大臣㑹同宗人府核議著為令酹克勤郡王園寢疊戊戍詩韻癸夘讓帝之冡子首陳推戴心克勤郡王岳託禮親王代善之長子也有謀勇多戰功天命十一年八月聖徳宻太祖升遐岳託與弟薩哈璘以太宗有議推戴告其父代善曰國不可一日無君悦服當四貝勒才徳冠世深契夙心也先帝聖心衆皆速繼大位代善曰此吾乃夜作議書翼日徧示諸貝勒大臣於朝遂定議奉山海闗太宗嗣位又於天聰時奏請善撫降人及請於通州燕京三處急圗其一以定丕基軍與睿太宗嘉納之崇徳三年命為揚威大將親王分道征明所向克㨗以疾薨於軍勤郡王太宗聞之驚慟輟膳三日詔封多羅克康熙二十七年改稱聖祖為立碑紀功乾隆四十三年以王後平郡王復還原號並令配享太廟忘家惟為去聲國力勇更謀沈我祖所嘉許予躬應奠臨閟宫教配享彰善意猶深欽定四庫全書欽定宗室王公功績表傳目録卷一表一親王郡王卷二表二貝勒貝子鎮國公輔國公以罪黜宗室貝勒卷三傳一親王和碩禮親王代善和碩英親王阿濟格卷四傳二親王和碩睿親王多爾衮卷五傳三親王和碩豫親王多鐸和碩肅親王豪格和碩承澤親王碩塞卷六傳四親王和碩鄭親王濟爾哈朗卷七𫝊五親王和碩敬謹親王尼堪和碩頴親王薩哈璘和碩端重親王博洛卷八𫝊六郡王多羅饒餘郡王阿巴泰多羅克勤郡王岳託多羅謙郡王瓦克逹多羅順承郡王勒克徳渾卷九傳七貝勒和碩貝勒阿敏多羅誠毅貝勒穆爾哈齊多羅篤義貝勒巴雅喇多羅廣略貝勒褚英多羅貝勒芬古多羅安平貝勒杜度多羅貝勒察尼多羅貝勒哈爾楚渾多羅貝勒巴思哈卷十傳八貝子固山貝子務達海固山貝子博和託固山貝子固爾瑪渾固山貝子洛託固山貝子傅喇塔固山貝子穆爾祜固山貝子特爾祜固山貝子薩弼固山貝子蘇布圖固山貝子温齊卷十一傳九鎮國公輔國公鎮國公阿拜鎮國公巴布泰鎮國公漢岱鎮國公恭阿鎮國公品級屯齊輔國公塔拜輔國公頼慕布輔國公瑪瞻輔國公穆布爾善輔國公巴爾堪輔國公品級扎喀納卷十二傳十以罪黜宗室貝勒和碩貝勒莽古爾泰和碩貝勒徳格𩔖多羅貝勒拜音圖多羅貝勒碩託多羅貝勒延信臣等謹按欽定宗室王公功績表𫝊十二卷乾隆四十六年奉勅撰初乾隆二十九年命宗人府内閣考核宗室王公功績輯為表一卷詳列封爵世系傳五卷第一卷第二卷為親王第三卷為郡王第四卷為貝勒貝子鎮國公輔國公第五卷為王貝勒獲罪裭爵而舊有勲勞者通三十一人又附𫝊二十一人於乾隆三十年六月告成嗣以所述簡親王喇布順承郡王勒爾錦貝勒洞鄂事迹皆不詳悉又順承郡王𫝊中生有神力之語亦涉不經乃詔國史館恭檢實録紅本重為改撰前表後𫝊體例如舊立𫝊人數亦如舊而事必具其始末語必求其徴信則視舊詳且核焉考古者同姓分封惟周為盛然文昭武穆惟魯公伯禽有淮徐之功耳諸史列𫝊載從龍戰伐雖不乏懿親亦從無多至四十五人並奮起鷹揚銘勲竹帛共㐮萬世之鴻基者盖我國家世德作求克承天眷貞元㑹合光嶽氣鍾太元渾灝之精既挺生乎列聖扶輿清淑之氣遂並萃於宗盟記所謂天降時雨山川出雲乘時佐命非偶然也至我皇上篤念周親不忘舊績俾效命風雲之㑹者得以表章併使席榮珪組之班者知所觀感用以本支百世帯礪萬年所為垂訓而示勸者聖意尤深逺矣參稽詳慎必冄易稿而始成書者豈徒然哉乾隆五十四年正月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
