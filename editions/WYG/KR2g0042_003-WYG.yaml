body:
  text: 欽定四庫全書欽定宗室王公功績表𫝊卷三𫝊一親王和碩禮親王代善𫝊代善太祖髙皇帝第二子初封貝勒嵗丁未正月與兄褚英隨太祖弟貝勒舒爾哈齊往徙東海瓦爾喀部斐悠城新附人戸軍夜行大纛上有光舒爾哈齊疑非吉兆欲旋師代善同褚英持不可遂進收屯寨大敗烏拉兵萬衆於路代善追及其統兵貝勒博克多從馬上左手攫其胄而斬之太祖嘉代善奮勇克敵賜號古英巴圖魯癸丑正月太祖親征烏拉既攻克遜扎塔郭多鄂謨三城布占泰率兵三萬越富勒哈城結營諸將皆欲戰太祖曰征伐大國豈能遽使無孑遺乎代善率諸將奏言我士飽馬騰利速戰所慮者布占泰不出耳今彼既出平原廣野可一鼓擒也舍不戰厲兵秣馬何為太祖曰我仰荷天眷雖遇勁敵無不單騎突陣斬將搴旗今何難身先搏戰但恐爾等或致一二被傷故欲計出萬全爾衆志既孚即可决戰因命進烏拉兵亦出陣距百歩許代善隨太祖臨陣奮戰大破之遂克其城代善邀擊潰衆殪過半布占泰竄葉赫所屬城邑皆降編户萬家丙辰太祖建元天命封代善及舒爾哈齊長子阿敏太祖第五子莽古爾泰與太宗文皇帝並為和碩貝勒國中稱代善為大貝勒阿敏為二貝勒莽古爾泰為三貝勒太宗文皇帝為四貝勒天命三年四月上以七大恨告天興師征明行二日雨欲旋師代善曰我與明和久矣因其不道故興師今既臨境若遽旋將與明復修好乎抑相讐怨乎興兵之名安能隠之天雖雨吾軍士皆有製衣弓矢亦有備雨具何慮霑濕且天降此雨以懈明邊將心使吾進兵出其不意耳是雨利我不利彼也上曰善夜將半遂進霽月出分隊馳昧爽圍撫順城明遊擊李永芳以城降東州瑪哈丹二城及臺保寨五百餘皆下攜降衆以還既出明邊二十里聞明總兵張承廕等率兵萬來追代善同四貝勒返戰上遣巴克什額爾徳尼諭止之代善駐兵於邊令復奏曰彼若待我我則與戰若不待是必走矣當乘勢追襲無使我兵寂然歸致謂怯也上然之亦移師入邊破其三營斬承􅄻及副將頗廷相㕘將蒲世芳遊擊梁汝貴等四年正月命率大臣十六兵五千守扎喀闗以防明來侵尋撤還三月朔偵明兵四萬出寛甸侵我南路六萬出撫順侵我西路上以南路有兵五百駐防親出禦西路命代善前行偵者又告明兵六萬出清河路代善曰清河界道仄﨑嶇未能驟至當先禦撫順兵遂與侍衛扈爾漢等過扎喀闗四貝勒以祀事後至言界藩山上有築城夫役宜急衛之代善方進兵太蘭岡欲設伏待敵從四貝勒言直趨界藩見明兵攻吉林崖者約二萬又一軍列薩爾滸山與阿敏莽古爾泰及諸將議曰吉林崖衛夫役兵僅四百急増千人助之俾登山馳下衝擊以右翼兵夾攻之敵衆在薩爾滸山者以左翼兵當之遂遣千人往吉林崖上至詢知諭分右翼二旗兵與左翼四旗兵合先破薩爾滸山敵營其夾攻吉林崖之右翼二旗兵仍如議於是合六旗兵趨薩爾滸山明兵出陣發鎗礟我兵仰射之奮力衝擊不移時破其營而前往助吉林崖兵千人自山下擊右翼二旗兵渡水直前夾攻陣斬明總兵杜松王宣趙夢麟等是夜明兵别由開原出三岔口者其總兵馬林率三萬人營尚間崖監軍潘宗顔率萬人營斐芬山翼旦上率四貝勒擊明遊擊龔念遂李希泌兵一萬於斡琿鄂謨代善以三百餘騎馳至尚間崖見林結方營掘壕三匝壕外火器兵居前繼列騎宗顔軍其西三里即馳騎告時上已破念遂等不待四貝勒收兵親臨尚間崖𫝊令士皆下馬歩戰左翼二旗兵下者方四五十人明兵已自西突至代善告敵至即躍馬直入陣衆軍奮進斬獲過半翼日上駐蹕界藩代善請以二十騎先歸都城探南路敵逺近上亦于是夜還都城代善奉命偕諸貝勒統先至軍士禦明總兵劉綎甫出瓦爾喀什窩集見綎兵至阿布達哩岡四貝勒以右翼兵登山代善以左翼兵出其西夾攻之明兵大潰綎没於陣旋收降助明之朝鮮將士以還七月從上攻克明鐡嶺城敗助明之䝉古兵八月上親征葉赫圍其貝勒錦台什所居東城代善同衆貝勒圍其貝勒布揚古所居西城東城下布揚古及其弟布爾杭古大懼乞盟代善諭降之葉赫遂平六年三月上親征明瀋陽四貝勒先敗明總兵李秉誠朱萬良姜弼等代善偕其長子台吉岳託追四十里斬馘甚衆七月鎮江城降將陳良䇿叛投明總兵毛文龍上命同莽古爾泰遷金州民于復州十一年八月太祖龍馭上賔岳託偕弟台吉薩哈璘議以告父代善曰四貝勒才徳冠世深契先帝聖心衆皆悦服當嗣大位代善曰此吾素志也天人允協其誰不從代善告阿敏莽古爾泰及衆貝勒皆曰善遂合詞請太宗文皇帝嗣位太宗文皇帝讓再三代善言益懇切衆議亦堅乃從之十月征䝉古喀爾喀扎嚕特部擒貝勒巴克與其二子及岱青多爾濟拉什希布桑阿爾齋等斬貝勒鄂爾齋圖俘其屬戸而還天聰元年五月從上圍明錦州聞明兵自山海闗來援迎擊之遂薄寧逺城殪敵無算因溽暑班師三年十月從上征明入洪山口克遵化趨京城北土城闗之東駐營明大同總兵滿桂宣府總兵侯世禄率援兵至徳勝門敗之十二月攻克良鄉還破敵永定門南遂從上閲薊州形勢明兵五千自山海闗至距城二里許與我遇遂立營環列車楯鎗礟代善麾左翼四旗䕶軍攻其東破之四年正月明兵部侍郎劉之綸以兵至遵化登山營代善率衆環圍之招之綸降不從遂攻破其七營之綸遁巖中為我軍射殪擒遊擊守備各一五年三月命諸貝勒直言時政代善奏曰刑罰不中民有怨言由讞獄不得人宜選易之八月從上圍明大凌河城正紅旗兵圍西北代善軍為䇿應城外守臺明兵害我遊牧十人掠駝馬去代善同貝勒濟爾哈朗等以礟攻克其臺留兵守九月明監軍道張春總兵吳襄等率兵四萬自錦州來援距城十五里代善從上統兵二萬往擊至則敵已陣鎗礟齊發聲震天我騎縱横馳突飛矢如雨敵敗郤襄及其副將桑阿爾齋遁春等復收潰衆立營黒雲起大風自西來敵乗風縱火勢甚熾將逼我軍天忽雨反風敵營燬死者甚衆我軍合攻之陣斬副將張吉甫滿庫王之敬生擒春及副將張洪謨等春見上不跪上欲誅之代善奏曰前所俘無不收養此人欲以死成名奈何殺之以遂其志上赦春先是天命六年二月太祖命代善阿敏莽古爾泰同太宗分月直佐理政事及天聰三年正月太宗以諸兄宜節勞諭以弟姪代直毎御殿命代善阿敏莽古爾泰列坐左右不令下坐至是禮部承政李伯龍請定朝㑹班次儀制下諸貝勒㑹議謂莽古爾泰不可並坐代善言我等奉上居大位仍並列坐甚非心所安請上南面中坐我與莽古爾泰侍坐於側外國䝉古諸貝勒坐我等下衆皆曰善遂定議六年五月從上征察哈爾行二旬過興安嶺聞林丹汗遁移師趨歸化城入明大同宣化境以書示沙河保得勝保張家口諸守將議和而還八年五月從上征明出榆林口至宣府境分兵自喀喇鄂博攻克得勝保遂由朔州趨馬邑八月㑹大軍於大同以俘獲獻御營而還崇徳元年四月晉封和碩兄禮親王十二月從上征朝鮮降國王李倧二年二月班師七月因征朝鮮時違㫖以所獲糧飼馬及選䕶衛溢額等事集諸王貝勒貝子大臣等諭曰朕於兄禮親王極敬愛何竟不體朕意又諭曰王等於朕雖盡恭敬朕亦不喜必須正身行義相輔佐朕始嘉賴焉三年二月上親征喀爾喀王與鄭親王濟爾哈朗等留守十二月以失朝自檢舉部議罰鍰上免之四年十一月從上獵於葉赫至英格布占王射麞馬仆傷足上見之馳下馬親為裹創酌金巵勸飲因泣下諭曰朕以兄年髙不可馳馬曽屢勸兄奈何不自愛遂罷獵命乗輿齊行日十五里或二十里八年八月世祖章皇帝嗣位王集諸王貝勒大臣議以鄭親王濟爾哈朗睿親王多爾衮同輔政又發貝子碩託郡王阿達禮欲立睿親王私議令法司鞫誅之碩託乃王第二子阿逹禮則王第三子穎親王薩哈璘子也順治元年朝元旦命上殿毋拜二年春王來京師五年十月薨年六十有六賜祭葬銀萬兩立碑紀功康熙十年六月追諡曰烈復立碑表墓今上乾隆十九年九月入祀盛京賢王祠四十三年正月詔以王與鄭親王濟爾哈朗睿親王多爾衮肅親王豪格克勤郡王岳託並太祖太宗世祖時戮力行間櫛風沐雨之親藩宜配饗太廟又以王等茂著壯猷克昭駿烈初封嘉號當長延奕禩詔現襲禮親王爵之康親王復封號曰禮初次襲滿逹海禮烈親王代善第七子崇徳五年九月隨大軍圍明錦州敗其杏山松山援兵六年五月封輔國公八月隨肅親王豪格圍松山以本旗兵敗敵明總督洪承疇援踵至卻其三隊旋復來犯力拒之所乘馬創肅親王易以馬甫乗而敵大至鼓勇復擊之殿後而還明總兵吳三桂倚山結營自固偕諸軍擊破之三桂宵遁七年四月隨鄭親王濟爾哈朗攻塔山毁其城而還八年八月授都察院承政順治元年四月隨睿親王多爾衮入山海闗擊敗流賊李自成十月晉封固山貝子隨英親王阿濟格追𠞰自成由邊外趨綏徳二年二月克沿邊三城及延安府自成遁湖廣躡之屢敗賊八月凱旋三年正月隨肅親王𠞰流賊張獻忠七月由漢中進秦州圍賊渠髙如礪等於三台山如礪降十一月師至西充擒斬獻忠肅親王令滿達海與貝勒尼堪等分𠞰遵義䕫州茂州餘賊四年八月班師五年二月以徇隠同征西充之䕶軍㕘領希爾根冒功事議罰鍰睿親王令免之六年四月襲封和碩親王時睿親王與英親王敬謹親王尼堪端重親王博洛先後討大同叛鎮姜瓖以王與兄郡王瓦克達𠞰賊朔州寧武尋授征西大將軍八月克復朔州馬邑縣寧武闗城寧化所八角保及静樂縣遂㑹端重親王軍攻復汾州城斬偽巡撫姜建勲偽布政使劉秉業等偽總兵楊振威斬瓖首獻英親王軍大同平王遣䕶軍統領索渾圍平遥署䕶軍統領希爾根圍太谷貝勒拜音圖圍沁州鎮國公漢岱圍遼州先後攻復其城屯留襄垣榆杜武鄉等縣俱降十月睿親王令留兵付瓦克達𠞰撫餘賊王同輔國公薩弼攜應撤兵還京七年二月與端重親王敬謹親王同理六部事八月睿親王遣尚書阿哈尼堪迎朝鮮王李淏弟阿哈尼堪請白部事諸王以理事官恩國泰代王坐徇隠罰鍰八年二月加封號曰巽尋同諸王奏削故睿親王封爵三月命諸王分管六部王掌吏部九年二月薨年三十有一諡曰簡十六年十月追論王與睿親王素無嫌分取其所遺財物掌吏部時尚書譚泰驕縱不能糾削爵諡二次襲常阿岱原封巽簡親王滿達海第一子順治九年七月襲封和碩巽親王十六年十月追論滿達海罪降常阿岱為貝勒康熙四年四月薨年三十有三諡曰懐愍第六子星尼降襲固山貝子次子錫倫圖封奉恩將軍後俱停襲乾隆四十三年三月詔以巽親王滿達海著有勞績賜一等輔國將軍爵世襲罔替以滿達海七世孫福色硜額襲三次襲傑書禮烈親王代善孫初禮烈親王第八子祜塞封鎮國公卒第二子精濟襲晉封多羅郡王卒順治六年十月以祜塞第三子傑書襲多羅郡王八年二月加號曰康十六年十二月常阿岱既降爵以傑書襲和碩親王仍號康康熙十三年六月授奉命大將軍討逆藩耿精忠九月師至浙江駐金華賊已陷温州處州都統賴塔總督李之芳駐衢州破賊于焦園紫瑯山賊將徐尚朝引衆五萬犯金華王令都統巴雅爾副都統瑪哈達迎擊斬賊將吳榮先等兵無算十二月尚朝復引賊五萬逼金華城南十二里莊巴雅爾與總兵陳世凱等㑹𠞰破賊壘于積道山殺二萬餘復永康縉雲二縣賊將馮公輔由義烏遁武義署前鋒統領希福躡之苦竹嶺斬殪甚衆賊將沙有祥據桃花嶺梗處州路瑪阿達同總兵李榮等擊潰之副都統穆赫林又敗之白水洋十四年正月復處州府及仙居縣公輔尚朝等猶據宣平松陽屢窺處州都統拉哈達偕諸將禦𠞰破之石塘石佛嶺大王嶺東隴隘口上套寨下五塘諸處時寧海將軍貝子傅喇塔由黄巖規復温州叛鎮祖宏勲曽養性糾賊數萬倚山憑江水陸抗阻上命傑書由衢州進回奏處州方有賊警金華兵力弱難驟進十五年三月諭趣之曰王坐守金華將及二載徒以文移往來為事不親統官兵進𠞰逆賊何日可滅宜克期進取毋再遲延觀望貽悮軍機八月自金華移駐衢州敗賊於大溪灘復江山常山二縣進攻仙霞闗偽㕘將金應虎迎降遂抵浦城縣攻㧞之檄精忠言浦城為閩財賦要地今大兵攻㧞已扼咽喉與其縶頸就戮曷若立功贖罪全百萬生靈九月復建陽撫降建寧延平二府精忠震懾無措遣其子顯祚來迎王遣齎示免死敕諭精忠出城六十里迎降十月王入駐福州奏精忠請隨大軍𠞰海賊鄭錦以贖罪上報可時錦偽總統許耀衆三萬結寨烏龍江之南小門山及真鳯山王遣拉哈達等擊走之十一月疏言精忠出𠞰海賊其弟昭忠聚忠宜以一人來福州統轄藩屬又疏言福建經制兵已照原額全設精忠隨大軍所率佐領下兵數已不少其左右兩鎮官兵可並裁宏勲養性應令赴京候補上命耿昭忠為鎮平將軍駐福州餘俱如所請是月王遣穆赫林擊敗偽將軍吳淑于浦塘復邵武府進師泰寧偽總兵王安邦等降汀州府及所屬諸縣悉復十六年正月拉哈達賴塔破賊將趙得勝何祐等二十六營於白茅山太平山諸處復興化府二月復泉州漳州二府奏入得㫖王統率官兵自衢州入仙霞闗直抵福州𠞰撫並用所向克㨗擊逐海賊收復全閩安輯百姓克奏膚功深為可嘉三月疏言福建既平臣即欲統兵入粤但省㑹重地未可輕離且距漳州逺恐遲至炎暑難進師先就現駐漳州汀州騎兵令將軍拉哈達等率同耿精忠赴潮州尋遣總兵馬三竒同前鋒參領都克納敗海賊於龍溪班山副都統楊鳯翔守泉州敗來犯賊五千餘十七年閏三月海賊犯漳州提督段應舉卻之四月賊陷平和環逼海澄穆赫林應舉守禦越七旬外援不至城遂陷長泰亦陷賊王以援遲請罪詔俟師旋日再議七月賊陷同安惠安王遣副都統禪布提督楊㨗復之九月賴塔等破賊於蜈蚣山復長泰尋破賊于柯鏗山萬松闗副都統吉勒塔布同㨗破賊將劉國軒于江東橋又敗之潮溝副都統瑚圖破吳淑于石衛寨十八年正月吉勒塔布㨗復敗國軒於郭塘歐溪頭二月賊犯江東橋吉勒塔布卻之追𠞰至太平寨斬賊千餘十月吉勒塔布敗賊於鰲頭山副都統沃申攻克東石城十九年二月沃申𠞰平大定小定玉洲石馬諸賊巢復海澄水師提督萬正色克海壇三月拉哈逹㨗等克厦門金門賴塔克銅山餘賊悉竄臺灣先是精忠為藩下參領徐鴻弼等首其歸順後尚蓄逆謀王疏請逮治上宻諭王令自請來京至是精忠自請入覲王亦奉詔班師五月疏言福建投誠兵甚多需餉浩繁厦門金門已恢復守留八旗兵六百守泉州二千四百分守福州漳州餘皆隨還十月至京上率王大臣至盧溝橋迎勞十一月命預議政二十一年十二月追論前在金華數年頓兵不進及至福建又遲援海澄銷去軍功罰俸一年二十四年十二月順天府丞王維珍以旗人與房山縣民争煤窑自稱康親王府差委鼓衆閙堂肆詬狀疏聞下部逮究旗人四舒華善辱詈職官俱擬枷責上嘉維珍無所瞻顧下部議叙諭閣臣曰旗下惡棍干預詞訟乆經嚴禁四舒等挾制官司横肆詬詈情殊可惡再加嚴審治罪其主一併察議大學士勒徳洪奏其主即康親王傑書上曰朕止論事之是非不論其為何人也于是法司覆勘四舒論斬華善論絞王府䕶衛及管煤官降革有差王坐失察罰俸如例二十九年七月率兵屯歸化城備𠞰噶爾丹尋以大將軍裕親王福全將抵烏蘭布通詔移師㑹之至則賊已竄十月撤還三十六年閏三月薨年五十有二諡曰良四次襲椿泰康良親王傑書第六子康熙三十六年七月襲封和碩康親王四十八年五月薨年二十有七謚曰悼五次襲崇安康悼親王椿泰第一子康熙四十八年十月襲封和碩康親王雍正五年十二月掌宗人府事十一年九月薨年二十有九諡曰修六次襲巴爾圖康良親王傑書第五子康熙三十二年四月封三等輔國將軍雍正十二年四月襲封和碩康親王乾隆十八年三月薨年八十諡曰簡七次襲永恩康修親王崇安第二子雍正十二年四月封多羅貝勒乾隆十八年五月襲封和碩康親王十九年十一月總理正黄旗覺羅學四十三年正月命復禮烈親王始封之號仍為禮親王和碩英親王阿濟格𫝊阿濟格太祖髙皇帝第十二子初授台吉天命十年十一月科爾沁台吉奥巴苦察哈爾林丹汗之虐來乞援阿濟格隨三貝勒莽古爾泰等征之至農安塔林丹汗遁乃還十一年四月同台吉碩託征喀爾喀巴林部十月隨大貝勒代善征扎嚕特部有功是年封貝勒天聰元年正月同二貝勒阿敏等征朝鮮克五城五月從上征明同莽古爾泰等率偏師衛塔山糧運敗明兵二萬㑹大軍于錦州進薄寧逺城北明援兵千餘掘壕為車營列火器以拒阿濟格殱之明總兵滿桂出城東二里陣上欲進擊阿濟格請從諸貝勒以距城近不可攻勸阻甚力上怒親率阿濟格等馳擊明前隊騎兵追至城下盡殪之諸貝勒皆愧奮不及胄馳進分擊步卒斬馘無算二年三月以擅王弟貝勒多鐸婚削爵尋復之三年八月同貝勒濟爾哈朗等略明錦州寧逺焚其積聚俘獲二千計十月從上征明率左翼四旗及䝉古兵克龍井闗明漢兒莊副將易愛洪山口㕘將王遵臣來援斬之殱其衆進圍漢兒莊明守將李豐降十一月大軍克洪山口至遵化明山海闗總兵趙率教以精兵來援阿濟格奮擊率教敗走㑹上以數騎視遵化城垣因遮擊敗兵阿濟格追斬率教于陣並斬其副將以下官遂進薄京城明寧逺巡撫袁崇煥錦州總兵祖大壽以援兵二萬屯廣渠門外我師追殺至城壕阿濟格馬創死始還十二月同貝勒阿巴泰等略通州焚其船克張家灣尋從上閲薊州形勢遇明山海闗援兵五千于城外同代善等突入敵營殱之五年三月命諸貝勒直言時政阿濟格奏曰臣愚魯無能致煩聖慮自今願痛改前非勉勵職業八月上征明由白土場趨廣寧阿濟格同貝勒徳格𩔖岳託率兵二萬由義州進大凌河與大軍㑹夜圍錦州敵兵襲阿濟格營時大霧人覿面不相識阿濟格嚴陣待忽青氣自天下衝敵陣霧中開如門頃之霽急擊大敗之擒遊擊一獲甲械及馬二百餘上親勞以金巵酌賜九月諭授圍城方略覘察援兵勿以敵寡輕戰墮計中尋聞明増兵來援命額駙揚古利率八旗䕶軍之半往益阿濟格軍時錦州兵七千逐我偵者于小凌河岸突近御前衛兵不滿二百上擐甲渡河直入敵陣敗之阿濟格繼至敵復出歩軍列壕外騎兵翼其後阿濟格奮前破其歩卒斬副將一於是上以所統兵付阿濟格明監軍道張春等復以兵四萬援錦州我師迎擊于大凌河截殺過半逐北逾一舍六年五月從上征察哈爾林丹汗遁阿濟格統左翼及䝉古兵略大同宣府明兵懼盡獻張家口所貯犒邊財物七月師旋七年三月命築通逺保城以兵駐守五月明降將孔有徳等自登州海道來歸為明總兵黄龍所遮朝鮮復扼之阿濟格同濟爾哈朗貝勒杜度等往迎立營江岸明與朝鮮兵望見皆引退有徳等輜重得畢至六月詔問征明及朝鮮察哈爾三者何先奏言臣意當攻明以耕耘畢興師皇上親駐闗外諸貝勒將帥率大軍進闗攻略城保招撫民人然後相敵形勢酌量緩急而行計之得也八月同阿巴泰等略山海闗俘獲甚衆師還以不能乗勝入闗詔切責阿濟格奏臣欲息馬運糧諸貝勒不從上曰汝果能堅執不從諸貝勒誰棄汝而來朕非欲加罪于爾等自後當謹識朕言耳八年五月從上征明同貝勒多爾衮多鐸自巴顔珠爾克入龍門口遇明兵敗之進攻龍門未下趨保安州克其城斬守備一謁上于應州籍俘獲數以聞八月㧞靈邱斬知縣守備師還崇徳元年四月叙功晉封多羅武英郡王五月同阿巴泰征明克雕鶚保長安嶺保薄延慶州先後克定興安肅容城安州雄縣東安文安寳坻順義昌平遇敵五十六戰皆㨗俘人畜十數萬擒總兵巢丕昌等又遣都統譚泰等設伏斬遵化三屯營守將我師方出闗明兵躡我後還擊殱之獲馬百四十餘㨗聞㫖嘉奬賜鞍馬一九月師旋駕出地載門十里迎勞設宴上見王逺征勞瘠為之惻然命坐於右側親以金巵酌賜十二月上征朝鮮令駐守牛莊二年三月以貝子碩託等攻皮島久未下命引兵千往助四月至軍令都統薩穆什哈率䕶軍前進都統阿山等率銳卒乘小舟疾攻西北隅兵部承政車爾格督八旗及漢軍朝鮮等兵乗巨艦逼其城都統石廷柱户部承政馬福塔從北隅督戰敵不能支遂克皮島斬總兵沈世奎並諸路來援者俘戸三千有竒船七十貲畜無算上遣使褒諭十二月遣軍自牛莊入白土場遇明兵於清河岸敗之四年二月從上征明王率師至大凌河東揚言欲以紅衣礟攻臺守卒懼四里屯張岡屯寳林寺旺民屯于家屯成化峪道爾彰等俱下尋率四旗䕶軍還守塔山連山俘人馬千計三月上遣四旗騎兵往助四月自連山㑹御營于義州南山岡班師九月略錦州寧逺界六年三月同鄭親王濟爾哈朗圍錦州其守郛䝉古台吉吳巴什等密議降為明總兵祖大夀所覺接戰王乗夜登城助擊明兵敗乃徙䝉古及明兵降者于義州事詳鄭獻親王𫝊四月敗明援兵於松山北嶺六月復敗明闗内援兵追擊薄松山城獲馬五十餘七月上以阿濟格克敵奏㨗勞績可嘉賜銀四千兩八月明總督洪承疇率總兵吳三桂王璞等來援錦州兵號十三萬上親征大軍營松山明兵懼將奔塔山王追擊之獲其筆架山積粟復往塔山邀擊明兵敗奔者又同睿親王多爾衮克敵臺四擒副將王希賢㕘將崔定國都司楊重鎮等三桂璞僅以身免方三桂等之敗也明錦州松山杏山髙橋諸路兵猶固守不下九月駕還盛京同杜度阿巴泰多鐸等分兵圍之十一月承疇夜出松山兵來襲我軍沿壕射敵返走城閉不得入降其衆二千餘七年二月圍杏山遣前鋒統領鄂莫克圗等略寧逺遣䕶衛及親軍䇿應誘殺三桂等追兵三月三桂復率兵四千駐塔山分兵至髙橋不戰而退遂縱兵追至連山斬三十人獲馬三十師逾寧逺城西十里審視糧運海道寧逺兵出犯又擊敗之四月凱旋十月議駐髙橋時有軍行勞苦語又縱敵人私行獵及上御殿宴賚不俟賞先歸等罪削爵詔從寛罰鍰又議值敏恵恭和元妃喪時王歌舞應幽禁詔免罪八年九月復同鄭親王征寧逺軍城北填壕布雲梯以礟急攻城頽敵潰斬遊擊吳良弼都司王國安等二十餘員直抵前屯衛立營柵復移礟城西攻之斬總兵李輔明袁尚仁等三十餘員兵四千餘明中前所總兵黄色棄城遁進㧞之順治元年四月同睿親王多爾衮入山海闗破流賊李自成十月晉封和碩英親王賜鞍馬二尋命為靖逺大將軍由邊外入陜西斷賊歸路二年二月奏大軍沿途𠞰賊八戰皆㨗陜西屬城克者四降者三十八時自成已為豫親王多鐸所敗棄西安據商州上命多鐸還趨江南而以阿濟格追𠞰流賊方自成南走時攜賊十三萬并湖廣襄陽承天荆州徳安守禦賊七萬聲言欲取南京水陸齊下王分兵躡其後追及于鄧州承天徳安武昌富池口桑家口九江屢敗賊撫其降者窮追至賊老營大敗之自成僅以步卒二十人遁斬其兩叔父及偽汝侯劉宗敏于軍偽軍師宋獻䇿總兵左光先等皆就俘是役凡十三戰皆大㨗故明寧南侯左良玉子夢庚方泊軍九江聞大軍至執總督袁繼咸等率總兵官十二馬歩兵十萬舟數萬詣軍門降計所下河南屬城十二湖廣屬城三十九江西屬城六皆設官撫定閏六月㨗聞諭嘉運籌決勝懋著勛庸命侍臣赴軍慰勞復諭曰王克奏膚勲不勝喜悦念王及行間將士馳驅䟦涉懸崖峻嶺深江大河萬有餘里可謂勞苦而功髙矣㓂氛既靖宜即班師其招撫餘兵應留充軍伍或散歸田里王與諸大臣商確行之八月師旋方自成遁時王誤以死聞又不候㫖班師攝政王多爾衮𫝊語以王等有罪不遣迎但于午門㑹齊歸第復議前出師時脅宣府巡撫李鑑釋逮問赤城道朱夀錅又擅取鄂爾多斯土黙特馬降郡王㝷復之五年八月𠞰平天津曹縣土㓂十一月喀爾喀行獵近邊命赴大同駐守十二月大同總兵姜瓖聞大兵將至疑襲已據城叛附近十一城皆應總督耿焞奔陽和王至夜圍之事聞命為平西大將軍以都統巴顔等率兵㑹征瓖六年正月賊黨劉遷犯代州據外郛章京愛松古遊擊高得勝被圍遣端重郡王博洛等往援破斬賊渠郎芳遷遁去三月攝政王至大同㑹王兩福晉卒攝政王諭令先歸王啟云予不希富貴但丈夫重名譽欲佐命効力俾後世垂名史冊耳顧以妻死棄大事而歸乎卒不行四月復左衛命還京六月啓攝政王曰輔政徳豫親王征流㓂至望都潜身僻地破潼闗西安不殱其衆追騰機思不取功績未著不當優異其子鄭親王乃叔父子不當稱叔王予乃太祖之子皇帝之叔當以予為叔王攝政王于是廷數其妄思越分并私除職官等罪令勿預部務接漢官八月復同貝子鞏阿岱統兵征大同九月偽總兵楊振威斬瓖及其兄琳弟有光詣軍門降大兵入城誅從逆吏民墮大同城睥睨五尺班師八年正月攝政王薨于喀喇河屯王赴喪次即歸帳其夜諸王赴臨王獨不至而私召其第五子郡王勞親上迎䘮王又不去佩刀攝政王近侍額克親吳拜蘇拜等發其意圖攝政事鄭親王等即于路監守之至京議削爵幽禁降勞親貝子閏二月以初議阿濟格罪尚輕下諸王大臣復議因移繫别室籍其家子勞親等皆黜宗室十月監者告阿濟格欲于獄中舉火論死賜自盡爵除乾隆四十三年正月諭曰朕覽實録載英親王阿濟格秉心不純往追流賊誑報已死又擅至沿邊索馬且向巡撫囑託公事過跡昭著雖前此亦有微功究不足以抵其罪黜爵實由自取至其子孫前俱降為庶人削其宗籍皇祖御極之初曾加恩將其次子傅勒赫復還宗支追封公爵逓襲其餘諸子仍行除籍嗣于康熙五十二年復䝉恩將伊第三子伯爾遜第八子佟塞第十子鄂拜第十一子班進泰各支賜給紅帶子附入玉牒今思傅勒赫一支既已作為宗室襲爵其有後之伯爾遜等各支及無後之和度等同係英親王之子孫似毋庸復為區别因推廣皇祖恩意著交宗人府一體查明復還黄帶子列入宗譜其恩封公爵遞襲世次詳玉牒欽定宗室王公功績表𫝊卷三
