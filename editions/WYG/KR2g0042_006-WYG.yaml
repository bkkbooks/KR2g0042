body:
  text: 欽定四庫全書欽定宗室王公功績表傳卷六傳四親王和碩鄭親王濟爾哈朗傳濟爾哈朗追封和碩莊親王舒爾哈齊第六子舒爾哈齊顯祖宣皇帝第三子太祖髙皇帝母弟初封貝勒嵗丁未東海瓦爾喀部斐悠城長䇿穆特赫苦烏拉部長之虐乞歸附太祖命舒爾哈齊同貝勒褚英代善往收其環城屯寨五百户以還賜號達爾漢巴圗魯事詳廣略貝勒褚英傳辛亥年八月薨順治十年五月追封和碩親王諡曰莊濟爾哈朗幼育於太祖宫中封和碩貝勒天命十年十一月同台吉阿巴泰等援科爾沁有功事詳饒餘敏郡王𫝊十一年四月征喀爾喀巴林部十月征扎嚕特部並有功天聰元年正月同貝勒阿敏岳託阿濟格等征朝鮮師屢勝次平壤城朝鮮王李倧使請和阿敏仍欲進攻岳託不可濟爾哈朗以不宜深入可駐平山城以待和議之成遂引軍往與李倧議歳貢定盟而還事詳克勤郡王𫝊五月從上征明出廣寧舊邊進圍錦州同貝勒莽古爾泰等率偏師衛塔山糧運遇明兵敗之尋移師寧逺與明總兵滿桂兵遇裹創力戰大敗其衆二年五月以䝉古固特塔布囊自察哈爾移據阿拉克綽特部舊地遇来歸我者輒行阻殺命同貝勒豪格徃討誅之收其衆三年八月同貝勒徳格𩔖岳託阿濟格等征明錦州寧逺焚其積聚多俘獲十月上親統大軍由洪山口征明命同岳託攻大安口毁其水門乗夜進擊走明馬蘭營援兵旦見明兵立二營於山上濟爾哈朗先撃敗其衆追至馬蘭營殱之是日自辰迄已五戰皆捷降馬蘭營馬蘭口大安口三營兵趨石門寨明援兵至者悉斬之寨中官民出降遂㑹大軍於遵化進薄北京十二月同貝勒阿巴泰等徇通州焚其船克張家灣四年正月從上圍永平先是劉興祚叛歸明與明巡撫袁崇煥同赴永平聞我軍將至遂趨太平寨道殺喀喇沁䝉古之以俘来獻者上命濟爾哈朗與阿巴泰往捕追及於山海闗斬興祚擒其弟興賢以獻大軍既克永平命與貝勒薩哈璘統兵萬人鎮守察倉庫閱士卒置官吏降明道貟白養粹廢貟孟喬芳楊文魁等以書招永平屬州縣於是灤州州同知張文秀遷安縣知縣朱雲台副將王維城㕘將馬光逺守備李繼全千户錢竒志相繼降三月上旋蹕令阿敏碩託更守永平因趨迤西路招降榛子鎮乃還五年三月命諸貝勒直言時政濟爾哈朗奏曰比者讞獄滋怨皆由諸臣自今當選賢良慎司刑憲七月初設六部命掌刑部事八月從上圍明大淩河城鑲藍旗兵圍西南濟爾哈朗軍為策應旋同大貝勒代善等克近城臺保十一月明總兵祖大夀以城降將旋師同貝勒多鐸往塔山東沿海截隘俘百餘人六年五月從上征察哈爾林丹汗遁大軍次穆嚕哈喇克沁濟爾哈朗與岳託等率右翼兵趨歸化城收察哈爾部衆千餘七年三月奉命築岫巖城五月明將孔有徳耿仲明自登州航海来降濟爾哈朗等迎䕶其衆事具英親王𫝊六月詔問征明及朝鮮察哈爾三者何先奏言朝鮮不遵約當返其貢物姑與互市不必往征明乃吾敵國宜取其近京數城久駐伺隙别屯兵山海以東錦州以西擾其耕穫使不得休息復分兵半於山海闗前立營半繞入闗後内外夾攻敵必絀八年五月上復親征察哈爾濟爾哈朗留守盛京崇徳元年四月晉封和碩鄭親王十二月上征朝鮮復留守三年十月率兵征明寧逺薄中後所城明兵懼不敢出乃移師克模龍闗及五里保屯臺四年五月征明錦州及松山與敵遇九戰九敗之俘二千有竒五年三月葺義州城上親臨閱視有舊附明之蒙古多羅特部蘇班岱阿巴爾岱居杏山西五里臺遣託克託内籲請率三十尸来歸上命王與多鐸郡王阿達禮率師千五百往迎瀕行諭曰敵見我兵寡必来拒戰可分兵為前後中三隊前隊拒戰後隊應援遂奉命行夜過錦州城南至杏山令来使潛告蘇班岱等攜户口輜重行旦明杏山總兵劉周智沿城結營與錦州松山守將分翼列陣逼我軍王令駐軍待敵呼噪而来王督戰衝入敵陣與諸王貝勒並進大敗之追奔至城下斬其副將楊倫周㕘將李得位復遣兵破敵兩營於城南獻所獲馬械於御營分賚有差加賜御廐良馬一九月同武英郡王阿濟格等圍錦州城中兵屢出犯王設伏城南俟敵敵知有伏即遁追斬六十餘人又遣輔國將軍務達海俘明運糧兵於杏山塔山間六年三月復圍錦州繞城立營八掘壕築塹為久困計時大夀在城中以䝉古兵守外郛䝉古台吉諾木齊吳巴什等欲降縋二人齎書下約獻東闗至期為大夀覺而鬭聲聞郛外大軍薄城蒙古兵縋以上我師與䝉古合擊明兵明兵敗入内城遂據其郛遷郛内䝉古六千餘口於義州並收降明都司守備以下八十六貟使馳奏上命八門擊鼓集衆官宣捷於篤恭殿四月明援兵自杏山移松山王令右翼兵伏錦州南山西岡左翼兵伏松山北嶺遣前鋒軍挑戰敵至伏起夾擊大敗之五月明援兵六萬屯松山北岡擊斬二千人六月睿郡王多爾衮等至錦州更代兩軍合營聞明兵自松山趨海口我左翼兵由東右翼兵由西擊郤敵衆追至松山城獲馬五十餘振旅還八月明總督洪承疇率兵十三萬至松山上親統大軍臨之命留守九月上將旋蹕仍赴錦州更代圍城十二月敗承疇夜犯正紅正黄兩旗營兵敵從杏山宵遁者復為我伏兵所殱七年二月肅郡王豪格等克松山城擒承疇王仍圍錦州三月大夀遣人乞降請盟誓王留其使二人遣一𫝊諭曰我圍困此城旦夕可取何與爾盟誓欲降則降非相強也大夀乃率衆敂營降四月移師塔山克之進圍杏山以礟毁城城中懼開門降乃籍俘數以奏奉命毁松山塔山杏山三城而還七月叙功賜鞍馬一蟒緞百八年八月世祖章皇帝嗣位王與睿親王多爾衮同輔政九月征明寧逺拔中後所城斬逰擊吳良弼都司王國安等進攻前屯衞斬總兵李輔明袁尚仁中前所總兵黄色棄城遁取之遂班師順治元年正月王集内三院六部諸大臣諭以政事先白睿親王書銜名亦先之五月睿親王入山海闗擊走流賊李自成九月王扈駕至京師十月上御皇極門封信義輔政叔王賜金千兩銀萬兩緞千疋四年二月以造第踰制擅用銅獅銅龜銅鶴罰鍰罷輔政五年三月貝子屯齊等訐王在盛京時不舉發兩黄旗大臣謀立肅親王私議及扈駕入闗擅令兩藍旗越次立營前行等事降多羅郡王閏四月復爵和碩鄭親王九月命為定逺大將軍征湖廣十月道出山東𠞰曹縣土賊擒獲賊首李化鯨李名讓張學允等得降鎮劉澤清逆書煽亂狀以聞叛黨並伏誅六年正月由安陸府渡江抵長沙時明桂王朱由榔之總督何騰蛟及附由榔之總兵馬進忠王進才杜允熙陶養用胡一青糾流賊餘黨一隻虎等據湖南府縣王令順承郡王勒克徳渾都統阿濟格尼堪為前哨大軍繼進抵湘潭生擒騰蛟拔其城四月分兵趨永興擊走允熙遂至辰州一隻虎聞風遁令尚書阿哈尼堪等擊進才於寶慶克其城又連破南山坡大水紅江諸路兵凡二十八營寳慶平七月分兵定靖州進衡州斬養用破一青七營於城南山追𠞰至廣西全州分兵定道州黎平府及烏撒土司先後收六十餘城七年正月凱旋叙功賜金二百兩銀二萬兩八年二月同巽親王滿達海端重親王博洛敬謹親王尼堪奏削故睿親王封爵事詳睿忠親王𫝊三月上以王年老一切朝賀謝恩悉免行禮九年二月晉封叔和碩鄭親王十二年二月疏言太祖髙皇帝開創初日與四大貝勒五大臣及衆台吉等討論政務得失咨訪兵民疾苦使上下交孚鮮壅蔽故能上合天心下洽民志掃靖羣雄肇興大業太宗文皇帝纘成大統紹述前猷亦時與諸王貝勒大臣講論不輟且崇奬忠直鼓勵英傑録微功棄小過凡下詔令必先講求可以順民心垂久逺者然後施行又慮武備廢弛不忘騎射時駕出射獵諸王貝勒置酒讌㑹以優為樂太宗皇帝還自獵所克勤郡王岳託以聞太宗皇帝勃然怒曰我國肇興治弓矢繕甲兵視將士若赤子故人争効死每戰必克以成大業朕嘗恐後世子孫棄我國淳厚之風沿習漢俗即于慆淫今汝等為此荒樂欲國家興隆其可得乎遣大臣索尼再三宣諭今皇上詔大小臣工盡言無隠誠欲立綱陳紀綿國祚於無疆也臣以為平治天下莫要於信詔令順民心前降諭軫恤滿洲官兵疾苦聞者無不歡忭嗣又令修乾清宫詔令不信何以使軍民服從伏祈效法太祖太宗不時與内外大臣詳究政務得失凡事必預商㩁然後頒之詔令見諸施行庶幾法行令信可以紹二聖之休烈矣抑臣更有請者垂休典謨廣昭令徳莫要於立史官古聖帝明王進君子逺小人順天心合民志措天下於太平垂鴻名於萬世良於史臣有賴今宜倣古制特設起居注官置之左右凡聖主嘉言懿行一一記載於以垂萬世傅無窮亦治道之一助上嘉納之三月同貝勒尚善等議吏科副理事官彭長庚正白旗一等子許爾安請復睿親王舊封妄頌功勛結黨煽亂應立斬上命從寛流徙又議廣東布政使胡章誣奏平南王尚可喜靖南王耿繼茂縱兵占官廨等事與誣告凡人不同應立絞上命褫職免罪五月王疾劇駕臨問王奏臣受三朝厚恩未能仰荅不勝感痛惟願以取雲貴滅桂王為念且滿洲甚少而能破流賊取京都應加撫恤上垂涕曰天何不令朕叔長年耶言已大慟駕旋命工圗其像翌日薨年五十有七詔輟朝七日賜祭葬銀萬兩置守園十户立碑紀功康熙十年六月追諡曰獻乾隆十九年九月入祀盛京賢王祠四十三年正月上追念鄭親王忠勛命配享太廟其現襲之簡親王復始封號曰鄭初次襲濟度鄭獻親王濟爾哈朗第二子順治八年閏二月封其兄富爾敦為鄭親王世子濟度為多羅簡郡王四月富爾敦卒九月濟度封世子九年十月命議政十一年十二月以海賊鄭成功擾福建授定逺大將軍同貝子務達海都統噶達渾𠞰之十二年九月師入閩境聞泉州賊遁駐福州久之乃進駐泉州十三年六月投誠偽總兵黄梧副將蘇明鄭純等自海澄縣遣迎大兵偽官八十餘人兵一千七百有竒俱降王自泉州移駐漳州俄聞成功犯福州遣副都統覺羅阿克善㕘領巴圖魯禇庫䕶軍㕘領伊巴格圖赴援遇賊髙齊陸路敗之斬二百餘級將抵福州賊船二百餘泊烏龍江阿克善等水陸並進郤賊衆追至大漳河口陣斬偽總兵林祖蘭等獲船十有四時惠安閩安漳浦頻告警分遣䕶軍統領覺羅雅布蘭副都統阿玉錫等往𠞰斬賊二千餘獲船數百先後降偽總兵一副將五㕘將逰擊以下五十人兵三千有竒十四年三月還京上遣議政大臣哈什屯等迎之盧溝橋令先赴鄭親王喪所土親臨其第慰之五月襲封和碩親王仍其郡王之號曰簡十七年七月薨年二十有八康熙十年六月追諡曰純二次襲徳塞簡純親王濟度第三子順治十八年二月襲封和碩簡親王康熙九年三月薨年十有九諡曰惠三次襲喇布簡純親王濟度第二子康熙七年正月封三等輔國將軍九年九月襲封和碩簡親王十三年九月以逆藩吳三桂耿精忠黨分擾江西命為揚威大將軍鎮江寧十四年九月詔移江西十二月遣兵斬賊朱三於東鄉縣十五年二月遣兵敗賊王用等於鄱陽縣之沙蘭粟嶺五月奏招撫南康吉安饒州偽官四百五十餘兵萬五千有竒七月奏偽都督楊益茂據金谿縣破其木寨斬三千餘級復金谿十月遣兵赴萬年縣𠞰賊楊彪萬勝破賊於五都馮家山十二月奏故平南王尚可喜子之信在廣州乞降以所齎宻疏上陳先是三桂賊將髙大傑韓大任等陷吉安王奏調緑旗兵會𠞰又請敕總督運紅衣礟十具攻吉安並從之諭戒以勿坐守觀望因奏省會繁要不可輕離至是將軍額楚等擊賊螺子山失利上命侍郎班迪等赴吉安察狀還奏諭令戴罪圗功王乃親圍吉安十六年三月賊夜出南門逸王入城駐六月奏招撫江西各屬偽官千九百餘兵三萬七千四百有竒又疏言韓大任等屯寧都樂安諸處調兵三路進𠞰韓大任願降請為入告詔報可既而大任自寧都出擾萬安泰和等縣王請調兵禦𠞰上曰簡親王喇布自到江西並未建尺寸之功宴坐㑹城虚糜糧餉迨赴吉安以重兵圍城逆賊韓大任奔逸不能擊滅致竊據寧都雖遣副都統布舒庫等率兵前往究未大創賊衆今韓大任自寧都竄突延及萬安泰和諸處不能撲𠞰又以兵少具奏計喇布所轄滿漢官兵為數不少一韓大任未能翦除任其出入宜即嚴加處分念現在與賊相持姑俟事平日議罪十七年正月䕶軍統領哈克三等敗大任於老虎洞燬其營斬六千餘級大任奔福建赴康親王傑書軍前降二月詔移師湖南駐茶陵八月奏三桂死於衡州詔進師十八年正月抵衡州賊帥吳國貴夏國相等宵遁復其城二月分兵復祁陽來陽等縣及寳慶府降偽總兵卓英董世興偽副總兵周嘉貞等又偽將軍全鉞偽總兵馬隆興熊天章曾大捷姜繼尚偽侍郎范思徵等相繼降六月疏言隨征之烏拉寧古塔兵千二百餘人應遵㫖撤還但新寧諸處賊未平請暫留𠞰從之八月疏言將軍穆占復新寧安親王岳樂克武岡賊竄遁臣駐東安遣烏拉寧古塔兵還京令穆占駐新寧上嚴責其不追𠞰賊於沅州靖州九月奏偽副將張朝貴以下七十餘人降詔進定廣西駐桂林十九年正月奏昭義將軍馬承廕標下糧匱兵譟撥餉給乃定又言馬承廕奉㫖設五營㑹𠞰雲貴今請自募兵足七千數增立援𠞰二營上以將軍標無七營例不允三月疏言臣遵㫖率兵往栁州至永福縣聞馬承廕叛即欲進𠞰因兵單暫還桂林五月疏言大兵分路進𠞰總督金光祖破賊武宣復縣城將軍莽依圖破賊陶登定象州臣由雒容進栁州馬承廕率衆降八月詔移駐南寧十月奏偽將軍饒一龍以慶逺府城降是月詔選所部兵付大將軍賴塔進定雲南二十年八月奉詔攜栁州南寧閒駐兵還京十月薨年二十有八二十一年追論吉安諸處失機罪削爵四次襲雅布簡純親王濟度第五子初封三等輔國將軍康熙二十二年三月襲封和碩簡親王二十七年七月以噶爾丹擾喀爾喀命同安親王岳樂各率兵五百赴蘇尼特汛界駐防十月撤還二十九年七月噶爾丹深入烏珠穆沁地命裕親王福全為撫逺大將軍出古北口恭親王常寧為安北大將軍王與信郡王鄂扎副之出喜峯口既而停喜峯口出師命赴裕親王軍㕘贊軍務八月敗噶爾丹於烏蘭布通噶爾丹乞宥罪旋由大磧山遁師旋議不追𠞰罪削爵得㫖從寛罰俸三年三十五年二月從上親征由中路抵克嚕倫河聞噶爾丹敗竄乃還三十八年十二月掌宗人府事四十年九月薨年四十有四諡曰修五次襲雅爾江阿簡修親王雅布第一子康熙三十六年十二月封世子三十九年四月命直郡王允禔濬永定河雅爾江阿與僖郡王岳希貝勒延夀分董其事四十一年正月襲封和碩簡親王四十九年正月掌宗人府事雍正元年正月充玉牒館總裁三年十月告成賜銀幣尋因編載遺漏及辦事屢誤停俸撤六佐領歸公四年二月奏請再行酌撤佐領恩免停俸諭責其人甚卑鄙終日沉醉諸事漫不經心下所司議處削爵六次襲神保住簡修親王雅布第十四子康熙五十五年四月封三等奉國將軍雍正四年三月襲封和碩簡親王乾隆十三年九月諭曰神保住自襲爵以来不知自愛恣意妄為致兩目成𤯝因辭食王俸朕加恩賞給半俸贍其度日之資伊竟不知感恩守分且罔顧近派族人稍加周恤今據宗人府劾奏神保住凌虐伊兄忠保之女其行事更出情理之外著革去王爵另行請㫖承襲七次襲徳沛鄭獻親王濟爾哈朗從曾孫初王弟追封多羅貝勒芬古生傅喇塔封固山貝子生福存襲固山貝子徳沛福存第八子也雍正十三年五月封三等鎮國將軍八月授兵部左侍郎乾隆元年七月任古北口提督二年二月授甘肅巡撫六月疏言備荒期於先籌賑恤貴乎實惠向遇歉嵗州縣必俟詳允後動支倉庫錢糧上司又必委驗核減文移輾轉至開倉散賑時而饑民已待哺不得㩦老幼轉徙矣且倉厫大率在城近者尚可匍匐支領逺者每以跋涉甘餒是徒費國家倉貯而饑民沾恩未遍甘省地處萬山風多雨少嵗嘗歉薄民鮮盖藏且地方遼濶倍他省州縣所轄由百里至四五百里不等閒時已覺迢遥領賑尤多狼狽雖筋力壯盛者亦不能數百里往返領一日口糧况孤寡殘弱哉今嵗雨暘時若可望有秋但有備無患不得不預為綢繆臣思散賑貴多設厰而専其責於州縣請預勘各州縣地方就鄉村連絡處分擇公廨廟宇十餘處造具地名冊籍遇散賑時該州縣具詳日即將倉糧散給務使老少均沾強弱普被既無拮据之艱且免守候之累則向苦流離之人皆得就食但運糧脚價費多甘省每嵗於青黄不接時令各州縣平糶倉糧秋收買補或遇豐年除還正項價餘亦即買糧存貯此向例也嗣後賑恤運價應將此項糧價餘銀貯州縣庫停其買糧以為運費如不敷先於州縣庫不拘何項動支再於司庫舊存公用銀十八萬内還項賑畢造冊核銷如有揑冒立即㕘賠如此則官易為理而民沾實惠矣奉㫖先事預防原當如此但運脚一項應用時咨部請示九月擢湖廣總督三年四月疏陳苗疆七事一苗民懶不習田請於新闢苗疆代買牛種器具令地方官親勸開墾一苗民未覩禮讓請立義館以附近生貟教誨一苗居山叢林宻令官弁誘買樹木數年後山中無險可恃一苖寨係茅屋畏火攻請製火器一苗疆兵駐處偶有急需無項可支請於苖疆州縣庫存銀千兩同知通判駐所亦請交貯帑銀千兩并建常平倉買貯穀二三千石庶儲蓄有備一邊地𦂳要官兵勢難分佈查山東沿海及滇黔蜀粤俱有團練鄉勇之事應令地方官力行此法一團有警各團救䕶立練總什長相統率一苗民貪賄忘親凡犯罪逃匿之案請懸立賞格有能擒獻重犯者賞銀廿兩情罪稍輕者賞銀八兩先刋石曉諭時廷議水田未便勸墾苖人不可欺誘至要犯懸購臨時酌賞餘俱如所請行十二月攝㐮陽鎮總兵四年七月調閩浙總督八月疏言泉州府晉江縣之衙口鄉大姓肆横械鬭等事不一而足祗縁僻處海濱不解法度查永寧舊寨地勢髙敞去衙口陸行十餘里由海徑渡七八里即可直達且衙口原係陸路提標右營汛地應請即以該逰擊帶兵二百三十名移駐永寧其衙口後身空公庵設把總一貟兵五十名海邊石亭設一汛撥兵十名稽查又西倉處各大姓適中地查興化同知止司盗逃防海請以該管事務歸併興化通判即以該同知改𨽻泉州移駐西倉議如所請行五年十二月諭廷臣曰徳沛屢任封疆操守㢘潔既一介不取而因公犒賞之處又復繁多所得養廉不能敷用以致京中逋負不能清還且棄舊有之産朕心深為軫念此等清官應格外加恩以風有位著將福建藩庫銀就近賞給一萬兩示朕嘉奨之意六年二月命稽查滸墅北新兩闗七月兼署浙江巡撫七年四月調兩江總督八月疏言揚州猝被水廬舍蕩然現自揚州至寳應堤埂髙阜災民斷續搭篷居住將来興化泰州之無處容身者勢必移来人烟雜㳫俱係待賑窮民奸良莫辨臣於揚州城廂及髙郵寳應令逰擊等水巡以期奸匪遁跡奉㫖好應如是辦理然只宜行之以暫而不可久初上諭嗣後該州縣當秋成時穀價髙昻不能買補而該處存倉穀石尚可接濟者照例詳請展限於次年買補倘榖價既屬不敷而貯倉穀石又係不足者准其詳明上司以别州縣穀價之贏餘添補採買為酌盈劑虚挹彼注兹之計至是徳沛奏言江南地廣人稠榖不敷食厯係取資江廣及上江棕陽運漕等處邇聞各處米價俱昻轉販者少如以别州縣贏餘添補則江蘇所屬買補止有不足並無贏餘若因籌補無項致通省倉貯全虛目前無以濟用日後何賴臣請俟秋成後各屬有糶價存庫者不拘本境鄰封擇時價稍平者即為代買其不敷之價應照前撫臣徐士林所請於捐監項下補足至淮揚徐海等州縣現在被災印官賑務殷繁不能兼顧已飭藩司動支司庫銀十萬兩遴貟採買俟飭提各屬糶價歸還原欵奉㫖好著照所議行八年二月召来京六月授吏部右侍郎十二月兼管國子監祭酒事務十年七月教習庶吉士十一年二月奉上諭侍郎徳沛因伊度日艱難指伊弟簡親王現食俸禄奏請借支十年以完舊逋以資生計著照所請行閏三月轉吏部左侍郎十二年三月兼署户部左侍郎五月署山西巡撫九月命尚書房行走十二月擢吏部尚書十三年七月以疾解任九月諭曰神保住已獲罪革爵徳沛於此王爵既有承襲之分且在等輩中較為厚重可即令承襲王爵徳沛襲王之後宜追念從前諸王將族中應行資助之人加意周恤共相和睦以期仰沐朕恩於無既是月襲封和碩簡親王十七年六月薨年六十有五諡曰儀八次襲竒通阿鄭獻親王濟爾哈朗曾孫初王第四子追封輔國公巴爾堪生巴賽襲輔國公竒通阿巴賽第十子也雍正四年八月封三等輔國將軍九月授頭等侍衞九年十二月襲父爵輔國公十年三月授散秩大臣乾隆元年四月任正紅旗滿洲都統三年十二月授領侍衞内大臣十七年十月襲封和碩簡親王二十一年六月掌宗人府事二十二年正月充玉牒館總裁二十八年六月薨年六十有三諡曰勤九次襲豐訥亨簡勤親王竒通阿第一子乾隆八年二月封三等輔國將軍二十三年七月以三等侍衞班領奉命率健鋭營兵一千𠞰凖噶爾餘孽及回部十一月至阿克蘇城十二月隨㕘贊大臣舒赫徳進師巴爾楚克二十四年正月至呼爾璊逆囘霍集占引賊五千餘来犯豐訥亨同侍衞豐安等合諸軍擊郤之追潰衆十餘里翌日再進賊據塹拒復奪塹所乗馬創易馬進賊退避夜率兵取水於沁達勒河連敗賊衆於渡口遂進援大軍之與賊相持於葉爾羌者敗賊於葉爾羌河岸大軍聞鎗礟聲突圍出合擊賊衆郤之乃還阿克蘇詔嘉其臨陣奮勇遷二等侍衞尋擢鑲白旗滿洲副都統十月以經理臺站至額格爾呼爾璊遇結寨出掠之布嚕特賊衆斬二十餘級得㫖奬叙二十五年三月頒賚緞十二銀五百兩四月調阿克蘇兵赴伊犂為領隊大臣九月率兵百人捕竊馬臺站之瑪哈沁賊衆過察爾圗嶺窮追十餘日擒七十餘人獲馬五十餘復得㫖奬叙二十七年二月同領隊大臣伊勒圗驅越境逰牧之哈薩克部衆擒其魁五人收其馬二千餘至伊犂詔以哈薩克歸附日淺未知内地法度宥其罪諭奬豐訥亨熟悉情形令𫝊㫖曉諭哈薩克釋還其人及馬閏五月彚叙出征以来得三等功牌一頭等功牌四予雲騎尉世職十二月還京賜雙眼孔雀翎遷䕶軍統領管健鋭營事二十八年十月襲封和碩簡親王尋授領侍衞内大臣初簡勤親王原襲之輔國公及豐訥亨之雲騎尉世職因已襲親王銷除三十年六月諭嘉豐訥亨頻年出征頗著勞績其先世功勲所遺公爵宜仍予襲遂以豐訥亨之弟經訥亨襲互詳武襄輔國公𫝊三十四年正月任正黄旗漢軍都統三十八年十月掌宗人府事四十年十二月薨年五十有三諡曰恪十次襲積哈納簡恪親王豐訥亨第二子乾隆四十年四月授頭等侍衞四十一年五月襲封和碩簡親王尋授散秩大臣四十三年正月命復鄭獻親王始封之號仍為鄭親王四十九年五月薨年二十有七諡曰恭子年未及嵗現未議襲欽定宗室王公功績表傳卷六
