body:
  text: 欽定四庫全書欽定宗室王公功績表傳卷十一傳九鎮國公輔國公鎮國公阿拜傳阿拜太祖髙皇帝第三子天命十年十月與弟塔拜巴布泰征東海北路呼爾哈部俘千五百户師還上出城迎勞尋授騎都尉天聰八年四月晉授三等男崇德三年七月任吏部承政四年八月封三等鎮國將軍六年十月命往錦州南乳峰山駐防八年八月以老罷承政任順治四年九月晉二等鎮國將軍五年二月卒年六十有四十年五月追封鎮國公諡曰勤敏初次襲鞏安勤敏鎮國公阿拜第六子順治三年十一月封奉恩將軍五年三月襲封二等鎮國將軍六年十月晉封輔國公康熙二十年五月卒年五十有四爵除鎮國公巴布泰傳巴布泰太祖髙皇帝第九子天命十年十月征東海北路呼爾哈部有功十一年八月命理正黃旗事天聰四年三月隨大貝勒阿敏駐永平明兵陷灤州巴布泰不能禦議罷職八年四月授副都統五月從大軍征明克保安州十一月以巴布泰匿所獲復議罷職崇德六年五月封三等奉國將軍七年十一月命駐錦州順治元年四月隨睿親王多爾衮定京師同都統談泰擊敗流賊逐北至望都二年正月叙功晉一等奉國將軍三年正月隨貝勒勒克德渾征湖廣敗賊於安逺南漳西峰口關王嶺襄陽府四年九月晉三等輔國將軍尋晉封輔國公六年四月同貝子務達海討大同叛鎮姜瓖十月晉封鎮國公十二年正月卒年六十有四諡曰恪僖初次襲祜錫祿恪僖鎮國公巴布泰第三子順治十三年九月降襲三等鎮國將軍康熙三十四年十月以庸劣削爵二次襲富良原襲三等鎮國將軍祜錫祿第一子康熙二十六年三月封三等輔國將軍三十四年十月改降襲三等輔國將軍三十九年六月卒年二十有八三次襲尼雅翰三等輔國將軍富良第二子康熙三十九年七月降襲三等奉國將軍雍正五年五月卒年三十有七四次襲佛照三等奉國將軍尼雅翰第四子雍正六年十月降襲奉恩將軍九年正月卒年十有二五次襲多義三等奉國將軍尼雅翰第五子雍正十年九月襲封奉恩將軍乾隆十六年九月授佐領四十一年十二月卒年五十六次襲恩額穆奉恩將軍多義第三子乾隆四十二年四月授佐領七月襲封奉恩將軍鎮國公漢岱傳漢岱顯祖宣皇帝孫追封誠毅勇壯貝勒穆爾哈齊第五子天聰八年十二月授騎都尉尋封一等奉國將軍崇德二年四月預議政六年八月從上圍松山敗明總兵吳三桂等漢岱率所部追擊大破之七年十月隨貝勒阿巴泰攻明薊州河間景州克兖州十二月即軍前授兵部承政八年六月凱旋賜銀二百緞六順治元年四月隨睿親王多爾衮定京師敗流賊李自成叙功晉三等鎮國將軍十月隨豫親王多鐸南征破流賊於潼關二年二月同副都統伊爾德率兵由南陽趨歸德克州一縣四四月渡淮克揚州獲船百餘十月賜金二十五兩銀千三百兩三年正月任鑲白旗滿洲都統五月同貝勒博洛趨杭州追擊明魯王朱以海於台州是月晉一等鎮國將軍十一月同博洛進兵福建破明唐王朱聿鍵之總兵師福於分水關入崇安斬其巡撫定興化漳州泉州叙功晉輔國公五年四月命同貝子屯齊征陜西逆回㑹總督孟喬芳已擊斬米喇印丁國棟漢岱旋赴英親王阿濟格軍戍大同六年七月隨親王滿達海𠞰賊朔州寧武克其城移師攻遼州賊迎戰大敗之並降屯留襄垣榆社武鄉等縣七年十二月任吏部尚書兼攝正藍旗滿洲都統八年二月調刑部尚書三月以不陳奏英親王私藏兵器事削世職罰鍰五月晉鎮國公九年四月復調吏部尚書七月隨敬謹親王尼堪征湖南賜蟒衣鞍馬弓矢十一月敬謹親王戰沒命貝勒屯齊代其軍漢岱合營十年三月擊敗明桂王朱由榔之秦王孫可望等兵十一年十月追議隨敬謹親王戰沒罪削爵十二年正月復任吏部尚書二月加太子太保八月封鎮國將軍品級十三年四月以河西務鈔關員外郎朱世德虧課萬餘兩户部援赦免罪吏部亦弗置議廷議解漢岱任得㫖漢岱於湖南失事情罪重大考之成憲即應正法朕念係宗室姑從寬免且加任用乃不思感奮報效圖蓋前愆反依阿䝉蔽負朕大恩本當重處復念宗室姑從寬著革任削太子太保鎮國將軍級爵除鎮國公聶克塞傳聶克塞太祖髙皇帝孫鎮國將軍湯古代第一子崇德五年九月弟三等奉國將軍穆爾察襲父鎮國將軍爵遂以聶克塞襲弟爵七年十一月隨豫郡王多鐸略寧逺明兵迎拒敗之順治元年二月隨睿親王多爾衮定京師追擊流冦於望都二年正月叙功晉二等奉國將軍四年九月晉一等奉國將軍六年十月晉封鎮國公初聶克塞以貝子額克親子為嗣八年二月額克親獲罪削爵聶克塞乃妄奏與額克親不協三月降輔國公九年六月家人哈爾巴訐以私餽出妻衣物降三等鎮國將軍康熙四年二月卒年六十五爵除鎮國公恭阿傳恭阿顯祖宣皇帝曽孫原封貝勒阿敏第四子阿敏得罪恭阿廢為庶人後復入宗室順治五年九月隨鄭親王濟爾哈朗征湖廣六年正月大軍抵長沙擒明桂王朱由榔之總督何騰蛟進𠞰廣西分兵定道州黎平府先後克六十餘城恭阿俱在事有功十月封鎮國公十一月卒於軍年二十有六初次襲法塞鎮國公恭阿第一子順治八年閏二月降襲輔國公康熙四十九年正月卒年六十有四二次襲阿裕爾輔國公法塞第二子康熙二十年正月封三等奉國將軍四十九年十月改降襲三等奉國將軍五十八年八月卒年五十有三三次襲蘇赫訥三等奉國將軍阿裕爾孫閒散宗室德色勒第一子康熙五十八年十二月降襲奉恩將軍雍正二年七月卒年十嵗爵除鎮國公品級屯齊傳屯齊顯祖宣皇帝曾孫追封恪僖貝勒圖倫第二子崇德元年五月隨武英郡王阿濟格征明有功四年五月隨鄭親王濟爾哈朗略明錦州松山杏山力戰被創常賚外加賜銀百兩八月封輔國公五年六月隨睿親王多爾衮圍明錦州明兵夜襲我鑲藍旗營擊敗之嗣以不臨城及私遣兵回議削爵詔從寬罰鍰六年八月從上征明敗明於錦州塔山十一月復隨睿親王圍錦州順治元年十月晉封固山貝子尋隨豫親王多鐸破流冦平陜西河南並有功二年四月賜圓補紗衣一襲五月隨豫親王下江寧與貝勒尼堪等追明福王朱由嵩至蕪湖擒之十月凱旋賜金百兩銀五千兩鞍馬一是年授鑲藍旗滿洲都統三年正月隨肅親王豪格西征五月破流賊賀珍等解漢中圍敗二隻虎孫守法於漢隂復興安五年四月陜西逆回犯鞏昌諸郡命為平西大將軍同輔國公漢岱討之㑹總督孟喬芳已擊斬米喇印丁國棟屯齊還赴英親王阿濟格軍駐大同六年十月晉封多羅貝勒流賊張獻忠餘黨孫可望李定國等附明桂王朱由榔擾湖南九年七月屯齊隨敬謹親王尼堪征之十一月敬謹親王戰沒詔屯齊為定逺大將軍時定國及由榔將馬進忠四萬餘衆在永州大軍至定國度龍虎關遁可望率兵來靖州僞都督馮雙禮來武岡州遂進師寶慶至周家坡雙禮進忠等據險抗我師㑹暮天雨列陳相拒是夜可望自寶慶以兵來合衆號十萬屯齊分兵縱擊大破之捷聞得㫖嘉奬十一年十月議隨敬謹親王戰沒罪削爵十二年八月封鎮國公品級十五年正月隨信郡王多尼征由榔於雲南薄其城定國挾由榔奔永昌餘衆悉降師還康熙二年六月卒年五十初次襲富爾秦鎮國公品級屯齊第二子康熙二年八月降襲輔國公品級十六年八月任宗人府右宗人二十二年三月降三等鎮國將軍品級四十年六月卒年五十有八二次襲彭齡鎮國公品級屯齊曽孫初屯齊第五子原任二等侍衛謨啓生德成額任三等侍衛彭齡德成額第四子也乾隆四十三年三月詔以鎮國公屯齊著有勞績賜一等奉國將軍爵世襲罔替以彭齡襲封十一月授頭等侍衛輔國公塔拜傳塔拜太祖髙皇帝第六子天命十年十月征東海北路呼爾哈部有功尋授三等輕車都尉天聰八年四月晉一等輕車都尉尋封三等輔國將軍崇德四年九月卒年五十有一順治十五年五月追封輔國公諡曰慤厚康熙五十二年四月塔拜曽孫正白旗漢軍副都統楚宗奏塔拜於太祖髙皇帝時建立功績懇請撰文立碑從之初次襲額克親慤厚輔國公塔拜第二子崇德元年五月隨武英郡王阿濟格征明進逼北京明兵自涿州來拒親陷陳破之四年八月封三等奉國將軍九月襲封三等輔國將軍五年六月隨睿親王多爾衮攻明錦州十一月隨貝勒多鐸追擊明兵於塔山六年八月上征明錦州敗明總督洪承疇兵十三萬移營近松山掘壕環困之敗軍夜突御營額克親同內大臣錫翰等嚴守以拒敵敗郤十二月叙功賜銀八十兩順治元年四月隨睿親王定京師有功二年三月晉二等輔國將軍四年九月晉一等輔國將軍尋封輔國公六年十月晉封鎮國公七年八月任正白旗滿洲都統晉封固山貝子八年二月以御前大臣羅什博爾惠諂媚諸王造言搆釁伏法額克親坐附和削爵黜宗室九年二月復入宗室任內大臣十二年正月卒年四十有七爵除輔國公賴慕布傳賴慕布太祖髙皇帝第十三子天聰八年四月授騎都尉崇德四年九月預議政七年二月隨武英郡王阿濟格征明敗寧逺兵十月上御篤恭殿宴賚武英郡王不俟賞先歸賴慕布坐失勸阻革世職罷議政是月又議隨武英郡王駐髙橋時㑹敏惠恭和元妃喪武英郡王令鎮國公扎喀納於帳內歌舞賴慕布坐容隱應黜宗室上免之八年七月奉特㫖凡戮力行間勤敏素著者准令其部下人自行採參賴慕布下五十人與焉順治二年二月封奉恩將軍三年五月卒年三十有六十年五月追封輔國公諡曰介直初次襲來祜介直輔國公賴慕布第一子順治三年六月襲封奉恩將軍尋晉三等鎮國將軍八年閏二月晉封輔國公康熙八年五月以才力不及削爵二次襲扎坤泰原襲奉恩將軍來祜孫三等侍衛愛珠第三子雍正十三年八月今上御極奉諭㫖太祖太宗子孫內從前或係本支無人未經封爵或别有事故革退未襲者著宗人府查奏宗人府以賴慕布後裔係閒散宗室並無官爵具奏乾隆元年五月奉㫖扎坤泰承襲奉恩將軍二十二年三月卒年四十有六三次襲永武奉恩將軍扎坤泰第一子乾隆二十二年七月襲封奉恩將軍二十八年十月卒年三十有四爵除輔國公瑪瞻𫝊瑪瞻太祖髙皇帝孫禮烈親王代善第六子天聰九年五月隨貝勒多鐸從廣寧入寧逺錦州界牽制明兵俾毋援山西敗明兵於大凌河西陳斬副將劉應選追奔及松山城克一臺瑪瞻並在事有功崇德元年五月隨武英郡王阿濟格征明至安州連克十二城九月凱旋上行郊勞禮設大宴瑪瞻預賜金巵酒是年封輔國公三年八月隨貝勒嶽託征明由牆子嶺毁邊城入敗明總督吳阿衡兵連克臺保越北京趨山東十一月卒於軍年二十有七無嗣四年四月櫬歸上遣貝子及大臣等奠酒賜銀二十兩駝馬各一爵除輔國公巴穆布爾善傳巴穆布爾善太祖髙皇帝孫追封慤厚輔國公塔拜第四子崇德元年十二月從上征朝鮮敗其兵於陶山四年九月兄三等奉國將軍額克親襲父輔國將軍遂以巴穆布爾善襲兄爵順治元年四月隨睿親王多爾衮定京師破流賊有功二年三月晉二等奉國將軍四年九月晉一等奉國將軍六年十月晉三等鎮國將軍八年閏二月晉封輔國公康熙四年三月任領侍衛內大臣六年二月擢祕書院大學士九月充纂修世祖實録總裁八年五月議巴穆布爾善結黨行私等罪二十一欵伏誅子黜宗室爵除六月諭宗人府自順治十八年後宗室有犯罪革除宗室者著將原案情莭查明具奏尋宗人府革退宗室內巴穆布爾善係與鰲拜結黨情罪重大其子郭禮博禮七十五觀音保革去宗室之處應無庸再議得㫖巴穆布爾善之子本應依議念係宗室朕心不忍俱著為閒散宗室輔國公巴爾堪傳巴爾堪顯祖宣皇帝曾孫鄭獻親王濟爾哈朗第四子順治十一年十二月封三等輔國將軍康熙十三年四月命同鎮東將軍拉哈達鎮兖州巴爾堪署副都統六月詔率蒙古兵赴江寧八月以逆藩耿精忠賊黨由饒州犯徽州詔江寧將軍額楚偕巴爾堪進𠞰巴爾堪先驅九月至旌德聞賊據績溪疾進度徽嶺賊千餘迎戰敗之額楚繼至並抵績溪賊衆環逼合兵擊逐十餘里斬三千餘級復徽州𠞰賊黟縣至董亭橋賊五千拒阻擊之悉遁别賊千餘越山來援復敗之陳斬僞遊擊魏澄僞千總翁達等十一月進師婺源休寧賊據竒台嶺擊走之趨黃茅新嶺賊三千餘據木柵拒令步兵分攻嶺左右騎兵攻中斬五百餘級賊盡棄甲仗遁復縣城躡之樂平縣段家村叛將陳九傑糾賊八千餘拒敗竄入縣即樹梯登城攻復之餘賊據鄱陽雲吉峰下搜捕百餘級復饒州十四年四月進攻萬年縣之石頭街賊四萬餘斷渡口巴爾堪與額楚水陸並進破賊五十七營斬五千餘級擒九傑獲船二百餘趨安仁縣賊八千餘駕船遁風逆泊岸巴爾堪追及賊棄炮焚船竄又分兵擊敗齊爪郎諸賊於南頓山五月至貴溪賊奔復縣城至弋陽僞總管蔣德以木石壘斷西岡橋立木柵城北賊五萬為九營僞總兵柯升以賊五千自廣信趨救别立六營巴爾堪同額楚分隊夾擊斬溺二萬餘擒僞逰擊張二竒都司張明德等八月攻永豐賊於金石山陳斬僞都司李定等僞總兵何起先以賊六千餘據玉山僞逰擊林二瞻以賊五百餘掠鉛山又掠浙江之閩逆餘黨八千自江山常山犯玉山巴爾堪先後擊斬無算十六年正月隨簡親王喇布征吉安與吳逆僞帥韓大任戰於螺子山失利議削爵戴罪圖功同額楚進征廣東九月𠞰賊韶州蓮花山陷陳中創裹創力戰大破賊十九年八月簡親王統師廣西上詔王進征時宜以巴爾堪總統營伍俾立功自效十月創發自度不能痊語都統額赫納副都統幹都海曰吾為宗室不能臨陳死今創發勿令家人以陳亡冒功卒年四十有四喪還上命內大臣宗室輝塞往奠二十二年四月上以巴爾堪出征有年隨處奮身前進傷亡可憫下部議恤復輔國將軍雍正元年正月追封輔國公賜諡武襄立碑紀功乾隆十七年十二月孫竒通阿襲封和碩簡親王贈如其爵初次襲巴賽武襄輔國公巴爾堪第一子康熙二十一年四月封三等奉國將軍三十四年三月任鑲藍旗漢軍副都統三十五年二月從上征噶爾丹五月至克嚕倫河同平北大將軍馬思喀追冦至巴顔烏蘭而還三十六年十月調正黃旗蒙古副都統三十八年八月罷任五十四年三月復授正紅旗䝉古都統五月調鑲紅旗滿洲副都統十一月遷正紅旗蒙古都統五十七年七月署黑龍江將軍世宗憲皇帝御極實授寧古塔將軍雍正元年正月奏陳父巴爾堪勞績請賜碑文得㫖俞允追封輔國公即以巴賽襲二年二月召來京四年六月授振武將軍赴阿爾台軍營既至奏請令前鋒統領穆克登率察哈爾兵於特斯駐牧副將軍貝勒博貝率喀爾喀兵於特斯河駐牧前鋒統領定夀率䝉古於扎布罕駐牧均俟降雪後撤回從之五年十月詔遣大臣於來年赴阿爾台更代十二月以喀爾喀郡王丹津多爾濟奏巴賽辦事妥協管兵整飭詔仍留駐防七年三月命靖邊大將軍傅爾丹𠞰禦噶爾丹策凌以巴賽為副將軍八年五月召傅爾丹來京籌議軍務其大將軍印以巴賽暫護九年四月同傅爾丹進駐科布多六月噶爾丹䇿凌糾賊三萬來犯傅爾丹偕巴賽至扎克賽河獲賊二十餘人訊之詭言賊不滿千在察罕哈達逰牧尚隔三日程傅爾丹遂進至庫列圖嶺賊據險阻我軍傅爾丹令移營和通呼爾哈諾爾賊兵二萬伏山谷伺我軍甫移突出䝉古兵俱潰散收滿洲兵四千設方營護輜重退渡哈爾哈納河登山列陳賊衆復踵至傅爾丹趨右仍回科布多巴賽同副將軍查弼納趨左越嶺至河濵力戰沒於陳年六十有九尋陷賊之正紅旗前鋒校薩明阿脫歸得巴賽與查弼納陳沒狀上諭廷臣曰凖噶爾賊衆侵犯北路將軍等急欲滅此朝食忿激迎擊倉猝失利此皆國家養育多年之人朕遴選任用冀其大樹功勳重邀爵賞伊等亦以世受國恩竭力捐軀雖誤墮狡計而矢死效忠情殊可憫賜恤如例諡曰襄愍入祀昭忠祠乾隆十七年十二月子竒通阿襲封和碩簡親王贈如其爵二次襲竒通阿襄愍輔國公巴賽第十子雍正四年八月封三等輔國將軍九年十二月襲封輔國公乾隆十七年十二月襲封和碩簡親王别詳獻親王傳後三次襲經訥亨簡親王竒通阿第二子兄豐訥亨襲父爵别有𫝊乾隆三十年六月諭曰從前因竒通阿襲封簡親王銷去其原襲公爵近閲宗室王公表𫝊竒通阿之王爵係按派應襲而其公爵係伊祖父積有軍功相繼陳亡所遺不可泯沒且豐訥亨頻年出征頗著勞績曾給雲騎尉世職亦因已襲王爵銷去朕追思伊先世功勳又念豐訥亨近日勞績所有從前銷去公爵著宗人府帶領豐訥亨近派子弟引見請㫖承襲七月命經訥亨襲封輔國公四十年十一月卒年三十有三四次襲積拉堪輔國公經訥亨第一子乾隆四十一年五月襲封輔國公四十三年十二月授散秩大臣輔國公品級扎喀納傳扎喀納顯祖宣皇帝曽孫贈貝勒扎薩克圖第一子崇德三年八月隨睿親王多爾衮征明分兵八道扎喀納趨臨清州渡運河破濟南府還破天津衛所向有功四年四月師還賜駝一馬一銀二千兩是年封鎮國公時內大臣多爾濟下有䝉古及漢人自伊嚕逃命扎喀納等伺諸藩城屏城間未獲而還議削爵詔從寬降輔國公六年八月從上征明錦州明總督洪承疇以兵犯我鑲紅旗營擊敗之師還敵襲我後相距僅百步扎喀納轉戰敵驚遁明總兵吳三桂白廣恩王朴等沿海潜逃同輔國公芬古追擊至塔山七年七月駐防錦州九月還十月以駐髙橋時遇敏惠恭和元妃喪扎喀納從武英郡王歌舞為樂坐大不敬罪削爵黜宗室幽禁順治二年二月叙從睿親王多爾衮定京師功仍入宗室授輔國公品級九月同鎮國公傅勒赫駐江南十一月隨貝勒勒克德渾征湖廣凱旋賜金五十兩銀千兩五年十二月隨郡王瓦克達赴英親王阿濟格軍駐防大同六年九月晉封固山貝子九年七月隨敬謹親王尼堪征湖南賜蟒衣鞍馬弓矢至衡州敬謹親王戰沒上以貝勒屯齊代其任扎喀納合軍敗賊兵十萬於周家坡十一年十月議隨敬謹親王戰沒罪削爵十二年八月復授輔國公品級十五年正月隨信郡王多尼征明桂王朱由榔於雲南抵貴陽沿途敗賊降僞官劉之扶王宗臣等百餘馬步兵千餘師進雲南省城由榔遁攻永昌克之十六年閏三月卒於軍年四十九初次襲瑪喀納輔國公品級扎喀納第五子康熙四年三月降襲三等鎮國將軍品級四十三年二月因校射不嫻削級二次襲瑪商阿原襲三等鎮國將軍品級瑪喀納孫閒散宗室瑪稷第二子雍正七年閏七月授七品筆帖式十一年九月降襲三等奉國將軍品級乾隆四年十二月授護軍𠫭領十四年四月卒年四十三三次襲英祿三等奉國將軍品級瑪商阿第二子乾隆十四年十月降襲奉恩將軍品級乾隆四十年閏十月卒年四十有一四次襲福亨額奉恩將軍品級英祿第一子乾隆四十一年十月降襲雲騎尉品級欽定宗室王公功績表傳卷十一
