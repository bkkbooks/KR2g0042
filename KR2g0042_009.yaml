body:
  text: 欽定四庫全書欽定宗室王公功績表傳卷九傳七貝勒和碩貝勒阿敏傳阿敏顯祖宣皇帝孫追封莊親王舒爾哈齊第二子初授台吉嵗戊申三月太祖命同長子禇英征烏拉宜罕山城克之斬千人獲甲三百俘其衆以歸癸丑正月從上征烏拉布占泰以三萬衆迎拒諸將欲戰上止之阿敏偕貝勒代善等奏曰布占泰已出舍不戰何耶上遂決進克其城滅之丙辰太祖建元天命封和碩貝勒以齒序阿敏為二貝勒四年三月從上破明兵于薩爾滸山及尚間崖復奉命禦明總兵劉綎于棟鄂路代善等繼之陳斬綎阿敏偕大臣扈爾漢擊敗明遊擊喬一琦兵一琦奔固拉庫崖與朝鮮都元帥薑功烈合營阿敏同諸貝勒攻之功烈降一琦自縊八月從上征葉赫滅之六年三月從上取明瀋陽遼陽七月鎮江城中軍陳良策叛投明將毛文龍阿敏遷鎮江沿海居民于內地十一月文龍屯朝鮮阿敏渡鎮江夜入朝鮮境斬其守將及兵千五百文龍僅以身免十一年四月征喀爾喀巴林部取所屬屯寨十月征扎嚕特部俘其衆天聰元年正月同貝勒嶽託等征朝鮮瀕行諭曰朝鮮屢世獲罪理宜聲討然此行非專伐朝鮮也明毛文龍近彼海島納我叛民故整旅徂征如朝鮮可取並取之因親授方略是月大軍薄義州拔其城分兵搗文龍所居鐵山文龍敗歸海島師克宣州連定三城次平壤朝鮮王李倧遣使請和阿敏書數其罪七次黃州倧復請和阿敏欲進攻諸貝勒議許之事詳克勤郡王傳凱旋上郊勞于武靖營賜御衣一襲五月從上征明錦州復圍寧逺擊斬千餘人四年正月大兵克永平灤州遷安三月命阿敏代貝勒濟爾哈朗等駐守師至合略迤西路並招降榛子鎮四月諭歸降漢文武官曰我國法度從來賄賂不行亷者舉之貪者勿録况皇上簡用者俱亷潔忠直之輩爾等若有罪雖賂千金無益若無罪即衆貝勒何懼焉五月明監軍道張春等圍灤州阿敏怯不往援灤州陷阿敏遽棄永平殺降者夜出冷口歸六月上御殿諸貝勒大臣議阿敏十六罪上命嶽託宣示于衆諸貝勒大臣合詞請誅阿敏詔特宥其死削爵幽禁崇德五年十一月卒于幽所爵除多羅誠毅貝勒穆爾哈齊傳穆爾哈齊顯祖宣皇帝第二子以功賜號誠毅嵗乙酉四月從太祖髙皇帝征哲陳部嘉哈部長蘇庫賚呼密告哲陳部主於是托摩和章嘉巴爾達薩爾滸界藩五城集兵以待上執麾前進穆爾哈齊及近侍延布祿烏靈阿皆奮勇直入重圍斬二十餘級敗其衆涉渾河走穆爾哈齊復隨上渡河躡其後至吉林崖見兵由旁徑來上慮為彼見去冠纓隱身以待射前至者一人貫脊而殪穆爾哈齊復射殪其一餘多墜崖死太祖曰今日之役以四人敗八百衆天助我也天命五年九月卒年六十上親奠順治十年六月追封多羅貝勒諡曰勇壯爵除多羅篤義貝勒巴雅喇傳巴雅喇顯祖宣皇帝第五子初授台吉嵗戊戌正月太祖命同長子褚英征安楚拉庫路夜取屯寨二十降萬餘人賜號篤義丁未四月命征東海窩集部取赫席赫鄂謨和蘇嚕佛訥赫托克索三路俘二千人天命九年九月卒年四十有三順治十年五月追封多羅貝勒諡曰剛果爵除多羅廣略貝勒褚英傳褚英太祖髙皇帝第一子初授台吉嵗戊戌正月上命征安楚拉庫路以功賜號洪巴圗魯尋封多羅貝勒初東海瓦爾喀部斐悠城長䇿穆特赫苦烏拉布占泰之虐乞移家歸附丁未正月命同貝勒舒爾哈齊代善率兵徙之軍夜行隂晦忽大纛上有光衆以為異捫視無有復建之光如初舒爾哈齊曰吾幼從上征討所閲事多矣未見此異疑非吉兆欲班師褚英同代善持不可曰吉凶兆已定遽還何以報命決進抵斐悠城收其屯寨五百户令大臣扈爾漢衛之先行兵僅二百布占泰以萬衆邀諸路傷我一人大將揚古利斬其七人乃郤褚英與代善至策馬前諭軍士曰上每征伐無不以少擊衆今雖未親行間我等奉命來此爾衆無憂昔擒布占泰宥歸俾主其地時不久背恩如故今豈不能再縛之衆皆曰願效力褚英遂與代善各率兵五百夾擊天方晴明忽大雪寒冽烏拉兵大敗斬其統兵貝勒生擒貝勒常住瑚哩布及常住之子死者相枕藉獲馬五千甲三千上以褚英率先敗敵嘉之復賜號廣略戊申三月同貝勒阿敏征烏拉宜罕山城克之布占泰與蒙古科爾沁貝勒翁阿岱合兵出烏拉城二十里遙望我軍知不可敵相約還復以失宜罕山城大懼遣使來盟乙卯閏八月褚英以罪伏誅爵除多羅貝勒芬古傳芬古顯祖宣皇帝孫追封莊親王舒爾哈齊第八子天聰五年三月授鑲藍旗都統八月隨上征明抵大凌河芬古率本旗兵圍城之西南時貝勒阿濟格敗明兵於松山上將幸其營城中兵來突芬古等夾擊大敗之九月上令軍士向錦州幟而馳如明援兵狀距城十里炮聲不絶總兵祖大壽統衆出西南隅攻軍臺芬古等迎擊大壽敗回不敢出七年六月詔問征明與朝鮮察哈爾三者何先奏言我軍蓄鋭已久勢可用宜即入明邊毁其城保戮力進取何憂無成八年七月從上征明同貝勒德格類進師獨石口七月克長安嶺殺其守備官攻赤城克其郛復入保安州謁上於應州城籍俘獲以獻九年五月命芬古等隨貝勒多鐸入寧錦界牽制明兵俾毋援山西大夀營大凌河西我軍擊敗之崇德元年五月隨武英郡王阿濟格等征明薄延慶州先後克城十十二月從征朝鮮同都統談泰以騎入其城朝鮮王遁盡收其輜重而還敘功封固山貝子四年五月坐取外藩蒙古賄削爵八月復封輔國公六年八月大軍圍松山明兵夜遁芬古追破之七年十月隨饒餘貝勒阿巴泰征明抵薊州敗明總兵白騰蛟等克其城八年十月駐防錦州十二月卒年三十有九順治十年五月追封多羅貝勒諡曰靖定乾隆十五年七月以曽孫德沛襲封和碩簡親王贈如其爵初次襲尚善追封靖定貝勒芬古第二子順治元年四月襲封輔國公十月晉封固山貝子二年正月隨豫親王多鐸南征至潼關賊李自成以騎三百橫衝我師尚善與貝勒尼堪敗之三月平河南五月渡江平江南尚善並在事有功賜圎補紗衣一襲金百兩銀五千兩鞍馬一五年八月隨英親王阿濟格𠞰天津土冦殱之十二月駐防大同六年十月晉封多羅貝勒九年二月掌理藩院事十月預議政十五年正月隨信郡王多尼征明桂王朱由榔於雲南薄其城由榔奔永昌尚善同征南將軍卓布泰進鎮南州破其將白文選於玉龍關渡瀾滄江下永昌由榔先遁乘勝取騰越州進𠞰南甸至孟村而還十六年六月賜蠎袍一玲瓏刀一鞍馬一十七年七月議尚善預撤永昌守門兵致軍入城傷百姓降固山貝子康熙十一年閏七月諭宗人府尚善性行端良凡事小心敬慎勤勞為國著仍復多羅貝勒十二年六月任宗人府右宗正十三年三月以疾罷宗正是時逆藩吳三桂反上命順承郡王勒爾錦由荆州進征六月復命尚善為安逺靖寇大將軍率師之嶽州速滅賊尚善至軍移書三桂其略曰王以亡國餘生乞師我朝殄殱賊冦為國雪恥為父復讐感我聖恩傾心報國蒙恩眷顧列爵分藩榮施後嗣忠孝慈義之節炳於天壤富貴寵榮之盛絶於近代迄今三十餘年矣而末路晚節復效童昏頓喪初心自取顛覆竊為王不解也何者王藉言興復明室則曩者大兵入關奚不聞王請立明裔且天下大定猶為我計除後患剪滅明宗安在為故主效忠哉將為子孫謀創大業則公主額駙曽偕至滇其時何不遽萌反側至遣子入侍乃復背叛以陷子戮可謂慈乎如欲光耀前人則王之投誠也祖考皆膺封錫今則墳塋毁棄骸骨遺於道路可謂孝乎為人臣僕迭事兩朝而未嘗忠於一主可謂義乎不忠不孝不義不慈之罪躬自蹈之而欲逞志角力收復人心猶厝薪於火而云安結巢於幕而云固也諺曰老將智而耄及之王非老悖何乃至是如即輸誠悔罪聖朝寬大應許自新毋蹈公孫述彭寵故轍赤族湛身為世大僇三桂得書不報十一月疏請發荆州緑旗兵撥京口沙唬船五十並赴嶽州進𠞰從之十四年六月賊犯彞陵急遣舟師絶其餉道十五年三月以舟師敗賊於洞庭取君山四月分遣兵助安親王嶽樂攻長沙十六年正月征南將軍穆占由嶽州赴長沙深入賊境命尚善率水陸兵進援四月三桂奔衡州復進湘潭分遣其衆侵兩粵尚善請發鳥船四十精兵每佐領四名水陸夾擊十七年二月諭責尚善殄賊緩令率所部每佐領五人駐守長沙而以嶽樂統大軍取嶽州尚善願統舟師克嶽州自效上從其請遣湖廣總督蔡育榮率標兵三千荆州緑旗兵二千馳赴嶽州協擊六月賊將杜輝犯栁林嘴大軍迎擊君山扁山舟師亦至合戰賊敗走斬獲甚衆賊固守套湖峽總兵萬正色等又擊破之捷聞下部議敘八月薨於軍年五十有八十九年十一月廷議出師湖廣功罪尚善坐退縮追削爵二次襲門度原封貝勒尚善第四子康熙七年正月封鎮國公二十五年十一月任宗人府右宗正三十七年四月以惰削鎮國公時門度之弟鎮國公根度亦以乖張削爵五月諭大學士等門度根度乃貝勒尚善之子今兩公爵俱革尚善别無公爵之子孫則其爵遂絶矣著交宗人府議尋議奏門度之祖芬古係輔國公門度應襲公爵得旨門度著襲封輔國公雍正四年十一月以病削爵三次襲裕綬原封貝勒尚善孫原封鎮國公根度第四子康熙五十五年正月授三等侍衛雍正四年十一月襲封輔國公尋授散秩大臣九年五月管正藍旗覺羅學十三年十一月任宗人府左宗正乾隆五年十月卒年五十有二諡曰敏恪四次襲嵩椿敏恪輔國公裕綬第六子乾隆六年二月襲封奉恩輔國公十二年四月授散秩大臣十三年二月任正紅旗漢軍副都統閏七月授正藍旗護軍統領十四年五月遷鑲黃旗漢軍都統兼左翼前鋒統領十五年四月調鑲黃旗蒙古都統十月任宗人府右宗人十九年四月署領侍衛內大臣十二月管理鑾儀衛事二十二年正月授荆州將軍二十五年十二月調西安將軍二十六年十一月授察哈爾都統二十七年閏五月復任西安將軍二十九年十一月與副都統成德互參議嵩椿徇私保題官屬又不將違例放債之沙爾圗及坐扣錢糧之佐領朱林泰究參等罪革任回京三十年正月任散秩大臣十二月授綏逺城將軍三十一年十二月以不裁轎夫餉銀革任三十三年九月署領侍衛內大臣十月任正紅旗蒙古都統三十五年四月任右宗人三十六年六月授內大臣三十七年十一月授江寧將軍四十六年三月調綏逺城將軍四十九年六月調寧夏將軍多羅安平貝勒杜度傳杜度太祖髙皇帝孫原封廣略貝勒褚英第一子初授台吉天命九年正月喀爾喀巴約特部台吉恩格德爾請移居東京杜度隨大貝勒代善等徙其戶口來歸尋封貝勒天聰元年正月同二貝勒阿敏貝勒嶽託等征朝鮮李倧請和諸貝勒許之阿敏欲直趨至其都謂杜度可同往杜度變色曰皇上乃吾叔父何可逺離耶遂與嶽託等議定盟而還二年二月上征多羅特部杜度留守三年十一月從上征明薄京城敗滿桂侯世䘵又同貝勒阿巴泰等焚通州克張家灣從上至薊州敗敵援兵事具英親王傳十二月命杜度統本旗兵駐遵化四年正月明兵來攻敗之斬其副將獲駝馬千計五年三月命諸貝勒直言時政杜度奏曰讞獄務求明允請别選賢能聽訟必事理是非斟酌悉當者庶有成效七月上征明杜度留守六年四月上征察哈爾復留守七年三月監築鹻場城五月明將孔有德耿仲明來降杜度等迎護其衆事具英親王傳六月詔問征明及朝鮮察哈爾三者何先奏言朝鮮已在掌握且緩征察哈爾與我逼則征之破則天下自然膽裂若尚逺取大同邊地秣馬乘機深入明境八年五月命駐防海州崇德元年四月敘功晉封多羅安平貝勒九月守海州河口伊勒慎奏明將造巨艦百餘橫截遼河為戰禦計命杜度濟其師明兵敗却乃還十二月上征朝鮮杜度護輜重後行諭簡精騎略皮島雲從島大花島鐵山至則居民先遁杜度焚其廬舍二年二月抵臨津江前一日聞氷解不可渡夕大雨雪氷復凝軍數萬徑渡狀聞上曰嘉祥洊至皆天意也是月同睿親王多爾衮取江華島敗其水師再敗其兵于江岸克其城三年二月上征喀爾喀同代善濟爾哈朗等留守并監築遼陽都爾弼城是月明石城島總兵沈志祥挈屬降杜度運米濟之八月命嶽託為揚威大將軍杜度副之統右翼軍伐明抵密雲東北牆子嶺明兵迎戰敗之進攻牆子嶺保分兵入破明黑峪關古北口黃崖口馬蘭峪等關嶽託以疾薨于軍杜度總軍務與左翼會于通州河西越北京西抵山西南抵濟南降城克敵事具睿忠親王傳四年四月凱旋賜駝一馬二銀五千兩八月命掌禮部事九月同貝勒濟爾哈朗等略明錦州寧逺五年四月上巡視義州杜度留守六月同睿親王等于義州屯田七月杜度率右翼兵伏寧逺路殺明運糧兵三百人尋往錦州誘敵敗其兵八月獲大凌河海口船九月代還十二月圍錦州餘詳睿忠親王傳六年三月以聽從睿親王離城逺駐遣兵私回論削爵奪所屬戶口詔從寬罰鍰六月復往圍錦州敗明兵于松山八月從上親征九月駕旋留杜度圍錦州七年六月薨年四十有六病革時諸王貝勒方集篤恭殿會議出征功罪上聞之罷朝訃至命護軍統領圗賴往奠雍正二年立碑以旌其功初次襲杜爾祜安平貝勒杜度第一子初封輔國公崇德四年七月有蒙古及漢人自伊嚕逃杜爾祜駐兵藩城屏城間伺之不獲而還議削爵詔免之六年八月從上圍松山明兵遁諸將相繼追擊杜爾祜疑後有敵兵少待已而無至者遂隨衆追破之七年三月隨大軍圍錦州祖大壽以城降命杜爾祜還京六月降襲鎮國公十月以參領拜山等首告怨望削爵黜宗室順治元年十月隨豫親王多鐸南征二年二月仍入宗室封輔國公十月敘功賜金五十兩銀二千兩五年九月隨鄭親王濟爾哈朗征湖廣六年四月敗賊于永興抵辰州賊渠一隻虎遁追擊之進𠞰廣西定全州餘詳鄭獻親王傳七年正月凱旋敘功賜銀六百兩八年二月晉封多羅貝勒九年十月命議政十二年二月卒年四十有一諡曰慤厚二次襲敦達慤厚貝勒杜爾祜第五子順治十二年八月降襲固山貝子康熙十三年十月卒年三十有二諡曰恪恭三次襲普貴恪恭貝子敦達第二子康熙十三年十二月降襲鎮國公三十七年四月諭宗人府察行走勤惰議奏普貴原有瘋疾今雖愈不便令其行走應革退得旨普貴向來行走尚優既稱瘋疾已痊著照常行走雍正元年十月以病削爵四次襲智保原襲鎮國公普貴第十一子雍正元年十月降襲輔國公三年二月卒年七嵗五次襲蘇保原襲鎮國公普貴第十三子雍正三年正月襲封輔國公四年十二月卒年四嵗六次襲誠保原襲鎮國公普貴第七子雍正五年二月襲封輔國公乾隆十九年九月卒年四十有三諡曰溫禧七次襲慶春溫禧輔國公誠保第二子乾隆二十年二月襲封奉恩輔國公三十八年六月卒年二十有四八次襲恆寧奉恩輔國公慶春第一子乾隆三十八年十月襲封奉恩輔國公多羅貝勒察尼傳察尼太祖髙皇帝孫豫通親王多鐸第四子順治十三年正月封多羅貝勒康熙七年正月授宗人府左宗正七月預議政九年三月充玉牒館副總裁十二年十二月逆藩吳三桂反命隨順承郡王勒爾錦由湖廣進𠞰參贊軍務十三年三月至荆州賊已陷嶽州七月察尼同將軍尼雅翰進征偽將軍吳應麒以賊七萬由陸路來拒敗之斬級甚衆舟師抵七里山以炮攻沉其船十餘因溽暑風逆仍回荆州十四年五月賊陷榖城察尼佩靖冦將軍邙往援都統伊里布等先至賊遁時南漳興山為賊陷又逼彞陵據城外鎮荆山掘壕結寨八月察尼至彞陵以賊寨難進攻其糧由江運議增舟師斷賊運困之十月遣兵敗賊于牛皮了口進攻黃連坪焚其積聚興山賊遁十五年二月吳逆移南漳彞陵賊往長沙順承郡王令察尼回荆州渡江𠞰賊三月同都統伊里布等趨石首縣賊據虎渡口迎戰敗之追至太平街斬級三百餘泊江南岸翼日再登岸擊賊過太平街遇賊伏失利退荆州詔責勒爾錦老師糜餉察尼參贊無能令立功贖罪十七年八月貝勒尚善薨于嶽州軍命察尼代為安逺靖冦大將軍規復嶽州九月疏言舟師入湖三月餘雖未大挫賊鋒賊亦不能出戰近聞賊餉將絶宜于湖水涸後圍以木筏立木樁列火炮俾小船巡警以困之然水涸為期尚遲兩三月間賊中安知無變今乘水勢未退立一營于南津港俟水涸酌撥舟師營于君山髙家廟絶其糧道賊勢窮蹙不難撲滅上善其言令副都統關保率兵赴嶽州聽調遣是月遣提督桑額協同撫逺將軍彰泰率師至南津港大敗賊衆十一月奏偽將軍杜輝巴養元薑義舟師犯陸石口將軍鄂訥等敗之斬千餘級署副都統葉儲赫等進攻嶽州破賊萬餘又疏言賊屯嶽州偵知其糧已匱以舟師悉出意在通餉道鏖戰移時偽帥復率衆五千自髙家廟渡江來犯增遣前鋒統領杭竒禦退之先是察尼以舟師屢經出戰疏請發江南子母等炮一千又請調荆州水師總兵張忠并標兵營君山髙家廟上皆從之至是又疏言湖水漸涸陸地漸出我兵營伍隔絶恐賊潛通饋餉請增發滿漢兵議政王等議不準行上以圍取嶽州關係重要賊糧將絶令安親王嶽樂以長沙間駐兵量調赴之十八年正月疏請調兵六千圍嶽州城并請設隨征左右前後四營總兵官分轄詔允之是月偽總兵王度沖陳珀等各以舟師降吳應麒棄城遁復嶽州計招撫偽官六百餘兵五千餘獲船六十五炮六百四十餘二月安親王自長沙進取衡州察尼發緑旗兵沙船助其軍尋奏都統珠滿追擊賊於湘隂斬獲無算復其城提督桑額取安鄉降偽員外郎等三人命察尼由常德進征辰龍關軍務在澧州以南者聽調度十九年三月同都統鄂訥等攻克辰龍關抵辰州賊潰遁偽知府傅祖祿等以城降並招撫偽將軍楊有祿周禎揚寶蔭祖述舜等五月疏言自常德進辰沅沿途雨濘馬乏詔暫屯沅州酌量進發六月疏計在軍前鋒四百有竒護軍驍騎每佐領二十餘人應簡前鋒三百每佐領護軍六驍騎九進取雲貴上命彰泰統師進征察尼領先出征效力勞苦之滿洲兵還京十一月議察尼出師湖廣退縮不速扼要害應削貝勒及議政宗人府職籍其家屬財産仍行拘禁上念克嶽州功僅削爵為間散宗室二十四年十二月特授奉天將軍二十七年九月卒年四十有八喪至京命領侍衛內大臣公費揚古往奠祭葬如輔國公例諡曰恪僖爵除多羅貝勒喀爾楚渾傳喀爾楚渾太祖髙皇帝曽孫追封克勤郡王嶽託第三子順治元年四月隨睿親王多爾衮入山海關破流賊李自成追擊至望都二年二月封鎮國公三年正月隨肅親王豪格討流賊張獻忠時賊黨據陜西同貝子滿達海進𠞰偽參將石國璽以下五十餘人率賊七百迎降賊首髙如礪遁三台山掘壕圍之如礪亦率衆降十一月肅親王進征四川斬獻忠于西充喀爾楚渾在事有功五年八月任鑲紅旗滿洲都統六年正月隨敬謹親王尼堪討大同叛鎮薑瓖師至太原賊由寧武關迎戰遣都統阿賴等敗之進圍寧武賊犯我鑲紅鑲黃兩旗營擊敗其衆四月由左衛往圍大同偽總兵楊振威斬瓖降十月晉封多羅貝勒八年二月攝理藩院事八月薨年二十有四諡曰顯榮立碑紀功康熙十三年三月復立碑旌之初次襲克齊顯榮貝勒喀爾楚渾第一子順治九年十月襲封多羅貝勒康熙六十一年六月薨年七十有二二次襲魯賓貝勒克齊第一子康熙二十三年正月封固山貝子三十年正月授宗人府左宗正三十五年二月上征噶爾丹同都統喀岱等統領鑲藍旗營三十八年十二月以惰罷宗正任雍正元年三月改降襲固山貝子四年二月坐舉動狂悖削爵三月以魯賓無應襲貝子之人復降封輔國公乾隆八年六月卒年七十有四諡曰恪思三次襲訥穆金顯榮貝勒喀爾楚渾元孫初喀爾楚渾孫魯賓以弟奉國將軍品級蘭鼐子宗智為嗣未襲卒訥穆金宗智第四子也乾隆九年四月降襲奉恩將軍二十五年十二月授三等侍衛纍遷至頭等侍衛四十八年十月卒年四十有四四次襲薩賓圗奉恩將軍訥穆金第二子乾隆四十九年五月襲封奉恩將軍多羅貝勒巴思哈傳巴思哈太祖髙皇帝曽孫追封克勤郡王嶽託第五子崇德四年正月封鎮國將軍順治六年十月晉封多羅貝勒九年七月流賊張獻忠餘黨孫可望等犯湖南隨敬謹親王尼堪征之賜蟒衣鞍馬弓矢十一月尼堪戰沒於衡州命貝勒屯齊代其軍巴思哈合營三月由永州趨寶慶敗賊兵十萬于周家坡十一年十月議隨敬謹親王出征敗績罪削爵十二年三月任鑲紅旗滿洲都統八月封鎮國公品級十五年正月隨信郡王多尼征明桂王朱由榔于雲南合四川廣西兩路軍期進取十一月抵貴陽趨安莊擊斬其衆十六年正月大軍薄雲南省城同貝勒尚善等克鎮南州玉龍關永昌府騰越州六月賜蟒袍鞍馬勞之十七年五月師旋七月議前征雲南時撤永昌門兵致軍士入城擾民降鎮國將軍品級十八年二月卒年三十初次襲固克度渾原封貝勒巴思哈第二子順治十八年六月降襲三等輔國將軍品級康熙四年七月卒年十嵗二次襲庫布素渾原封貝勒巴思哈第三子康熙四年九月降襲三等奉國將軍品級十二年正月晉三等輔國將軍品級三十四年十月以病誤較射削爵三次襲蘭鼐原封三等輔國將軍品級庫布素渾第一子康熙三十四年十月降襲三等奉國將軍品級五十八年正月卒年四十有一四次襲宗智奉國將軍品級蘭鼐第三子康熙五十八年十二月降襲奉恩將軍品級雍正八年二月授三等侍衛尋遷二等侍衛乾隆元年九月授前鋒參領四年十二月擢副都統八年十月卒年四十有三五次襲宗熹奉國將軍品級蘭鼐第六子乾隆九年七月降襲雲騎尉品級四十年十二月因軍政虛報年嵗削級爵除欽定宗室王公功績表傳卷九
