front:
  text: 欽定四庫全書欽定宗室王公功績表傳卷二表二貝勒貝子鎮國公輔國公以罪黜宗室貝勒
  hash: sha256:0ec01aa984426433b224fb095e22474312e49ac98b5baf2ea20cb4d71a991bb2
