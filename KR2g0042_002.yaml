  - {type: page-break, offset: 0, content: '', id: KR2g0042_WYG_002-1a, image: WYG0454/WYG0454-0027a.png}
body:
  text: 和碩貝勒阿敏所立爵多羅誠毅貝勒穆爾哈齊所立爵多羅篤義貝勒巴雅喇所立爵多羅廣略貝勒禇英所立爵多羅貝勒芬古所立爵多羅安平貝勒杜度所立爵多羅貝勒察尼所立爵多羅貝勒哈爾楚率所立爵多羅貝勒巴思哈所立爵固山貝子務逹海所立爵固山貝子博和託所立爵固山貝子固爾瑪渾所立爵固山貝子洛託所立爵固山貝子傳喇塔所立爵固山貝子穆爾祜所立爵固山貝子特爾祜所立爵固山貝子薩弼所立爵固山貝子蘇布圖所立爵固山貝子溫齊所立爵鎮國公阿拜所立爵鎮國公巴布泰所立爵鎮國公漢岱所立爵鎮國公聶克塞所立爵鎮國公恭阿所立爵鎮國公品級屯齊所立爵輔國公塔拜所立爵輔國公賴幕布所立爵輔國公瑪瞻所立爵輔國公巴穆布爾善所立爵輔國公巴爾堪所立爵輔國公品級扎喀納所立爵和碩貝勒莽古爾泰所立爵以罪黜宗室和碩貝勒德格類所立爵以罪黜宗室多羅貝勒拜音圖所立爵以罪黜宗室多羅貝勒碩託所立爵以罪黜宗室多羅貝勒延信所立爵以罪黜宗室
